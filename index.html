function mergeMateriels(local, remote){
  // Merge intelligent : chaque champ garde la valeur la plus récente
  const pickVerif=(a,b)=>{
    if(!a&&!b) return null;
    if(!a) return b;
    if(!b) return a;
    return new Date(a.date)>=new Date(b.date)?a:b;
  };
  const pickCtrl=(a,b)=>{
    if(!a&&!b) return null;
    if(!a) return b;
    if(!b) return a;
    return new Date(a.date)>=new Date(b.date)?a:b;
  };
  const scanNewer=(a,b)=>{
    if(!a&&!b) return false;
    if(!a) return false;
    if(!b) return true;
    return new Date(a)>new Date(b);
  };
  const localScanNewer=scanNewer(local.scan,remote.scan);
  if(local.chantierId&&remote.chantierId&&local.chantierId!==remote.chantierId){
    return{...remote};
  }
  return {
    ...remote,
    etat:         localScanNewer ? local.etat      : remote.etat,
    presence:     localScanNewer ? local.presence  : remote.presence,
    scan:         localScanNewer ? local.scan      : remote.scan,
    verifLundi:   pickVerif(local.verifLundi,  remote.verifLundi),
    verifSemaine: pickVerif(local.verifSemaine,remote.verifSemaine),
    controle2m:   pickCtrl(local.controle2m,   remote.controle2m),
    autreChantier:local.autreChantier||remote.autreChantier||null,
  };
}

function setupRealtime(){
  if(S._realtimeChannel){
    try{db.removeChannel(S._realtimeChannel);}catch(e){}
    S._realtimeChannel=null;
  }
  setSyncStatus('connecting');

  S._realtimeChannel = db.channel('railops-global')
    .on('postgres_changes',{event:'*',schema:'public',table:'materiels'}, payload=>{
      if(!S.agent) return;
      const {eventType,new:remote,old:prev} = payload;
      if(eventType==='INSERT'||eventType==='UPDATE'){
        const idx=S.mat.findIndex(m=>m.id===remote.id);
        if(idx!==-1){
          const local=S.mat[idx];
          const wasConflict = local.scan && remote.scan && local.scan!==remote.scan;
          S.mat[idx]=mergeMateriels(local,remote);
          if(wasConflict && local.etat!==remote.etat){
            const agent=remote.agentNom||'un agent';
            toast('Conflit résolu — '+remote.nom+' mis à jour par '+agent,'warn');
          }
        } else {
          S.mat.push(remote);
          toast('Nouvel article ajouté : '+remote.nom,'info');
        }
      } else if(eventType==='DELETE'){
        S.mat=S.mat.filter(m=>m.id!==prev.id);
      }
      if(!['form','ajout_mat','nouveau_chantier'].includes(S.page) && !S.modalOpen) renderTab?.();
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'scans'}, payload=>{
      if(!S.agent) return;
      const scan=payload.new;
      if(S.scans.find(s=>s.id===scan.id)) return; // déjà connu
      S.scans.push(scan);
      // Màj date scan sur le matériel correspondant
      const idx=S.mat.findIndex(m=>m.id===scan.materielId);
      if(idx!==-1 && (!S.mat[idx].scan || scan.date>S.mat[idx].scan)){
        S.mat[idx].scan=scan.date;
        S.mat[idx].etat=scan.etatGeneral;
      }
      if(scan.agentNom!==S.agent){
        toast('Inspection reçue : '+scan.agentNom+' → '+(S.mat.find(m=>m.id===scan.materielId)?.nom||scan.materielId),'info');
      }
      if(!['form','ajout_mat','nouveau_chantier'].includes(S.page) && !S.modalOpen) renderTab?.();
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'chantiers'}, payload=>{
      if(!S.agent) return;
      const {eventType,new:remote,old:prev}=payload;
      if(eventType==='INSERT'||eventType==='UPDATE'){
        const idx=S.chantiers.findIndex(c=>c.id===remote.id);
        if(idx!==-1) S.chantiers[idx]=remote;
        else{ S.chantiers.push(remote); toast('Nouveau chantier : '+remote.nom,'info'); }
      } else if(eventType==='DELETE'){
        S.chantiers=S.chantiers.filter(c=>c.id!==prev.id);
      }
      if(['dashboard','chantiers'].includes(S.page) && !S.modalOpen) render();
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'users'}, payload=>{
      if(!S.agent) return;
      const {eventType,new:remote,old:prev}=payload;
      if(eventType==='INSERT'||eventType==='UPDATE'){
        const idx=S.users.findIndex(u=>u.id===remote.id);
        if(idx!==-1) S.users[idx]=remote; else S.users.push(remote);
      } else if(eventType==='DELETE'){
        S.users=S.users.filter(u=>u.id!==prev.id);
      }
    })
    .subscribe(status=>{
      if(status==='SUBSCRIBED'){setSyncStatus('connected');setTimeout(flushOfflineQueue,1000);}
      else if(status==='CHANNEL_ERROR'||status==='TIMED_OUT') setSyncStatus('offline');
      else setSyncStatus('connecting');
    });
}

// ── Sync en arrière-plan ──────────────
// Fonction de rechargement silencieux des données depuis Supabase
async function silentSync(){
  if(!S.agent) return;
  if(window._importing) return;
  // Vider la file des suppressions en attente
  await flushDeleteQueue();
  const dq=new Set(getDeleteQueue());
  try{
    const {data:dc,error:ec}=await db.from('chantiers').select('*');
    const {data:dm,error:em}=await fetchAllMats();
    const {data:du}=await db.from('users').select('*');

    // ╔══════════════════════════════════════════════════════════════════╗
    // ║  ZONE CRITIQUE — NE PAS MODIFIER SANS VALIDATION COMPLÈTE       ║
    // ║  Même logique que load() — validée v75 après nombreux bugs.     ║
    // ╚══════════════════════════════════════════════════════════════════╝

    // RÈGLE 1 : Chantiers → Supabase fait TOUJOURS loi (sauf pendant les 60s post-import)
    const importRecent = window._lastImport && (Date.now() - window._lastImport) < 60000;
    if(!ec && !importRecent){
      // Réinjecter les photos ET signatures locales des tournées (stripées avant envoi Supabase)
      const localChantiers=JSON.parse(localStorage.getItem('ro3_c')||'[]');
      S.chantiers=(dc||[]).map(remote=>{
        const local=localChantiers.find(c=>c.id===remote.id);
        if(!local||!local.tournees) return remote;
        const remoteTIds=new Set((remote.tournees||[]).map(t=>t.id));
        // Fusionner photos/signatures locales dans tournées distantes
        const tournees=(remote.tournees||[]).map(rt=>{
          const lt=local.tournees.find(t=>t.id===rt.id);
          if(!lt) return rt;
          return {...rt, visites:(rt.visites||[]).map((rv,vi)=>{
            const lv=(lt.visites||[])[vi];
            if(!lv) return rv;
            return {
              ...rv,
              sigAgent: lv.sigAgent || rv.sigAgent || null,
              sigCte: lv.sigCte || rv.sigCte || null,
              photos:(rv.photos||[]).map((rp,pi)=>{
                const lp=(lv.photos||[])[pi];
                return (lp&&lp.data)?{...rp,data:lp.data}:rp;
              })
            };
          })};
        });
        // Ajouter les tournées locales pas encore en Supabase
        const localOnly=local.tournees.filter(t=>!remoteTIds.has(t.id));
        return {...remote, tournees:[...tournees,...localOnly]};
      });
      try{localStorage.setItem('ro3_c',JSON.stringify(S.chantiers));}catch(e){}
    }

    // RÈGLE 2 : Matériels → merger Supabase avec local (préserve les vérifs locales)
    // Croiser avec deleted_ids serveur pour exclure les articles supprimés depuis un autre appareil
    let delData2=[];try{const r2=await db.from('deleted_ids').select('*');delData2=r2.data||[];}catch(e){}
    const serverDeleted2=new Set(delData2.map(x=>x.id||x.identifiant));
    const allDel=new Set([...dq,...serverDeleted2]);
    const dmFiltered=allDel.size&&dm?dm.filter(m=>!allDel.has(m.id)):dm;
    if(!em&&dmFiltered&&!importRecent){
      const merged=dmFiltered.map(remote=>{
        const local=S.mat.find(m=>m.id===remote.id);
        return local ? mergeMateriels(local,remote) : remote;
      });
      S.mat=normMats(merged);
      try{localStorage.setItem('ro3_m',JSON.stringify(S.mat));}catch(e){}
    }

    if(du&&du.length) S.users=du;

    // Scans : séparé pour ne pas bloquer si trop lourd
    try{
      const {data:ds}=await db.from('scans').select('id,materielId,chantierId,agentNom,date,etatGeneral,proprete,fonctionnement,dommages,dommagesDesc,observations,actions,photo,lat,lng');
      if(ds){
        const localScans=JSON.parse(localStorage.getItem('ro3_s')||'[]');
        const localById={};
        localScans.forEach(s=>{localById[s.id]=s;});
        const merged=ds.map(s=>localById[s.id]?.photo?{...s,photo:localById[s.id].photo}:s);
        const sIds=new Set(ds.map(x=>x.id));
        localScans.filter(s=>!sIds.has(s.id)).forEach(s=>merged.push(s));
        S.scans=merged;
      }
    }catch(e){console.warn('scans fetch error:',e.message);}

    setSyncStatus('connected');
    updateNotifBadge();
    // Ne pas rafraîchir si un formulaire est en cours de saisie
    const formEnCours = window._tourneeEnCours || 
      S.page==='form' || 
      S.page==='ajout_mat' || 
      S.page==='nouveau_chantier' ||
      S.tab==='tournee' ||
      document.getElementById('movl'); // modale ouverte
    if(formEnCours) return;
    if(S.page==='dashboard'&&!document.getElementById('movl')){
      const pc=document.getElementById('pc');
      if(pc) pgDash(pc);
    } else if(S.page==='chantier_detail'&&!document.getElementById('movl')){
      renderTab?.();
    }
  }catch(e){
    console.warn('silentSync error:',e.message);
    setSyncStatus('offline');
  }
}

// ── Déconnexion automatique après 10 min d'inactivité ──
const INACTIVITY_DELAY = 10 * 60 * 1000; // 10 minutes
let _lastActivity = Date.now();

function resetActivity(){_lastActivity = Date.now();}

// Réinitialise le timer à chaque interaction
['touchstart','mousedown','keydown','scroll'].forEach(evt=>{
  document.addEventListener(evt, resetActivity, {passive:true});
});

setInterval(()=>{

}, 60000); // vérifie toutes les minutes

// EXPORT PDF — jsPDF + autoTable
// ══════════════════════════════════════
function buildPDF(c, mats, scans, titre){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const pw=doc.internal.pageSize.getWidth();
  const now=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
  const nowFull=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const eL2=e=>({bon:'Bon état',acceptable:'Acceptable',degrade:'Dégradé','hors-service':'Hors service',inconnu:'Non inspecté'}[e]||e);
  const pL=p=>({confirme:'Présent',absent:'Absent','non-confirme':'Non confirmé',retire:'Retiré'}[p]||p);
  const fd=iso=>{if(!iso)return '—';const d=new Date(iso);return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});};

  const eColor=e=>e==='bon'?[26,122,58]:e==='acceptable'?[179,106,0]:e==='degrade'||e==='hors-service'?[192,57,43]:[100,100,100];
  const pColor=p=>p==='confirme'?[26,122,58]:p==='absent'?[192,57,43]:p==='non-confirme'?[179,106,0]:[150,150,150];

  // ── HEADER
  doc.setFillColor(245,166,35);
  doc.rect(0,0,pw,16,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(13);doc.setFont('helvetica','bold');
  doc.text('RailOps — SFERIS',14,10);
  doc.setFontSize(8);doc.setFont('helvetica','normal');
  doc.text(titre||'Rapport chantier',pw-14,10,{align:'right'});

  // ── INFO CHANTIER
  doc.setTextColor(30,30,30);
  doc.setFontSize(14);doc.setFont('helvetica','bold');
  doc.text(c.nom,14,24);
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.setTextColor(100,100,100);
  doc.text(c.lieu,14,30);
  if(c.desc) doc.text(c.desc,14,35);
  doc.text('Chef : '+(c.chefs&&c.chefs[0]||c.chef||'—'),pw-14,24,{align:'right'});
  doc.text('Début : '+(c.dateDebut||'—')+'  Fin : '+(c.dateFin||'—'),pw-14,30,{align:'right'});
  doc.text('Généré le '+nowFull,pw-14,36,{align:'right'});

  // ── STATS
  const conf=mats.filter(m=>m.presence==='confirme').length;
  const absent=mats.filter(m=>m.presence==='absent').length;
  const hs=mats.filter(m=>m.etat==='hors-service'||m.etat==='degrade').length;
  const d2m=60*24*60*60*1000;
  const retard=mats.filter(m=>!m.controle2m||(new Date()-new Date(m.controle2m.date))>d2m).length;

  const stats=[
    {v:mats.length,l:'Articles',c:[80,80,80]},
    {v:conf,l:'Présents',c:[26,122,58]},
    {v:absent,l:'Absents',c:absent?[192,57,43]:[26,122,58]},
    {v:hs,l:'Dégradés/HS',c:hs?[192,57,43]:[26,122,58]},
    {v:retard,l:'Ctrl en retard',c:retard?[192,57,43]:[26,122,58]},
  ];
  const boxW=(pw-28)/5;
  let sy=42;
  stats.forEach((s,i)=>{
    const bx=14+i*(boxW+1);
    doc.setFillColor(248,248,248);doc.setDrawColor(220,220,220);
    doc.roundedRect(bx,sy,boxW,16,2,2,'FD');
    doc.setFontSize(14);doc.setFont('helvetica','bold');
    doc.setTextColor(...s.c);
    doc.text(String(s.v),bx+boxW/2,sy+8,{align:'center'});
    doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(100,100,100);
    doc.text(s.l,bx+boxW/2,sy+13,{align:'center'});
  });

  let curY=66;

  // ── INVENTAIRE
  doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(30,30,30);
  doc.text('Inventaire ('+mats.length+' articles)',14,curY);
  curY+=3;
  const eL2b=e=>({bon:'Bon état',acceptable:'Acceptable',degrade:'Dégradé','hors-service':'Hors service',inconnu:'Non inspecté'}[e]||e);
  const pL2=p=>({confirme:'Présent',absent:'Absent','non-confirme':'Non confirmé',retire:'Retiré'}[p]||p);
  doc.autoTable({
    startY:curY,
    head:[['Désignation','Référence','État','Présence','Vérif 1','Vérif 2','Dernier scan']],
    body:mats.map(m=>{
      const v1=getVerif(m,'lundi');
      const v2=getVerif(m,'semaine');
      const lastScan=scans.filter(s=>s.materielId===m.id).slice(-1)[0];
      return[m.nom,m.id,eL2b(m.etat),pL2(m.presence),
        v1?'✓ '+new Date(v1.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}):'✗ Non faite',
        v2?'✓ '+new Date(v2.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}):'✗ Non faite',
        m.scan?fd(m.scan)+(lastScan?' '+lastScan.agentNom:''):'—'];
    }),
    styles:{fontSize:7,cellPadding:2},
    headStyles:{fillColor:[245,166,35],textColor:255,fontStyle:'bold',fontSize:7},
    columnStyles:{1:{font:'courier',fontSize:6},2:{fontStyle:'bold'},3:{fontStyle:'bold'},4:{fontStyle:'bold'},5:{fontStyle:'bold'}},
    didParseCell:function(data){
      if(data.section==='body'){
        const m=mats[data.row.index];
        const v1=getVerif(m,'lundi');
        const v2=getVerif(m,'semaine');
        if(data.column.index===2) data.cell.styles.textColor=eColor(m?.etat);
        if(data.column.index===3) data.cell.styles.textColor=pColor(m?.presence);
        if(data.column.index===4){data.cell.styles.textColor=v1?[26,122,58]:[192,57,43];}
        if(data.column.index===5){data.cell.styles.textColor=v2?[26,122,58]:[192,57,43];}
        if(!v1||!v2) data.cell.styles.fillColor=!v1?[255,235,235]:[255,248,225];
      }
    },
    margin:{left:14,right:14},
  });
  curY=doc.lastAutoTable.finalY+8;

  // ── CONTRÔLES 2 MOIS
  doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(30,30,30);
  doc.text('Contrôles visuels 2 mois',14,curY);curY+=3;
  doc.autoTable({
    startY:curY,
    head:[['Désignation','Dernier contrôle','Agent','Résultat','Statut']],
    body:mats.map(m=>{
      const last=m.controle2m;
      const late=!last||(new Date()-new Date(last.date))>d2m;
      return[m.nom,last?fd(last.date):'Jamais',last&&last.agentNom?last.agentNom:'—',last?(last.resultat==='ok'?'OK':'Anomalie'):'—',late?'En retard':'OK'];
    }),
    styles:{fontSize:8,cellPadding:2},
    headStyles:{fillColor:[60,60,80],textColor:255,fontStyle:'bold',fontSize:8},
    didParseCell:function(data){
      if(data.section==='body'){
        const m=mats[data.row.index];
        const last=m?.controle2m;
        const late=!last||(new Date()-new Date(last?.date))>d2m;
        if(data.column.index===3) data.cell.styles.textColor=last?.resultat==='ok'?[26,122,58]:[192,57,43];
        if(data.column.index===4) data.cell.styles.textColor=late?[192,57,43]:[26,122,58];
      }
    },
    margin:{left:14,right:14},
  });
  curY=doc.lastAutoTable.finalY+8;

  // ── DERNIÈRES INSPECTIONS
  const lastScans=[...scans].reverse().slice(0,15);
  if(lastScans.length){
    doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(30,30,30);
    doc.text('Dernières inspections ('+lastScans.length+')',14,curY);curY+=3;
    doc.autoTable({
      startY:curY,
      head:[['Désignation','Date','Agent','État','Observations']],
      body:lastScans.map(s=>{
        const m=mats.find(x=>x.id===s.materielId);
        return[m?m.nom:s.materielId,fd(s.date),s.agentNom,eL2(s.etatGeneral),s.observations||'—'];
      }),
      styles:{fontSize:8,cellPadding:2},
      headStyles:{fillColor:[60,80,60],textColor:255,fontStyle:'bold',fontSize:8},
      didParseCell:function(data){
        if(data.section==='body'){
          const s=lastScans[data.row.index];
          if(data.column.index===3) data.cell.styles.textColor=eColor(s?.etatGeneral);
        }
      },
      margin:{left:14,right:14},
    });
  }

  // ── FOOTER sur chaque page
  const pageCount=doc.getNumberOfPages();
  for(let i=1;i<=pageCount;i++){
    doc.setPage(i);
    doc.setFontSize(7);doc.setTextColor(150,150,150);
    doc.text('RailOps — SFERIS · '+now,14,doc.internal.pageSize.getHeight()-6);
    doc.text(c.nom+' · Page '+i+'/'+pageCount,pw-14,doc.internal.pageSize.getHeight()-6,{align:'right'});
  }

  const fname='RailOps_'+c.nom.replace(/[^a-z0-9]/gi,'_').slice(0,30)+'_'+now.replace(/\//g,'-')+'.pdf';
  const blob=doc.output('blob');
  const url=URL.createObjectURL(blob);
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  if(isIOS){
    window.open(url,'_blank');
    toast('PDF prêt — appuie sur ↗ Partager puis "Enregistrer dans Fichiers"','ok');
  } else {
    const a=document.createElement('a');
    a.href=url;a.download=fname;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),10000);
    toast('PDF téléchargé ✓','ok');
  }
}

function exportExcel(){
  const c=getC(S.curC);
  if(!c){toast('Aucun chantier sélectionné','warn');return;}
  const mats=matOfC(S.curC).filter(m=>m.presence!=='retire');
  if(!mats.length){toast('Aucun article à exporter','warn');return;}
  if(typeof XLSX==='undefined'){toast('Librairie Excel non chargée','danger');return;}

  const wb=XLSX.utils.book_new();

  // ── Couleurs SFERIS ──────────────────────────────────────────────
  const ORANGE='FFF47920';
  const BLANC='FFFFFFFF';
  const GRIS_CLAIR='FFF5F5F5';
  const GRIS_EN_TETE='FFE8E8E8';
  const VERT='FF2D7D46';
  const ROUGE='FFC0392B';
  const ORANGE_LIGHT='FFFFF3E0';
  const ROUGE_LIGHT='FFFDECEA';
  const VERT_LIGHT='FFE8F5E9';

  // ── Helpers styles ───────────────────────────────────────────────
  const cellStyle=(bg,color,bold,size,align,border)=>({
    fill:{patternType:'solid',fgColor:{rgb:bg||BLANC}},
    font:{name:'Arial',sz:size||10,bold:!!bold,color:{rgb:color||'FF000000'}},
    alignment:{horizontal:align||'left',vertical:'center',wrapText:false},
    border:border?{top:{style:'thin',color:{rgb:'FFD0D0D0'}},bottom:{style:'thin',color:{rgb:'FFD0D0D0'}},left:{style:'thin',color:{rgb:'FFD0D0D0'}},right:{style:'thin',color:{rgb:'FFD0D0D0'}}}:{}
  });

  // ── Feuille registre ─────────────────────────────────────────────
  const ws={};
  const cols=['A','B','C','D','E','F','G','H'];

  // Ligne 1 : titre
  ws['A1']={v:'REGISTRE MATÉRIEL — '+c.nom.toUpperCase(),t:'s',s:cellStyle(ORANGE,BLANC,true,14,'center')};
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:7}}];

  // Ligne 2 : infos chantier
  const today=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
  ws['A2']={v:'Chantier : '+c.nom+'   |   Chef : '+(c.chef||'—')+'   |   Exporté le : '+today,t:'s',s:cellStyle(GRIS_EN_TETE,'FF555555',false,9,'center')};
  ws['!merges'].push({s:{r:1,c:0},e:{r:1,c:7}});

  // Ligne 3 : en-têtes colonnes
  const headers=['N°','Référence','Désignation','Catégorie','État','Présence','Échéance','Dernier scan'];
  headers.forEach((h,i)=>{
    ws[cols[i]+'3']={v:h,t:'s',s:cellStyle('FF2C3E50',BLANC,true,10,'center',true)};
  });

  // Lignes données
  const presLabel={confirme:'✓ Présent',absent:'✗ Absent','non-confirme':'? Non confirmé',retire:'Retiré'};
  const etatLabel={ok:'✓ OK',hs:'✗ HS',inconnu:'—'};

  // Trier : absents en premier, puis non-confirmés, puis présents
  const sorted=[...mats].sort((a,b)=>{
    const order={absent:0,'non-confirme':1,confirme:2};
    return (order[a.presence]??3)-(order[b.presence]??3);
  });

  sorted.forEach((m,i)=>{
    const row=i+4;
    const bgRow=i%2===0?BLANC:GRIS_CLAIR;
    const presColor=m.presence==='confirme'?VERT:m.presence==='absent'?ROUGE:'FF888888';
    const pressBg=m.presence==='confirme'?VERT_LIGHT:m.presence==='absent'?ROUGE_LIGHT:bgRow;
    const scanDate=m.scan?new Date(m.scan).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}):'—';
    const scanAgent=m.scan?(' / '+(S.users?.find(u=>u.nom===m.scan?.agent)?.nom||m.scan?.agent||'')):'';

    ws['A'+row]={v:i+1,t:'n',s:cellStyle(bgRow,'FF888888',false,9,'center',true)};
    ws['B'+row]={v:m.id,t:'s',s:{...cellStyle(bgRow,'FF333333',true,9,'left',true),font:{name:'Courier New',sz:9,bold:true,color:{rgb:'FF333333'}}}};
    ws['C'+row]={v:m.nom||m.id,t:'s',s:cellStyle(bgRow,'FF222222',false,10,'left',true)};
    ws['D'+row]={v:m.cat||'Outillage',t:'s',s:cellStyle(bgRow,'FF555555',false,9,'center',true)};
    ws['E'+row]={v:etatLabel[m.etat]||'—',t:'s',s:cellStyle(m.etat==='hs'?ROUGE_LIGHT:bgRow,m.etat==='hs'?ROUGE:'FF555555',m.etat==='hs',9,'center',true)};
    ws['F'+row]={v:presLabel[m.presence]||m.presence,t:'s',s:cellStyle(pressBg,presColor,true,9,'center',true)};
    ws['G'+row]={v:m.echeance||'—',t:'s',s:cellStyle(bgRow,'FF555555',false,9,'center',true)};
    ws['H'+row]={v:scanDate+scanAgent,t:'s',s:cellStyle(bgRow,'FF888888',false,9,'left',true)};
  });

  // Ligne récap
  const recapRow=sorted.length+4;
  const nbPresent=sorted.filter(m=>m.presence==='confirme').length;
  const nbAbsent=sorted.filter(m=>m.presence==='absent').length;
  const nbNC=sorted.filter(m=>m.presence==='non-confirme').length;
  ws['A'+recapRow]={v:'TOTAL : '+sorted.length+' article(s)   |   ✓ Présents : '+nbPresent+'   |   ✗ Absents : '+nbAbsent+'   |   ? Non confirmés : '+nbNC,t:'s',s:cellStyle(GRIS_EN_TETE,'FF333333',true,9,'left')};
  ws['!merges'].push({s:{r:recapRow-1,c:0},e:{r:recapRow-1,c:7}});

  // Dimensions colonnes
  ws['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:recapRow,c:7}});
  ws['!cols']=[{wch:5},{wch:18},{wch:35},{wch:14},{wch:10},{wch:14},{wch:12},{wch:22}];
  ws['!rows']=[{hpt:22},{hpt:14},{hpt:16}];

  XLSX.utils.book_append_sheet(wb,ws,'Registre');

  // ── Feuille récap par catégorie ──────────────────────────────────
  const ws2={};
  ws2['A1']={v:'RÉCAP PAR CATÉGORIE — '+c.nom.toUpperCase(),t:'s',s:cellStyle(ORANGE,BLANC,true,12,'center')};
  ws2['!merges']=[{s:{r:0,c:0},e:{r:0,c:4}}];
  ['Catégorie','Total','Présents','Absents','Non confirmés'].forEach((h,i)=>{
    ws2[cols[i]+'2']={v:h,t:'s',s:cellStyle('FF2C3E50',BLANC,true,10,'center',true)};
  });
  const cats={};
  sorted.forEach(m=>{
    const cat=m.cat||'Outillage';
    if(!cats[cat])cats[cat]={total:0,present:0,absent:0,nc:0};
    cats[cat].total++;
    if(m.presence==='confirme')cats[cat].present++;
    else if(m.presence==='absent')cats[cat].absent++;
    else cats[cat].nc++;
  });
  Object.entries(cats).forEach(([cat,v],i)=>{
    const row=i+3;
    const bg=i%2===0?BLANC:GRIS_CLAIR;
    ws2['A'+row]={v:cat,t:'s',s:cellStyle(bg,'FF333333',true,10,'left',true)};
    ws2['B'+row]={v:v.total,t:'n',s:cellStyle(bg,'FF333333',false,10,'center',true)};
    ws2['C'+row]={v:v.present,t:'n',s:cellStyle(v.present>0?VERT_LIGHT:bg,v.present>0?VERT:'FF888888',false,10,'center',true)};
    ws2['D'+row]={v:v.absent,t:'n',s:cellStyle(v.absent>0?ROUGE_LIGHT:bg,v.absent>0?ROUGE:'FF888888',false,10,'center',true)};
    ws2['E'+row]={v:v.nc,t:'n',s:cellStyle(bg,'FF888888',false,10,'center',true)};
  });
  ws2['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:Object.keys(cats).length+3,c:4}});
  ws2['!cols']=[{wch:20},{wch:8},{wch:10},{wch:10},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws2,'Récap catégories');

  // Télécharger
  const filename='RailOps_'+c.nom.replace(/[^a-zA-Z0-9]/g,'_')+'_'+today.replace(/\//g,'-')+'.xlsx';
  XLSX.writeFile(wb,filename);
  toast('Export Excel généré ✓','ok');
}

// ARCHIVE HEBDOMADAIRE
// ══════════════════════════════════════
function getPrevWeekKey(){
  const offsetMs=14*60*60*1000;
  const dt=new Date(Date.now()-offsetMs-7*24*60*60*1000);
  const tmp=new Date(Date.UTC(dt.getUTCFullYear(),dt.getUTCMonth(),dt.getUTCDate()));
  const day=tmp.getUTCDay()||7;
  tmp.setUTCDate(tmp.getUTCDate()+4-day);
  const y=tmp.getUTCFullYear();
  const w=Math.ceil((((tmp-new Date(Date.UTC(y,0,1)))/86400000)+1)/7);
  return y+'-W'+(w<10?'0'+w:w);
}

function isInPrevWeek(dateStr){
  const offsetMs=14*60*60*1000;
  const now=Date.now()-offsetMs;
  const dt=new Date(now);
  const day=dt.getUTCDay()||7;
  const thisMon=new Date(Date.UTC(dt.getUTCFullYear(),dt.getUTCMonth(),dt.getUTCDate()-(day-1)));
  const prevMon=new Date(thisMon.getTime()-7*24*60*60*1000);
  const d=new Date(dateStr);
  return d>=prevMon&&d<thisMon;
}

async function checkAppVersion(){
  if(window._importing) return; // Ne pas recharger pendant un import
  try{
    const {data}=await db.from('app_config').select('value').eq('key','version').single();
    if(data&&data.value!==APP_VERSION){
      // Nouvelle version disponible — vider le cache et recharger

        localStorage.removeItem('ro3_c');

        }
        window.location.reload(true);
      },1500);
    }
  }catch(e){console.warn('version check:',e);}
}

async function cleanStaleVerifs(){
  let changed=false;
  const toReset=[]; // {id, verifLundi, verifSemaine}

  S.mat.forEach((m,i)=>{
    const jr=getJR(m.chantierId);
    const wk=getWeekKey(jr);
    let needsReset=false;
    if(m.verifLundi?.weekKey && m.verifLundi.weekKey!==wk){S.mat[i].verifLundi=null;changed=true;needsReset=true;}
    if(m.verifSemaine?.weekKey && m.verifSemaine.weekKey!==wk){S.mat[i].verifSemaine=null;changed=true;needsReset=true;}
    if(needsReset) toReset.push({id:m.id,verifLundi:null,verifSemaine:null});
  });

  const scansByChantier={};
  S.scans.forEach(s=>{
    const mat=S.mat.find(m=>m.id===s.materielId);
    if(!mat) return;
    const jr=getJR(mat.chantierId);
    const wk=getWeekKey(jr);
    const offsetMs=14*60*60*1000;
    const dt=new Date(new Date(s.date).getTime()-offsetMs);
    const scanDay=new Date(Date.UTC(dt.getUTCFullYear(),dt.getUTCMonth(),dt.getUTCDate()));
    const dayJS=scanDay.getUTCDay();
    const diff=(dayJS-jr+7)%7;
    scanDay.setUTCDate(scanDay.getUTCDate()-diff);
    const scanWk=scanDay.toISOString().split('T')[0];
    if(scanWk===wk){
      if(!scansByChantier[mat.chantierId]) scansByChantier[mat.chantierId]=new Set();
      scansByChantier[mat.chantierId].add(s.materielId);
    }
  });

  S.mat.forEach((m,i)=>{
    const jr=getJR(m.chantierId);
    const wk=getWeekKey(jr);
    const scansThisWeek=scansByChantier[m.chantierId]||new Set();
    if((m.verifLundi?.weekKey===wk||m.verifSemaine?.weekKey===wk)&&!scansThisWeek.has(m.id)){
      S.mat[i].verifLundi=null;S.mat[i].verifSemaine=null;changed=true;
      if(!toReset.find(r=>r.id===m.id)) toReset.push({id:m.id,verifLundi:null,verifSemaine:null});
    }
  });

  // Mettre à jour Supabase en batch (awaité)
  if(toReset.length){
    const CHUNK=50;
    for(let i=0;i<toReset.length;i+=CHUNK){
      const batch=toReset.slice(i,i+CHUNK);
      for(const r of batch){
        await db.from('materiels').update({verifLundi:null,verifSemaine:null}).eq('id',r.id).catch(e=>console.warn('[cleanStaleVerifs]',r.id,e.message));
      }
    }
  }

  if(changed){
    try{localStorage.setItem('ro3_m',JSON.stringify(S.mat));}catch(e){}
    restoreMultiChantier();
    renderTab?.();
  }

  // Purger deleted_ids de plus de 30 jours
  try{
    const cutoff=new Date(Date.now()-30*24*60*60*1000).toISOString();
    await db.from('deleted_ids').delete().lt('supprimé_à',cutoff);
  }catch(e){console.warn('[purge deleted_ids]',e.message);}
}

async function checkWeeklyArchive(){
  if(!S.agent||!['chef','chef_chantier'].includes(S.role)) return;
  const now=new Date();
  const day=now.getDay(); // 0=dim, 1=lun, 2=mar...

  // LUNDI : générer les archives PDF de la semaine précédente
  if(day===1){
    const prevWk=getPrevWeekKey();
    const mesCh=S.role==='chef'
      ?S.chantiers.filter(c=>isChefOf(c)&&c.statut!=='termine')
      :S.chantiers.filter(c=>c.statut!=='termine');

    let generated=0;
    for(const c of mesCh){
      const doneKey=`ro3_archive_${c.id}_${prevWk}`;
      if(localStorage.getItem(doneKey)) continue;
      const scans=S.scans.filter(s=>s.chantierId===c.id&&isInPrevWeek(s.date));
      const mats=S.mat.filter(m=>m.chantierId===c.id);
      if(scans.length===0){localStorage.setItem(doneKey,'0');continue;}
      // Générer le PDF archive
      setTimeout(()=>{
        toast('📄 Archive semaine '+prevWk+' — '+c.nom,'info');
        buildPDF(c,mats,scans,'Archive semaine '+prevWk);
      },generated*1500);
      localStorage.setItem(doneKey,'1');
      generated++;
    }
    if(generated>0) setTimeout(()=>toast(generated+' archive(s) PDF générée(s) ✓','ok'),generated*1500+500);
  }

  // MARDI : purger les scans > 7 jours
  if(day===2){
    const cutoff=new Date(Date.now()-7*24*60*60*1000).toISOString();
    const avant=S.scans.length;
    S.scans=S.scans.filter(s=>s.date>=cutoff);
    if(S.scans.length<avant){
      try{localStorage.setItem('ro3_s',JSON.stringify(S.scans));}catch(e){}
      try{await db.from('scans').delete().lt('date',cutoff);}catch(e){console.warn('purge scans:',e);}
      toast((avant-S.scans.length)+' ancien(s) scan(s) purgé(s)','warn');
    }
  }
}

  const manifest={
    name:'RailOps — SFERIS',
    short_name:'RailOps',
    description:'Gestion et inspection du matériel ferroviaire',
    start_url:'.',
    display:'fullscreen',
    display_override:['fullscreen','standalone'],
    background_color:'#0f1117',
    theme_color:'#f5a623',
    orientation:'portrait',
    icons:[
      {src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='32' fill='%230f1117'/%3E%3Crect x='16' y='16' width='160' height='160' rx='24' fill='%231a1d26'/%3E%3Cpath d='M48 130 L96 54 L144 130' stroke='%23f5a623' stroke-width='12' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='96' cy='108' r='10' fill='%23f5a623'/%3E%3C/svg%3E",sizes:'192x192',type:'image/svg+xml',purpose:'any maskable'},
      {src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%230f1117'/%3E%3Crect x='40' y='40' width='432' height='432' rx='60' fill='%231a1d26'/%3E%3Cpath d='M128 350 L256 140 L384 350' stroke='%23f5a623' stroke-width='28' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='256' cy='290' r='26' fill='%23f5a623'/%3E%3C/svg%3E",sizes:'512x512',type:'image/svg+xml',purpose:'any maskable'}
    ]
  };
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const link=document.createElement('link');
  link.rel='manifest';link.href=url;
  document.head.appendChild(link);


  // Service Worker : désactivé pour éviter le DataCloneError avec Supabase
  // On désinstalle tout service worker existant
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(regs=>{
      regs.forEach(r=>r.unregister());
    });
  }

  // Bouton d'installation PWA (Chrome/Android)
  let deferredPrompt=null;
  window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;showInstallBtn();});
  function showInstallBtn(){
    if(document.getElementById('pwa-btn'))return;
    const btn=document.createElement('button');
    btn.id='pwa-btn';
    btn.textContent='⬇ Installer RailOps';
    btn.style.cssText='position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:999;background:#f5a623;color:#1a0a00;border:none;border-radius:20px;padding:8px 18px;font-size:12px;font-weight:600;cursor:pointer;box-shadow:0 2px 12px rgba(245,166,35,.4);font-family:inherit;';
    btn.onclick=()=>{if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;btn.remove();});}};
    document.body.appendChild(btn);
    setTimeout(()=>{if(btn.parentNode)btn.style.opacity='0';setTimeout(()=>{if(btn.parentNode)btn.remove();},500);},8000);
  }

  // Bannière d'installation iOS Safari
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  const isStandalone=window.navigator.standalone===true;
  const isSafari=/^((?!chrome|android).)*safari/i.test(navigator.userAgent);
  if(isIOS&&!isStandalone&&isSafari){
    const banner=document.createElement('div');
    banner.id='ios-install-banner';
    banner.style.cssText='position:fixed;bottom:env(safe-area-inset-bottom,0px);left:0;right:0;z-index:9999;background:#1a1d26;border-top:1px solid rgba(245,166,35,.3);padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 -4px 20px rgba(0,0,0,.4);cursor:pointer;';
    banner.innerHTML=`
      <div style="flex:1" onclick="(async()=>{try{await navigator.share({title:'RailOps',text:'Suivi matériel SFERIS',url:'https://railops-mauve.vercel.app'});}catch(e){}})()">
        <div style="font-size:13px;font-weight:600;color:#f5a623;margin-bottom:2px">📲 Installer RailOps</div>
        <div style="font-size:11px;color:#aaa;line-height:1.4">Appuie ici → puis <strong style="color:#fff">"Sur l'écran d'accueil"</strong></div>
      </div>
      <button onclick="event.stopPropagation();document.getElementById('ios-install-banner').remove();localStorage.setItem('ios_banner_dismissed','1')" style="background:none;border:none;color:#666;font-size:20px;cursor:pointer;padding:4px;line-height:1">×</button>
    `;
    // Ne pas ré-afficher si déjà fermé
    if(!localStorage.getItem('ios_banner_dismissed')){
      document.addEventListener('DOMContentLoaded',()=>document.body.appendChild(banner));
      setTimeout(()=>{if(!document.getElementById('ios-install-banner'))document.body.appendChild(banner);},500);
    }
  }
  window.addEventListener('appinstalled',()=>{const b=document.getElementById('pwa-btn');if(b)b.remove();});
})();

// Footer — réattaché après chaque render
function attachFooter(){
  const existing=document.getElementById('dev-footer');
  if(existing)existing.remove();
  const f=document.createElement('div');
  f.id='dev-footer';
  f.style.cssText='position:absolute;bottom:60px;left:0;right:0;text-align:center;padding:2px 0;font-size:9px;color:var(--text2);opacity:0.2;pointer-events:none;z-index:5;letter-spacing:0.03em;';
  f.textContent='Développé par Finot Yohan';
  document.getElementById('app')?.appendChild(f);
}
attachFooter();
</script>
</body>
</html>
