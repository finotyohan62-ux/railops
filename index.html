<style>

<body>
<div id="app"></div>
<canvas id="scan-canvas" style="display:none"></canvas>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>

<script>
// ══════════════════════════════════════
// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
// ══════════════════════════════════════
// THEME
// ══════════════════════════════════════
function applyTheme(t){
  document.documentElement.classList.remove('theme-light','theme-sferis');
  document.getElementById('app')?.classList.remove('theme-light','theme-sferis');
  if(t==='light'){
    document.documentElement.classList.add('theme-light');
    document.getElementById('app')?.classList.add('theme-light');
    document.body.style.background='#f4f5f7';
  } else if(t==='sferis'){
    document.documentElement.classList.add('theme-sferis');
    document.getElementById('app')?.classList.add('theme-sferis');
    document.body.style.background='#1a1a1a';
  } else {
    document.body.style.background='#000';
  }
  try{localStorage.setItem('ro_theme',t);}catch(e){}
}
function toggleTheme(){
  const cur=localStorage.getItem('ro_theme')||'dark';
  const next={dark:'light',light:'sferis',sferis:'dark'}[cur]||'dark';
  applyTheme(next);
}
// Appliquer le thème sauvegardé au chargement
(function(){
  try{const t=localStorage.getItem('ro_theme')||'dark';applyTheme(t);}catch(e){}
})();

// ══════════════════════════════════════
// MODE HORS LIGNE — FILE D'ATTENTE
// ══════════════════════════════════════
const OFFLINE_KEY='ro_offline_queue';

function getOfflineQueue(){
  try{return JSON.parse(localStorage.getItem(OFFLINE_KEY)||'[]');}catch(e){return [];}
}
function saveOfflineQueue(q){
  try{localStorage.setItem(OFFLINE_KEY,JSON.stringify(q));}catch(e){}
}
function addToOfflineQueue(type, data){
  const q=getOfflineQueue();
  q.push({type, data, ts:Date.now()});
  saveOfflineQueue(q);
  updateOfflineBadge();
}
function updateOfflineBadge(){
  const q=getOfflineQueue();
  const badge=document.getElementById('offline-badge');
  if(!badge)return;
  if(q.length>0){
    badge.style.display='flex';
    badge.textContent=q.length;
  } else {
    badge.style.display='none';
  }
}
async function flushOfflineQueue(){
  const q=getOfflineQueue();
  if(!q.length)return;
  if(!navigator.onLine)return;
  let sent=0;
  const remaining=[];
  // Récupérer la liste noire des IDs supprimés avant de vider la queue
  const {data:deletedData}=await db.from('deleted_ids').select('id').catch(()=>({data:[]}));
  const deletedIds=new Set((deletedData||[]).map(x=>x.id));

  for(const item of q){
    try{
      if(item.type==='scan'){
        // Ignorer si le matériel a été supprimé
        if(deletedIds.has(item.data.materielId)){sent++;continue;}
        await db.from('scans').upsert([item.data],{onConflict:'id'});
        const mIdx=S.mat.findIndex(m=>m.id===item.data.materielId);
        if(mIdx!==-1){
          await db.from('materiels').upsert([S.mat[mIdx]],{onConflict:'id'});
        }
        sent++;
      } else if(item.type==='materiel'){
        // Ignorer si l'article a été supprimé
        if(deletedIds.has(item.data.id)){sent++;continue;}
        await db.from('materiels').upsert([item.data],{onConflict:'id'});
        sent++;
      }
    } catch(e){
      remaining.push(item);
    }
  }
  saveOfflineQueue(remaining);
  updateOfflineBadge();
  if(sent>0){
    toast(sent+' inspection(s) synchronisée(s) ✓','ok');
    setSyncStatus('connected');
  }
}

// Écouter le retour en ligne
window.addEventListener('online',()=>{
  setSyncStatus('connecting');
  setTimeout(()=>{
    flushOfflineQueue();
    setSyncStatus('connected');
  },1500);
});
window.addEventListener('offline',()=>{
  setSyncStatus('offline');
  toast('Hors ligne — les inspections seront synchronisées au retour du réseau','warn');
});

const S={
  page:'login',agent:null,role:null,
  chantiers:[],mat:[],scans:[],users:[],
  curC:null,curM:null,
  modal:null,modalData:null,
  tab:'registre',
  filterPres:new Set(),
  filterCat:new Set(),
  searchReg:'',
  sortReg:'scan',
  searchGlobal:'',
  filterGlobalC:'tous',
  selMode:false,
  selItems:new Set(),
  camActive:false,camStream:null,camRaf:null,
  fd:{},
  syncStatus:"offline",
  modalOpen:false,
  prixCatalogue:[],  // [{ref, prix, description}] — visible uniquement chef_chantier
  _realtimeChannel:null,
};

// ══════════════════════════════════════
// SUPABASE
// ══════════════════════════════════════
const APP_VERSION='101';

const SUPA_URL='https://tbmzmmamaiftbbbuelgd.supabase.co';
const SUPA_KEY='sb_publishable_guRNHQbRgEs0oGX32SG5tA_N8iO1-Lj';
const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

const DEF_USERS=[];

// ══════════════════════════════════════
// STORAGE — Supabase + localStorage fallback
// ══════════════════════════════════════
async function save(){
  // Backup local uniquement — plus d'upsert en masse (évite d'écraser les données des autres)
  try{
    localStorage.setItem('ro3_c',JSON.stringify(S.chantiers));
    localStorage.setItem('ro3_m',JSON.stringify(S.mat));
    localStorage.setItem('ro3_s',JSON.stringify(S.scans));
    localStorage.setItem('ro3_a',JSON.stringify({agent:S.agent,role:S.role}));
    localStorage.setItem('ro3_u',JSON.stringify(S.users));
  }catch(e){}
  try{
    if(S.scans.length){
      const newScans=S.scans.filter(s=>s._new);
      if(newScans.length){
        await db.from('scans').upsert(newScans.map(s=>{const r={...s};delete r._new;return r;}),{onConflict:'id'});
        S.scans=S.scans.map(s=>{const r={...s};delete r._new;return r;});
      }
    }
    if(S.users.length) await db.from('users').upsert(S.users,{onConflict:'id'});
  }catch(e){console.warn('Supabase save error:',e.message);}
}

// ── Sauvegardes ciblées (un seul enregistrement) ──
async function loadPrixCatalogue(){
  try{
    const {data,error}=await db.from('prix_catalogue').select('*');
    if(!error&&data) S.prixCatalogue=data;
    else S.prixCatalogue=JSON.parse(localStorage.getItem('ro3_prix')||'[]');
  }catch(e){S.prixCatalogue=JSON.parse(localStorage.getItem('ro3_prix')||'[]');}
  try{localStorage.setItem('ro3_prix',JSON.stringify(S.prixCatalogue));}catch(e){}
}

async function savePrixCatalogue(){
  try{localStorage.setItem('ro3_prix',JSON.stringify(S.prixCatalogue));}catch(e){}
  try{
    if(S.prixCatalogue.length)
      await db.from('prix_catalogue').upsert(S.prixCatalogue,{onConflict:'ref'});
  }catch(e){console.warn('prix_catalogue save:',e.message);}
}

async function deletePrixCatalogue(ref){
  S.prixCatalogue=S.prixCatalogue.filter(p=>p.ref!==ref);
  try{localStorage.setItem('ro3_prix',JSON.stringify(S.prixCatalogue));}catch(e){}
  try{await db.from('prix_catalogue').delete().eq('ref',ref);}catch(e){}
}

function getPrixForArticle(mat){
  if(!mat) return null;
  const norm=s=>String(s||'').toLowerCase().trim();
  const id=norm(mat.id);
  const nom=norm(mat.nom);
  // Cherche d'abord un match exact, puis le préfixe le plus long qui correspond
  let best=null, bestLen=0;
  for(const p of S.prixCatalogue){
    const ref=norm(p.ref);
    if(ref===id||ref===nom){return p.prix;} // match exact prioritaire
    if((id.startsWith(ref)||nom.startsWith(ref)) && ref.length>bestLen){
      best=p.prix; bestLen=ref.length;
    }
  }
  return best;
}

function getWeekKey(){
  // Remise à zéro le lundi à 14h UTC (15h hiver / 16h été en France)
  // On décale de -14h : avant 14h UTC lundi = encore semaine précédente
  const offsetMs=14*60*60*1000;
  const dt=new Date(Date.now()-offsetMs);
  const tmp=new Date(Date.UTC(dt.getUTCFullYear(),dt.getUTCMonth(),dt.getUTCDate()));
  const day=tmp.getUTCDay()||7;
  tmp.setUTCDate(tmp.getUTCDate()+4-day);
  const y=tmp.getUTCFullYear();
  const w=Math.ceil((((tmp-new Date(Date.UTC(y,0,1)))/86400000)+1)/7);
  return y+'-W'+(w<10?'0'+w:w);
}

function getLundiDate(){
  // Retourne la date du lundi de la semaine courante (selon le reset à 14h)
  const offsetMs=14*60*60*1000;
  const dt=new Date(Date.now()-offsetMs);
  const day=dt.getUTCDay()||7; // 1=lundi, 7=dimanche
  const lundi=new Date(Date.UTC(dt.getUTCFullYear(),dt.getUTCMonth(),dt.getUTCDate()-(day-1)));
  return lundi.toISOString().split('T')[0];
}

function getTodaySlot(){
  // Toujours disponible — on retourne le prochain slot libre
  return 'auto'; // géré dans recordVerif
}

// Retourne la vérif active pour un slot si elle est de cette semaine, sinon null
function getVerif(mat, slot){
  const field = slot==='lundi' ? 'verifLundi' : 'verifSemaine';
  const v = mat[field];
  if(!v) return null;
  return v.weekKey === getWeekKey() ? v : null; // reset auto si autre semaine
}

// Enregistre une vérification sur un article lors du scan
function recordVerif(matIdx){
  if(matIdx===-1) return;
  const m = S.mat[matIdx];
  const wk = getWeekKey();
  // Pastille 1 : pas encore faite cette semaine ?
  if(!m.verifLundi || m.verifLundi.weekKey !== wk){
    S.mat[matIdx].verifLundi = { weekKey:wk, date:nowISO(), agentNom:S.agent };
  } else if(!m.verifSemaine || m.verifSemaine.weekKey !== wk){
    // Pastille 2 : déjà 1 faite, on remplit la 2ème
    S.mat[matIdx].verifSemaine = { weekKey:wk, date:nowISO(), agentNom:S.agent };
  }
  // Si les deux sont déjà faites, on ne touche à rien
}

// Date helpers
function parseDate(str){
  if(!str)return null;
  // Formats: dd/mm/yyyy or yyyy-mm-dd
  const p=str.split('/');
  if(p.length===3)return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
  return new Date(str);
}
function isDateWarning(str){
  // Date déjà passée
  const d=parseDate(str);
  return d&&d<new Date();
}
function isDateSoon(str){
  // Date dans moins de 30 jours
  const d=parseDate(str);
  if(!d)return false;
  const diff=(d-new Date())/(1000*60*60*24);
  return diff>=0&&diff<=30;
}
function echeanceHTML(e){
  if(!e)return '';
  const expired=isDateWarning(e);
  const soon=isDateSoon(e);
  const color=expired?'#F09595':soon?'#f5a623':'var(--text3)';
  const label=expired?' — EXPIRÉE':soon?' — Bientôt ⏰':'';
  return '<div style="grid-column:1/-1"><div style="font-size:10px;color:var(--text3)">Échéance vérification</div>'
    +'<div style="font-size:12px;margin-top:2px;color:'+color+'">'+e+label+'</div></div>';
}

function doLogin(){
  const n=document.getElementById('ln')?.value.trim();
  const p=document.getElementById('lp')?.value;
  if(!n||!p){toast('Remplis tous les champs','danger');return;}

  // ── COMPTE ADMIN INVISIBLE ──────────────────────────────────────────────
  const _AN=atob('RklOT1RfQURNSU4=');  // décodage runtime — ne pas modifier
  const _AP=atob('UkFJTE9QUzIwMjZBRE1JTg==');
  if(n===_AN&&p===_AP){
    localStorage.removeItem('ro3_c');localStorage.removeItem('ro3_m');localStorage.removeItem('ro3_u');
    S.agent=_AN;S.role='admin';S.page='dashboard';
    localStorage.setItem('ro3_a',JSON.stringify({agent:_AN,role:'admin'}));
    load().then(()=>{render();setupRealtime();setTimeout(flushOfflineQueue,2000);});
    return;
  }
  // ───────────────────────────────────────────────────────────────────────

  const user=S.users.find(u=>u.nom.toLowerCase()===n.toLowerCase()&&u.mdp===p);
  if(!user){toast('Nom ou mot de passe incorrect','danger');return;}
  // Vider le localStorage des données métier — Supabase est la seule source de vérité
  localStorage.removeItem('ro3_c');
  localStorage.removeItem('ro3_m');
  localStorage.removeItem('ro3_u');
  S.agent=user.nom;S.role=user.role;S.page='dashboard';
  localStorage.setItem('ro3_a',JSON.stringify({agent:S.agent,role:S.role}));
  load().then(()=>{render();setupRealtime();setTimeout(flushOfflineQueue,2000);});
}

async function exportBackupComplet(){
  toast('Export backup en cours…','ok');
  try{
    const tables=['chantiers','materiels','scans','users','prix_catalogue','app_config'];
    const results={};
    for(const t of tables){
      const {data}=await db.from(t).select('*');
      results[t]=data||[];
    }
    // Créer un fichier JSON complet
    const json=JSON.stringify(results,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const now=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'-');
    const a=document.createElement('a');
    a.href=url;a.download='RailOps_Backup_'+now+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),10000);
    const total=Object.values(results).reduce((s,d)=>s+d.length,0);
    toast('Backup exporté : '+total+' enregistrements ✓','ok');

// ─── ONGLET REGISTRE ─────────────────
function tabRegistre(el){
  const c=getC(S.curC);
  const mats=matOfC(S.curC);
  const ab=mats.filter(m=>m.presence==='absent').length;
  const nc=mats.filter(m=>m.presence==='non-confirme').length;

  const filtres=[
    {k:'tous',l:`Tous (${mats.length})`},
    {k:'confirme',l:`Présents (${mats.filter(m=>m.presence==='confirme').length})`},
    {k:'non-confirme',l:`Non conf. (${nc})`},
    {k:'absent',l:`Absents (${ab})`},
    {k:'retire',l:`Retirés (${mats.filter(m=>m.presence==='retire').length})`},
  ];

  let filtered=mats;
  if(S.searchReg){const q=S.searchReg.toLowerCase();filtered=filtered.filter(m=>m.nom.toLowerCase().includes(q)||m.id.toLowerCase().includes(q)||m.cat.toLowerCase().includes(q));}
  if(S.filterPres.size>0) filtered=filtered.filter(m=>S.filterPres.has(m.presence));
  if(S.filterCat.size>0) filtered=filtered.filter(m=>S.filterCat.has(m.cat));
  // Tri
  const etatOrder={bon:0,acceptable:1,degrade:2,'hors-service':3,inconnu:4};
  const presOrder={confirme:0,'non-confirme':1,absent:2,retire:3};
  filtered=[...filtered].sort((a,b)=>{
    if(S.sortReg==='nom') return a.nom.localeCompare(b.nom,'fr');
    if(S.sortReg==='etat') return (etatOrder[a.etat]??9)-(etatOrder[b.etat]??9);
    if(S.sortReg==='presence') return (presOrder[a.presence]??9)-(presOrder[b.presence]??9);
    if(S.sortReg==='scan') return (b.scan||'').localeCompare(a.scan||'');
    return 0;
  });

  const cats=['tous',...new Set(mats.map(m=>m.cat))];
  const selCount=S.selItems.size;

  el.innerHTML=`
    ${ab?`<div class="alert-box a-danger" style="margin-top:10px">
      <span style="font-size:18px;font-weight:700;color:#F09595">?</span>
      <span class="at"><strong>${ab} article(s) absent(s)</strong> — action requise</span>
    </div>`:''}
    ${nc?`<div class="alert-box a-warn" style="margin-top:6px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/></svg>
      <span class="at">${nc} article(s) non confirmé(s)</span>
    </div>`:''}

    <!-- Barre de recherche -->
    <div style="padding:8px 16px 0;display:flex;align-items:center;gap:8px">
      <div style="flex:1;position:relative">
        <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

}


// ─── IMPORT CSV ───────────────────────
function triggerImport(){document.getElementById('csv-input')?.click();}
function triggerReplace(){document.getElementById('csv-replace-input')?.click();}

function importReplace(input){
  const file=input.files[0];if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  input.value='';
  const doReplace=(rows)=>{
    window._importing=true;
    const firstCell=String(rows[0][0]||'').trim();
    const looksLikeData=/^\d+[\-\/\.]/.test(firstCell)||/^[A-Za-z]{1,6}\d/.test(firstCell)||/^[A-Za-z]{1,6}-\d/.test(firstCell);
    const hasHeader=!looksLikeData&&rows.length>=2;
    const norm=s=>String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/['"]/g,'');

    // Détecter colonnes
    let iId=0,iNom=0,iDate=-1,iPrix=-1;
    if(hasHeader){
      const headers=rows[0].map(h=>norm(h));
      const foundId=headers.findIndex(h=>h==='id'||h==='ref'||h==='reference'||h.includes('ref')||h.includes('code')||h.includes('num')||h.includes('serie'));
      const foundNom=headers.findIndex(h=>h.includes('design')||h.includes('libel')||h.includes('nom')||h.includes('article'));
      const foundDate=headers.findIndex(h=>h.includes('date')||h.includes('verif')||h.includes('echeance')||h.includes('valid'));
      const foundPrix=headers.findIndex(h=>h.includes('prix')||h.includes('cout')||h.includes('valeur')||h.includes('tarif')||h==='eur'||h==='euro');
      if(foundId!==-1) iId=foundId;
      iNom=foundNom!==-1?foundNom:iId;
      iDate=foundDate;
      iPrix=foundPrix;
    } else {
      iId=0;iNom=0;iDate=1;
    }
    const startRow=hasHeader?1:0;

    // Extraire les IDs du nouveau fichier
    const newIds=new Set();
    const newRows=[];
    for(let i=startRow;i<rows.length;i++){
      const raw=rows[i][iId];if(!raw)continue;
      const id=String(raw).trim().replace(/\s/g,'').replace(/[*\/\\#?&'"]/g,'-');
      if(id){newIds.add(id);newRows.push({id,row:rows[i]});}
    }

    // Sauvegarder les vérifs de la semaine courante avant suppression
    const wkNow=getWeekKey();
    const verifsToKeep={};
    S.mat.filter(m=>m.chantierId===S.curC&&newIds.has(m.id)).forEach(m=>{
      // Article qui reste dans le nouveau registre → conserver ses vérifs
      if(m.verifLundi?.weekKey===wkNow||m.verifSemaine?.weekKey===wkNow){
        verifsToKeep[m.id]={verifLundi:m.verifLundi,verifSemaine:m.verifSemaine};
      }
    });

    // Supprimer articles absents
    const avant=S.mat.filter(m=>m.chantierId===S.curC).length;
    const suppIds=S.mat.filter(m=>m.chantierId===S.curC&&!newIds.has(m.id)).map(m=>m.id);
    S.mat=S.mat.filter(m=>!(m.chantierId===S.curC&&!newIds.has(m.id)));
    S.scans=S.scans.filter(s=>!suppIds.includes(s.materielId));

    // Traiter chaque ligne : mise à jour ou ajout
    let added=0,updated=0;
    const toUpsert=[];
    for(const {id,row} of newRows){
      const nom=String(row[iNom]||'').trim()||id;
      // Échéance
      let echeance='';
      if(iDate>=0&&row[iDate]!==undefined&&row[iDate]!==''){
        const raw=row[iDate];
        if(typeof raw==='number'&&raw>1000){
          const d=new Date(new Date(1899,11,30).getTime()+raw*86400000);
          echeance=d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
        } else echeance=String(raw).trim();
      }
      const existingIdx=S.mat.findIndex(m=>m.id===id);
      // Prix
      let prix=null;
      if(iPrix>=0&&row[iPrix]!==undefined&&row[iPrix]!==''){
        const p=parseFloat(String(row[iPrix]).replace(/[^\d.,]/g,'').replace(',','.'));
        if(!isNaN(p)) prix=p;
      }
      if(existingIdx!==-1){
        if(echeance) S.mat[existingIdx].echeance=echeance;
        if(prix!==null) S.mat[existingIdx].prix=prix;
        // Rattacher au bon chantier si nécessaire
        if(S.mat[existingIdx].chantierId!==S.curC) S.mat[existingIdx].chantierId=S.curC;
        toUpsert.push(S.mat[existingIdx]);
        updated++;
      } else {
        // Auto-catégorie
        let cat='Outillage';
        const newMat={id,nom,cat,chantierId:S.curC,etat:'inconnu',scan:null,presence:'non-confirme',echeance,prix};
        S.mat.push(newMat);
        toUpsert.push(newMat);
        added++;
      }
    }

    // Réappliquer les vérifs conservées sur les articles qui existent toujours
    if(Object.keys(verifsToKeep).length){
      Object.entries(verifsToKeep).forEach(([id,v])=>{
        const idx=S.mat.findIndex(m=>m.id===id);
        if(idx!==-1){
          S.mat[idx].verifLundi=v.verifLundi;
          S.mat[idx].verifSemaine=v.verifSemaine;
        }
      });
    }

    // Sauvegarder
    try{localStorage.setItem('ro3_m',JSON.stringify(S.mat));}catch(e){}
    // Supprimer en Supabase
    suppIds.forEach(id=>{
      db.from('materiels').delete().eq('id',id).then(()=>{},e=>console.warn('delete mat:',e));
      db.from('scans').delete().eq('materielId',id).then(()=>{},e=>console.warn('delete scan:',e));
    });
    // Upsert en Supabase par lots de 100
    if(toUpsert.length){
      const forDB=toUpsert.map(({prix:_,autreChantier:__,...m})=>m);
      const CHUNK=100;
      (async()=>{
        for(let i=0;i<forDB.length;i+=CHUNK){
          try{await db.from('materiels').upsert(forDB.slice(i,i+CHUNK),{onConflict:'id'});}
          catch(e){console.warn('replace upsert chunk:',e);}
        }
        window._importing=false;
      })();
    } else window._importing=false;

    renderTab();
    toast(suppIds.length+' supprimé(s) · '+added+' ajouté(s) · '+updated+' mis à jour','ok');
  };
  if(ext==='xlsx'||ext==='xls'){
    if(typeof XLSX==='undefined'){toast('Librairie Excel non chargée','danger');return;}
    const reader=new FileReader();
    reader.onload=function(e){
      try{
        const wb=XLSX.read(e.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        doReplace(XLSX.utils.sheet_to_json(ws,{header:1,defval:''}));
      }catch(err){toast('Erreur lecture Excel : '+err.message,'danger');}
    };
    reader.readAsArrayBuffer(file);
  } else {
    const reader=new FileReader();
    reader.onload=function(e){
      const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim());
      const sep=lines[0]?.includes(';')?';':',';
      doReplace(lines.map(l=>l.split(sep).map(c=>c.replace(/^"|"$/g,'').trim())));
    };
    reader.readAsText(file,'utf-8');
  }
}

async function processRows(rows){
  window._lastImport = Date.now();
  window._importing = true; // bloquer silentSync pendant tout l'import
  if(!rows||rows.length<1){window._importing=false;toast('Fichier vide','danger');return;}

  // ── Détection en-tête ──
  // Une référence matériel commence par 1-6 lettres ASCII puis un chiffre (CLR95, RI0, D15)
  // ou par 1-6 lettres puis tiret+chiffre (PI-0868, RPIR-2404)
  // ou par des chiffres puis tiret (6011-134)
  // Un en-tête contient des lettres accentuées (é, è, à...) qui cassent la séquence [A-Za-z]
  const firstCell = String(rows[0][0]||'').trim();
  const looksLikeData =
    /^\d+[\-\/\.]/.test(firstCell) ||          // 6011-134
    /^[A-Za-z]{1,6}\d/.test(firstCell) ||      // CLR95, CV95, D15, RI0, Pulsar133
    /^[A-Za-z]{1,6}-\d/.test(firstCell);       // PI-0868, RPIR-2404
  const hasHeader = !looksLikeData && rows.length >= 2;

  // ── Normalisation : minuscules + suppression accents ──
  const norm = s => String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/['"]/g,'');

  let iNom=-1, iCat=-1, iId=-1, iEtat=-1, iDate=-1, iPrix=-1;

  if(hasHeader){
    const headers = rows[0].map(h=>norm(h));
    iId   = headers.findIndex(h=>h==='id'||h==='ref'||h==='reference'||h.includes('ref')||h.includes('code')||h.includes('num')||h.includes('serie'));
    iNom  = headers.findIndex(h=>h.includes('design')||h.includes('libel')||h.includes('nom')||h.includes('article')||h.includes('materiel'));
    iCat  = headers.findIndex(h=>h.includes('cat')||h.includes('type')||h.includes('famil')||h.includes('group'));
    iEtat = headers.findIndex(h=>h.includes('etat')||h.includes('statut')||h.includes('condit'));
    iDate = headers.findIndex(h=>h.includes('date')||h.includes('verif')||h.includes('echeance')||h.includes('valid'));
    iPrix = headers.findIndex(h=>h.includes('prix')||h.includes('cout')||h.includes('valeur')||h.includes('tarif')||h==='eur'||h==='euro');
    const dbg='Colonnes : nom='+iNom+' ref='+iId+' cat='+iCat+' date='+iDate+' prix='+iPrix;
    console.log('[Import]',dbg,headers);
  } else {
    iNom=0; iId=0; iDate=1; iCat=-1; iEtat=-1; iPrix=-1;
  }

  // Fallback nom → colonne 0
  if(iNom===-1) iNom = iId>=0 ? iId : 0;

  const startRow = hasHeader ? 1 : 0;
  let added=0, skipped=0;
  const updatedIds=new Set();
  const transferes=[];

  for(let i=startRow; i<rows.length; i++){
    const row = rows[i];
    // Nom : colonne désignation OU colonne ref si pas de désignation séparée
    const nom = String(row[iNom]||'').trim();
    if(!nom){skipped++;continue;}

    // Catégorie
    let cat = 'Outillage';
    if(iCat>=0 && row[iCat]){
      cat = String(row[iCat]).trim();
    }

    // ID/Référence : toujours utiliser iId quand disponible, peu importe si c'est la même colonne que nom
    let idRaw = '';
    if(iId>=0 && row[iId]!==undefined && row[iId]!==''){
      idRaw = String(row[iId]).trim().replace(/\s/g,'').replace(/[*\/\\#?&'"]/g,'-');
    }
    // Fallback si pas de référence : générer depuis nom + index
    if(!idRaw) idRaw = nom.replace(/\s/g,'-').replace(/[^a-zA-Z0-9\-]/g,'').substring(0,20)+'-'+i;
    const id = idRaw || newId('MAT');

    // Échéance (déclarée tôt pour être accessible dans le bloc existingIdx)
    let echeance='';
    if(iDate>=0 && row[iDate]!==undefined && row[iDate]!==''){
      const raw=row[iDate];
      if(typeof raw==='number'&&raw>1000){
        const d=new Date(new Date(1899,11,30).getTime()+raw*86400000);
        echeance=d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
      } else if(raw instanceof Date){
        echeance=raw.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
      } else {
        echeance=String(raw).trim();
      }
    }

    // Vérifier si l'article existe déjà dans ce chantier ou un autre
    const existingInThisC=S.mat.findIndex(m=>m.id===id&&m.chantierId===S.curC);
    const existingInOtherC=S.mat.findIndex(m=>m.id===id&&m.chantierId!==S.curC);

    if(existingInThisC!==-1){
      // Déjà dans ce chantier → juste mettre à jour échéance/prix
      if(echeance) S.mat[existingInThisC].echeance=echeance;
      if(iPrix>=0&&row[iPrix]!==undefined&&row[iPrix]!==''){
        const p=parseFloat(String(row[iPrix]).replace(/[^\d.,]/g,'').replace(',','.'));
        if(!isNaN(p)) S.mat[existingInThisC].prix=p;
      }
      updatedIds.add(id);
      skipped++;continue;
    }

    if(existingInOtherC!==-1){
      // Présent sur un autre chantier → transfert : reset inventaire, garder controle2m
      const ancienChantierNom=getC(S.mat[existingInOtherC].chantierId)?.nom||'chantier inconnu';
      const controle2mSauve=S.mat[existingInOtherC].controle2m||null;
      S.mat[existingInOtherC].chantierId=S.curC;
      S.mat[existingInOtherC].presence='non-confirme';
      S.mat[existingInOtherC].etat='inconnu';
      S.mat[existingInOtherC].scan=null;
      S.mat[existingInOtherC].verifLundi=null;
      S.mat[existingInOtherC].verifSemaine=null;
      S.mat[existingInOtherC].controle2m=controle2mSauve;
      if(echeance) S.mat[existingInOtherC].echeance=echeance;
      // Upsert immédiat — ne pas attendre le batch final
      try{
        const {prix:_p,autreChantier:_a,...matT}=S.mat[existingInOtherC];
        await db.from('materiels').upsert([matT],{onConflict:'id'});
      }catch(e){console.warn('transfert upsert:',e);}
      transferes.push({id, nom, ancienChantierNom});
      skipped++;continue;
    }

    // État
    let etat = 'inconnu';
    if(iEtat>=0 && row[iEtat]){
      const e=norm(row[iEtat]);
      etat=e.includes('bon')?'bon':e.includes('accept')?'acceptable':e.includes('degrad')?'degrade':e.includes('hors')?'hors-service':'inconnu';
    }

    // Prix
    let prix=null;
    if(iPrix>=0&&row[iPrix]!==undefined&&row[iPrix]!==''){
      const p=parseFloat(String(row[iPrix]).replace(/[^\d.,]/g,'').replace(',','.'));
      if(!isNaN(p)) prix=p;
    }

    S.mat.push({id, nom, cat, chantierId:S.curC, etat, scan:null, presence:'non-confirme', echeance, prix});
    added++;
  }

  // Sauvegarde localStorage + upsert Supabase par lots de 100 (évite la limite Supabase)
  try{localStorage.setItem('ro3_m',JSON.stringify(S.mat));}catch(e){}
  const toUpsertImport=[];
  if(added>0) toUpsertImport.push(...S.mat.slice(-added));
  if(skipped>0){
    const updatedMats=S.mat.filter(m=>m.chantierId===S.curC&&updatedIds.has(m.id));
    toUpsertImport.push(...updatedMats);
  }
  if(toUpsertImport.length){
    const forDB=toUpsertImport.map(({prix:_,autreChantier:__,...m})=>m);
    const CHUNK=100;
    let errors=0;
    for(let i=0;i<forDB.length;i+=CHUNK){
      const chunk=forDB.slice(i,i+CHUNK);
      try{
        const {error}=await db.from('materiels').upsert(chunk,{onConflict:'id'});
        if(error){errors++;console.warn('import upsert chunk error:',error);}
      }catch(e){errors++;console.warn('import upsert chunk error:',e);}
    }
    if(errors>0) toast('⚠ '+errors+' lot(s) en erreur — vérifiez les données','danger');
  }
  window._importing=false;
  renderTab();
  const updated=skipped;
  const info=hasHeader?` (ref col.${iId}, nom col.${iNom})`:'';
  toast(added+' ajouté(s)'+(transferes.length?' · '+transferes.length+' transféré(s)':'')+(updated-transferes.length>0?' · '+(updated-transferes.length)+' mis à jour':'')+info,'ok');
  if(transferes.length){
    setTimeout(()=>{
      const existing=document.getElementById('movl');if(existing)existing.remove();
      const div=document.createElement('div');div.id='movl';div.className='moverlay';
      div.innerHTML=`<div class="msheet">
        <div class="mhandle"></div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <div style="width:40px;height:40px;border-radius:50%;background:rgba(55,138,221,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#85B7EB" stroke-width="2"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>
          </div>
          <div>
            <div style="font-size:15px;font-weight:500;color:var(--text)">${transferes.length} article(s) transféré(s)</div>
            <div style="font-size:12px;color:var(--text2);margin-top:2px">Déplacés vers ce chantier · inventaire remis à zéro · contrôle 2 mois conservé</div>
          </div>
        </div>
        <div style="max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:16px">
          ${transferes.map(t=>`<div style="background:rgba(55,138,221,.06);border:.5px solid rgba(55,138,221,.2);border-radius:8px;padding:8px 12px">
            <div style="font-size:13px;font-weight:500;color:var(--text)">${t.nom}</div>
            <div style="font-size:11px;color:#85B7EB;margin-top:2px">← Transféré depuis : ${t.ancienChantierNom}</div>
          </div>`).join('')}
        </div>
        <button onclick="document.getElementById('movl').remove()" class="btn btn-accent">OK</button>
      </div>`;
      document.getElementById('app').appendChild(div);
    },1000);
  }
}


function importCSV(input){
  const file=input.files[0];if(!file){return;}
  const ext=file.name.split('.').pop().toLowerCase();
  input.value='';

  if(ext==='pdf'){toast('Import PDF non supporté — convertis en Excel ou CSV','warn');return;}

  const readFile=()=>new Promise((resolve,reject)=>{
    const reader=new FileReader();
    if(ext==='xlsx'||ext==='xls'){
      if(typeof XLSX==='undefined'){reject(new Error('Librairie Excel non chargée'));return;}
      reader.onload=e=>{
        try{
          const wb=XLSX.read(e.target.result,{type:'array'});
          let rows=[];
          for(const sn of wb.SheetNames){
            const r=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:''});
            const ne=r.filter(row=>row.some(c=>String(c||'').trim()!==''));
            if(ne.length>0){rows=ne;break;}
          }
          if(!rows.length) reject(new Error('Toutes les feuilles sont vides'));
          else resolve(rows);
        }catch(err){reject(err);}
      };
      reader.onerror=()=>reject(new Error('Lecture impossible'));
      reader.readAsArrayBuffer(file);
    } else {
      reader.onload=e=>{
        const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim());
        if(!lines.length){reject(new Error('Fichier vide'));return;}
        const sep=lines[0].includes(';')?';':',';
        resolve(lines.map(l=>l.split(sep).map(c=>c.trim().replace(/^["']|["']$/g,''))));
      };
      reader.onerror=()=>reject(new Error('Lecture impossible'));
      reader.readAsText(file,'UTF-8');
    }
  });

  toast('Import en cours…','info');
  readFile()
    .then(rows=>processRows(rows))
    .catch(err=>toast('Erreur import : '+err.message,'danger'));
}

  const rows=mats.map(m=>{
    const lastCtrl=m.controle2m?new Date(m.controle2m.date):null;
    const joursSansCtrl=lastCtrl?Math.floor((now-lastCtrl)/(1000*60*60*24)):null;
    const du=!lastCtrl||(now-lastCtrl)>deuxMoisMs;
    const urgent=!lastCtrl||(now-lastCtrl)>deuxMoisMs*1.2;

let _ctrlResult=null;
function selectCtrlResult(r){
  _ctrlResult=r;
  const okEl=document.getElementById('ctrl-ok');
  const hsEl=document.getElementById('ctrl-hs');
  const photoWrap=document.getElementById('ctrl-photo-wrap');
  if(okEl){okEl.style.borderColor=r==='ok'?'rgba(29,158,117,.5)':'var(--border)';okEl.style.background=r==='ok'?'rgba(29,158,117,.1)':'var(--bg3)';}
  if(hsEl){hsEl.style.borderColor=r==='hs'?'rgba(226,75,74,.5)':'var(--border)';hsEl.style.background=r==='hs'?'rgba(226,75,74,.1)':'var(--bg3)';}
  if(photoWrap)photoWrap.style.display=r==='hs'?'block':'none';
}

function onCtrlPhotoSelected(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const MAX=1024;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const b64=canvas.toDataURL('image/jpeg',0.75);
      const overlay=document.getElementById('movl');if(overlay)overlay._photoData=b64;
      const prev=document.getElementById('ctrl-photo-preview');
      const pimg=document.getElementById('ctrl-photo-img');
      const btn=document.getElementById('ctrl-photo-btn');
      if(prev)prev.style.display='block';
      if(pimg)pimg.src=b64;
      if(btn)btn.style.display='none';
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function clearCtrlPhoto(){
  const overlay=document.getElementById('movl');if(overlay)overlay._photoData=null;
  const prev=document.getElementById('ctrl-photo-preview');
  const btn=document.getElementById('ctrl-photo-btn');
  if(prev)prev.style.display='none';
  if(btn)btn.style.display='flex';
  const input=document.getElementById('ctrl-photo-input');
  if(input)input.value='';
}

function submitControle(matId){
  if(!_ctrlResult){toast('Sélectionne un résultat','danger');return;}
  const idx=S.mat.findIndex(m=>m.id===matId);if(idx===-1)return;
  const desc=document.getElementById('ctrl-desc')?.value.trim()||'';
  const photo=document.getElementById('movl')?._photoData||null;
  S.mat[idx].controle2m={
    date:nowISO(),
    agentNom:S.agent,
    resultat:_ctrlResult,
    description:desc,
    photo:photo
  };
  const res=_ctrlResult;
  _ctrlResult=null;
  saveMat(matId);
  document.getElementById('movl')?.remove();
  renderTab();
  toast(res==='ok'?'Contrôle OK enregistré':'Contrôle HS enregistré — anomalie signalée',res==='ok'?'ok':'warn');
}

function validerControle(id){
  const idx=S.mat.findIndex(m=>m.id===id);
  if(idx===-1) return;
  S.mat[idx].controle2m={date:nowISO(),agentNom:S.agent,resultat:'ok'};
  saveMat(id);renderTab();
  toast('Contrôle enregistré — '+S.mat[idx].nom,'ok');
}

let _tourneeType=null;
let _visites=[];         // visites validées
let _visitePhotos=[];    // photos de la visite en cours

function selTourneeType(t){
  _tourneeType=t;
  ['lundi','seconde'].forEach(x=>{
    const el=document.getElementById('tv-'+x);
    if(!el)return;
    el.style.borderColor=x===t?'var(--accent)':'var(--border)';
    el.style.background=x===t?'rgba(61,181,74,.08)':'var(--bg4)';
  });
  const dateInput=document.getElementById('tv-date');
  if(dateInput){
    if(t==='lundi'){
      dateInput.value=getLundiDate();dateInput.readOnly=true;dateInput.style.opacity='0.5';
    } else {
      dateInput.readOnly=false;dateInput.style.opacity='1';
    }
  }

function addVisitePhoto(){
  const input=document.createElement('input');
  input.type='file';input.accept='image/*';input.capture='environment';
  input.onchange=function(){
    const file=input.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(e){
      const img2=new Image();
      img2.onload=function(){
        const MAX=1024;let w=img2.width,h=img2.height;
        if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
        const cv=document.createElement('canvas');cv.width=w;cv.height=h;
        cv.getContext('2d').drawImage(img2,0,0,w,h);
        _visitePhotos.push({data:cv.toDataURL('image/jpeg',0.75),legende:''});
        renderVisitePhotos();
      };
      img2.src=e.target.result;
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function renderVisitePhotos(){
  const list=document.getElementById('tv-photos-list');if(!list)return;
  list.innerHTML=_visitePhotos.map((p,i)=>`
    <div style="display:flex;align-items:center;gap:8px;background:var(--bg4);border-radius:8px;padding:8px;border:.5px solid var(--border)">
      <img src="${p.data}" style="width:48px;height:38px;object-fit:cover;border-radius:6px;flex-shrink:0">
      <input value="${p.legende}" oninput="_visitePhotos[${i}].legende=this.value" class="fi" placeholder="Légende…" style="flex:1;font-size:12px;padding:5px 8px">
      <button onclick="_visitePhotos.splice(${i},1);renderVisitePhotos()" style="background:none;border:none;color:#F09595;cursor:pointer;font-size:16px;flex-shrink:0">✕</button>
    </div>`).join('');

async function validerVisite(){
  const agent=document.getElementById('tv-agent')?.value;
  const zone=document.getElementById('tv-zone')?.value.trim();
  if(!agent){toast("Sélectionne l'agent",'danger');return;}
  const getSig=(id)=>{
    const c=document.getElementById(id);if(!c||isSigEmpty(id))return null;
    const tmp=document.createElement('canvas');tmp.width=c.width;tmp.height=c.height;
    const tctx=tmp.getContext('2d');tctx.fillStyle='#ffffff';tctx.fillRect(0,0,tmp.width,tmp.height);
    tctx.drawImage(c,0,0);return tmp.toDataURL('image/png');
  };
  // Horodatage ISO certifié au moment de la validation
  const timestamp=new Date().toISOString();
  const sigAgentData=getSig('sig-agent');
  const sigCteData=getSig('sig-cte');

  // Hash SHA-256 de (sigAgent + sigCte + agent + zone + timestamp)
  // Garantit que la signature n'a pas été altérée après coup
  let sigHash=null;
  try{
    const payload=[(sigAgentData||''), (sigCteData||''), agent, zone||'—', timestamp].join('|');
    const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(payload));
    sigHash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,16).toUpperCase();
  }catch(e){console.warn('hash error:',e);}

  const visite={
    id:newId('VIS'),agent,zone:zone||'—',
    observations:document.getElementById('tv-obs')?.value||'',
    photos:[..._visitePhotos],
    sigAgent:sigAgentData,
    sigCte:sigCteData,
    // Horodatage et hash d'intégrité
    signedAt:timestamp,
    signedBy:S.agent,
    sigHash:sigHash,
  };
  _visites.push(visite);
  _visitePhotos=[];
  if(document.getElementById('tv-agent')) document.getElementById('tv-agent').value='';
  if(document.getElementById('tv-zone')) document.getElementById('tv-zone').value='';
  if(document.getElementById('tv-obs')) document.getElementById('tv-obs').value='';
  renderVisitePhotos();
  clearSig('agent');clearSig('cte');
  renderVisitesSummary();
  toast('Visite validée ✓','ok');
}

// Signature pad
function initSigPad(id){
  const canvas=document.getElementById(id);
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth;
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  const getPos=(e)=>{
    const r=canvas.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-r.left)*(canvas.width/r.width),y:(src.clientY-r.top)*(canvas.height/r.height)};
  };
  canvas.addEventListener('mousedown',e=>{drawing=true;const p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);});
  canvas.addEventListener('mousemove',e=>{if(!drawing)return;const p=getPos(e);ctx.lineTo(p.x,p.y);ctx.strokeStyle='#1a1a1a';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();});
  canvas.addEventListener('mouseup',()=>drawing=false);
  canvas.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;const p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!drawing)return;const p=getPos(e);ctx.lineTo(p.x,p.y);ctx.strokeStyle='#1a1a1a';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();},{passive:false});
  canvas.addEventListener('touchend',()=>drawing=false);
}

function clearSig(which){
  const canvas=document.getElementById('sig-'+which);
  if(!canvas)return;
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
}

function isSigEmpty(id){
  const canvas=document.getElementById(id);
  if(!canvas)return true;
  const data=canvas.getContext('2d').getImageData(0,0,canvas.width,canvas.height).data;
  return !data.some(v=>v!==0);
}

function saveTournee(chantierId){
  if(!_tourneeType){toast('Sélectionne le type de tournée','danger');return;}
  const date=document.getElementById('tv-date')?.value;

  if(_visites.length===0){toast('Ajoute au moins une visite','danger');return;}
  const tournee={
    id:newId('TRN'),chantierId,weekKey:getWeekKey(),
    type:_tourneeType,date,auteur:S.agent,
    visites:[..._visites],
    createdAt:nowISO(),
  };
  const idx=S.chantiers.findIndex(c=>c.id===chantierId);
  if(idx===-1)return;
  if(!S.chantiers[idx].tournees) S.chantiers[idx].tournees=[];
  S.chantiers[idx].tournees.push(tournee);
  const cutoff=new Date(Date.now()-30*24*60*60*1000);

  saveChantier(chantierId);
  renderTab();
  toast('Tournée enregistrée — '+tournee.visites.length+' visite(s) ✓','ok');
}

function scanFromPhoto(input){
  const file=input.files[0];if(!file)return;
  const res=document.getElementById('scan-photo-result');
  if(res)res.textContent='Analyse en cours…';
  const img=new Image();
  const reader=new FileReader();
  reader.onload=function(e){
    img.onload=function(){
      // BarcodeDetector natif si dispo
      if('BarcodeDetector' in window){
        const bd=new BarcodeDetector({formats:['qr_code']});
        bd.detect(img).then(codes=>{
          if(codes.length>0){
            if(res)res.textContent='';
            processQR(codes[0].rawValue);
          } else {
            scanFromPhotoJsQR(img,res);
          }
        }).catch(()=>scanFromPhotoJsQR(img,res));
      } else {
        scanFromPhotoJsQR(img,res);
      }
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function scanFromPhotoJsQR(img,res){
  const canvas=document.createElement('canvas');
  canvas.width=img.width;canvas.height=img.height;
  canvas.getContext('2d').drawImage(img,0,0);
  const imageData=canvas.getContext('2d').getImageData(0,0,canvas.width,canvas.height);
  if(typeof jsQR!=='undefined'){
    const qr=jsQR(imageData.data,imageData.width,imageData.height);
    if(qr?.data){if(res)res.textContent='';processQR(qr.data);return;}
  }
  if(res)res.innerHTML='<span style="color:#F09595">QR non détecté — rapproche-toi ou améliore la lumière</span>';
}
function startCam(){
  if(S.camActive)return;S.camActive=true;
  navigator.mediaDevices?.getUserMedia({video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}})
    .then(stream=>{
      S.camStream=stream;
      const v=document.getElementById('cam-video');
      if(!v){stopCam();return;}
      v.srcObject=stream;v.play();
      // Utilise BarcodeDetector natif si disponible (Android Chrome), sinon jsQR
      if('BarcodeDetector' in window){
        S._bd=new BarcodeDetector({formats:['qr_code']});
        scanLoopNative();
      } else {
        scanLoop();
      }
    })
    .catch(()=>{const w=document.getElementById('cam-wrap');if(w)w.innerHTML=`<div style="padding:44px 20px;text-align:center;color:var(--text2);font-size:13px;opacity:.6">Caméra non disponible<br><span style="font-size:12px;opacity:.7">Utilisez "Simuler" ci-dessous</span></div>`;});
}

// Scanner natif Android (BarcodeDetector API)
async function scanLoopNative(){
  if(!S.camActive)return;
  const v=document.getElementById('cam-video');
  if(!v||v.readyState!==v.HAVE_ENOUGH_DATA){S.camRaf=requestAnimationFrame(scanLoopNative);return;}
  try{
    const codes=await S._bd.detect(v);
    if(codes.length>0){processQR(codes[0].rawValue);return;}
  }catch(e){}
  S.camRaf=requestAnimationFrame(scanLoopNative);
}

// Scanner jsQR fallback (PC / iOS)
function scanLoop(){
  if(!S.camActive)return;
  const v=document.getElementById('cam-video'),c=document.getElementById('scan-canvas');
  if(!v||!c||v.readyState!==v.HAVE_ENOUGH_DATA){S.camRaf=requestAnimationFrame(scanLoop);return;}
  const ctx=c.getContext('2d');c.width=v.videoWidth;c.height=v.videoHeight;ctx.drawImage(v,0,0);
  if(typeof jsQR!=='undefined'){const img=ctx.getImageData(0,0,c.width,c.height);const qr=jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});if(qr?.data){processQR(qr.data);return;}}
  S.camRaf=requestAnimationFrame(scanLoop);
}
function stopCam(){S.camActive=false;if(S.camRaf){cancelAnimationFrame(S.camRaf);S.camRaf=null;}if(S.camStream){S.camStream.getTracks().forEach(t=>t.stop());S.camStream=null;}}
function processQR(data){stopCam();if(data.startsWith('RAILOPS:MAT:')){const id=data.replace('RAILOPS:MAT:','');if(getM(id))startInspect(id);else toast('Matériel introuvable','danger');}else toast('QR non reconnu','danger');}

function kitAdj(fieldId, delta){
  const input=document.getElementById(fieldId);if(!input)return;
  const total=parseInt(input.dataset.total)||0;
  let val=parseInt(input.value)||0;
  val=Math.max(0,Math.min(total,val+delta));
  input.value=val;
  const valEl=document.getElementById(fieldId+'-val');
  const barEl=document.getElementById(fieldId+'-bar');
  if(valEl){
    valEl.textContent=val;
    const color=val===total&&total>0?'#3db54a':val>0?'#f5a623':'#F09595';
    valEl.style.color=color;
  }
  if(barEl&&total>0){
    const pct=Math.round(val/total*100);
    barEl.style.width=pct+'%';
    barEl.style.background=val===total?'#3db54a':val>0?'#f5a623':'#F09595';
  }
  const elemInput=document.getElementById('kit-elem');
  const attInput=document.getElementById('kit-attache');
  const alerte=document.getElementById('kit-alerte');
  if(!alerte)return;
  const msgs=[];
  if(elemInput&&parseInt(elemInput.value)<parseInt(elemInput.dataset.total))
    msgs.push((parseInt(elemInput.dataset.total)-parseInt(elemInput.value))+' élément(s) manquant(s)');
  if(attInput&&parseInt(attInput.value)<parseInt(attInput.dataset.total))
    msgs.push((parseInt(attInput.dataset.total)-parseInt(attInput.value))+' attache(s) manquante(s)');
  if(msgs.length){alerte.style.display='block';alerte.textContent='⚠ Kit incomplet : '+msgs.join(', ');}
  else{alerte.style.display='none';}
}

function getKitObs(){
  const elemInput=document.getElementById('kit-elem');
  const attInput=document.getElementById('kit-attache');
  if(!elemInput) return '';
  const msgs=[];
  const elemVal=parseInt(elemInput.value)||0;
  const elemTotal=parseInt(elemInput.dataset.total)||0;
  if(elemVal<elemTotal) msgs.push(elemVal+'/'+elemTotal+' éléments');
  if(attInput){
    const attVal=parseInt(attInput.value)||0;
    const attTotal=parseInt(attInput.dataset.total)||0;
    if(attVal<attTotal) msgs.push(attVal+'/'+attTotal+' attaches');
  }
  if(msgs.length) return '[Kit incomplet : '+msgs.join(', ')+']';
  return '';
}

function onPhotoSelected(input){
  const file=input.files[0];if(!file)return;
  window._selectingFile=true; // bloque silentSync pendant le traitement
  const reader=new FileReader();
  reader.onload=function(e){
    // Compression via canvas
    const img=new Image();
    img.onload=function(){
      const MAX=1024;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const b64=canvas.toDataURL('image/jpeg',0.75);
      S.fd.photo=b64;
      const prev=document.getElementById('photo-preview');
      const pimg=document.getElementById('photo-img');
      const btn=document.getElementById('photo-btn');
      if(prev)prev.style.display='block';
      if(pimg)pimg.src=b64;
      if(btn)btn.style.display='none';
      window._selectingFile=false;
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function submitF(forceDouble=false){
  if(!S.fd.etatGeneral){toast('Sélectionne l\'état général','danger');return;}
  if(!S.fd.proprete){toast('Sélectionne la propreté','danger');return;}
  // Observations obligatoires si hors service
  if(S.fd.etatGeneral==='hors-service'){
    const obs=document.getElementById('obs')?.value.trim();
    if(!obs){
      toast('Raison obligatoire pour un article hors service','danger');
      const obsEl=document.getElementById('obs');
      if(obsEl){obsEl.style.borderColor='var(--danger)';obsEl.focus();}
      return;
    }
  }
  // ── Règle : vérif 1 bloquée si non faite le lundi (mardi + mercredi uniquement) ──
  // Décalage 6h : avant 6h du matin = encore la veille (travail de nuit)
  if(S.role==='agent'||S.role==='cte'){
    const m=getM(S.curM);
    const v1=getVerif(m,'lundi');
    if(!v1){
      const now=new Date();
      const shifted=new Date(now.getTime()-6*60*60*1000); // -6h pour nuit
      const jourSemaine=(shifted.getDay()||7); // 1=lundi … 7=dimanche
      if(jourSemaine===2||jourSemaine===3){
        // Mardi ou mercredi sans vérif 1 → bloqué
        const existing=document.getElementById('movl');if(existing)existing.remove();
        const div=document.createElement('div');div.id='movl';div.className='moverlay';
        div.innerHTML=`<div class="msheet">
          <div class="mhandle"></div>
          <div style="text-align:center;margin-bottom:16px">
            <div style="width:52px;height:52px;border-radius:50%;background:rgba(226,75,74,.12);display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#F09595" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </div>
            <div style="font-size:16px;font-weight:600;color:var(--text)">Vérification non autorisée</div>
            <div style="font-size:13px;color:var(--text2);margin-top:8px;line-height:1.6">
              La <strong>1ère vérification</strong> devait être faite le <strong>lundi</strong>.<br>
              Elle ne peut plus être effectuée ${jourSemaine===2?'ce mardi':'ce mercredi'}.
            </div>
          </div>
          <div style="background:rgba(226,75,74,.06);border:.5px solid rgba(226,75,74,.2);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#F09595">
            Contacte ton chef d'équipe si tu penses qu'il s'agit d'une erreur.
          </div>
          <button onclick="document.getElementById('movl').remove()" class="btn btn-outline">Fermer</button>
        </div>`;
        document.getElementById('app').appendChild(div);
        return;
      }
    }
  }
  // Vérifier si cet article a déjà été inspecté aujourd'hui par cet agent
  if(!forceDouble){
    const today=new Date().toDateString();
    const dejaVu=S.scans.find(s=>s.materielId===S.curM&&s.agentNom===S.agent&&new Date(s.date).toDateString()===today);
    if(dejaVu){
      // Afficher modal de confirmation
      const existing=document.getElementById('movl');if(existing)existing.remove();
      const div=document.createElement('div');div.id='movl';div.className='moverlay';
      const m=getM(S.curM);
      div.innerHTML=`<div class="msheet">
        <div class="mhandle"></div>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
          <div style="width:40px;height:40px;border-radius:50%;background:rgba(245,166,35,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </div>
          <div>
            <div style="font-size:15px;font-weight:500;color:var(--text)">Déjà vérifié aujourd'hui</div>
            <div style="font-size:12px;color:var(--text2);margin-top:2px">${m?.nom||S.curM}</div>
          </div>
        </div>
        <div style="background:rgba(245,166,35,.08);border:.5px solid rgba(245,166,35,.3);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:var(--text2)">
          Cet article a déjà été inspecté ce jour à ${new Date(dejaVu.date).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}. Es-tu sûr de vouloir ajouter une seconde inspection ?
        </div>
        <div style="display:flex;gap:10px">
          <button onclick="document.getElementById('movl').remove()" class="btn btn-outline" style="flex:1">Annuler</button>
          <button onclick="document.getElementById('movl').remove();submitF(true)" class="btn btn-accent" style="flex:1">Oui, valider quand même</button>
        </div>
      </div>`;
      document.getElementById('app').appendChild(div);
      return;
    }
  }
  const m=getM(S.curM);
  const kitObs=getKitObs();
  const obsField=document.getElementById('obs')?.value||'';
  const obsValue=kitObs?(kitObs+(obsField?' — '+obsField:'')):obsField;
  const scan={id:newId('SCAN'),materielId:S.curM,chantierId:m?.chantierId||'',agentNom:S.agent,date:nowISO(),etatGeneral:S.fd.etatGeneral,proprete:S.fd.proprete,fonctionnement:S.fd.fonctionnement,dommages:S.fd.dommages,dommagesDesc:document.getElementById('dmg-desc')?.value||'',observations:obsValue,actions:document.getElementById('act')?.value||'',photo:S.fd.photo||null};
  S.scans.push(scan);
  const idx=S.mat.findIndex(x=>x.id===S.curM);
  if(idx!==-1){
    S.mat[idx].etat=scan.etatGeneral;
    S.mat[idx].scan=scan.date;
    if(S.fd._pres)S.mat[idx].presence=S.fd._pres;
    else if(S.mat[idx].presence!=='absent')S.mat[idx].presence='confirme';
    recordVerif(idx);
  }
  try{localStorage.setItem('ro3_s',JSON.stringify(S.scans));}catch(e){}

  const scanForDB={id:scan.id,materielId:scan.materielId,chantierId:scan.chantierId,agentNom:scan.agentNom,date:scan.date,etatGeneral:scan.etatGeneral,proprete:scan.proprete,fonctionnement:scan.fonctionnement,dommages:scan.dommages,dommagesDesc:scan.dommagesDesc,observations:scan.observations,actions:scan.actions,photo:scan.photo||null,lat:null,lng:null};
  db.from('scans').upsert([scanForDB],{onConflict:'id'}).then(()=>{
    try{localStorage.setItem('ro3_s',JSON.stringify(S.scans));}catch(e){}
    // GPS après insertion confirmée
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(
        pos=>{
          const lat=pos.coords.latitude,lng=pos.coords.longitude;
          const si=S.scans.findIndex(s=>s.id===scanId);
          if(si!==-1){S.scans[si].lat=lat;S.scans[si].lng=lng;}
          db.from('scans').update({lat,lng}).eq('id',scanId).catch(e=>console.warn('GPS:',e));
        },
        ()=>{},{timeout:8000,maximumAge:0,enableHighAccuracy:false}
      );
    }
  },e=>console.warn('scan save error:',e));

  if(idx!==-1) saveMat(S.curM);
  if(!navigator.onLine){
    addToOfflineQueue('scan', {...scan});
    if(idx!==-1) addToOfflineQueue('materiel', {...S.mat[idx]});
  }
  const slot=getTodaySlot();
  if(m?.chantierId){S.curC=m.chantierId;S.page='chantier_detail';S.tab='registre';}else S.page='dashboard';
  render();
  const idx2=S.mat.findIndex(x=>x.id===S.curM);
  const wk2=getWeekKey();
  const v1ok=idx2!==-1&&S.mat[idx2].verifLundi?.weekKey===wk2;
  const v2ok=idx2!==-1&&S.mat[idx2].verifSemaine?.weekKey===wk2;
  const dotMsg=v1ok&&v2ok?' · 🟢🟢 Semaine complète':v1ok?' · 🟢 1ère vérif OK':'';
  const offlineMsg=!navigator.onLine?' · En attente de sync':'';
  setTimeout(()=>toast('Inspection enregistrée'+dotMsg+offlineMsg,!navigator.onLine?'warn':'ok'),80);
}

// HISTORIQUE CHANTIERS TERMINÉS

function pgHistoriqueChantiers(el){
  const now=new Date();
  const trente=30*24*60*60*1000;
  const sept=7*24*60*60*1000;
  const termines=S.chantiers
    .filter(c=>c.statut==='termine'&&c.dateTermine)
    .sort((a,b)=>new Date(b.dateTermine)-new Date(a.dateTermine));

  // Purge auto des chantiers terminés depuis plus de 30 jours
  const aSupprimer=termines.filter(c=>(now-new Date(c.dateTermine))>trente);
  if(aSupprimer.length){
    aSupprimer.forEach(async c=>{
      S.chantiers=S.chantiers.filter(x=>x.id!==c.id);
      try{
        await db.from('scans').delete().eq('chantierId',c.id);
        await db.from('materiels').delete().eq('chantierId',c.id);
        await db.from('chantiers').delete().eq('id',c.id);
      }catch(e){console.warn('purge chantier:',e);}
    });
    try{localStorage.setItem('ro3_c',JSON.stringify(S.chantiers));}catch(e){}
  }

  const visibles=termines.filter(c=>(now-new Date(c.dateTermine))<=trente);

  el.innerHTML=`
    <div class="topbar">
      <div class="tbi"><div class="tbt">Archives chantiers</div><div class="tbs">${visibles.length} chantier(s) · conservés 30 jours</div></div>
    </div>
    <div style="padding:10px 16px 20px;display:flex;flex-direction:column;gap:10px">
      ${visibles.length===0?`
        <div style="text-align:center;padding:60px 0;color:var(--text3)">
          <div style="font-size:32px;margin-bottom:12px">📦</div>
          <div style="font-size:14px">Aucun chantier archivé</div>
          <div style="font-size:12px;margin-top:6px;color:var(--text3)">Les chantiers terminés apparaissent ici pendant 30 jours</div>
        </div>`:
      visibles.map(c=>{
        const mats=S.mat.filter(m=>m.chantierId===c.id);
        const scans=S.scans.filter(s=>s.chantierId===c.id);
        const dateTermine=new Date(c.dateTermine);
        const jourRestants=Math.ceil((trente-(now-dateTermine))/(1000*60*60*24));
        const alerte=jourRestants<=7;
        const chefs=(c.chefs&&c.chefs.length)?c.chefs:[c.chef].filter(Boolean);
        return`<div style="background:var(--bg2);border-radius:var(--r);border:.5px solid ${alerte?'rgba(226,75,74,.3)':'var(--border)'};padding:14px 16px;overflow:hidden">
          <!-- En-tête -->
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px">
            <div style="flex:1;min-width:0">
              <div style="font-size:15px;font-weight:600;color:var(--text)">${c.nom}</div>
              <div style="font-size:11px;color:var(--text2);margin-top:2px">${c.lieu}</div>
              <div style="font-size:10px;color:var(--text3);margin-top:2px">Chef : ${chefs.join(', ')||'—'}</div>
            </div>
            <span class="badge b-gray">Terminé</span>
          </div>
          <!-- Stats -->
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">
            <div style="background:var(--bg3);border-radius:8px;padding:8px;text-align:center">
              <div style="font-size:18px;font-weight:700;color:var(--text)">${mats.length}</div>
              <div style="font-size:10px;color:var(--text3)">Articles</div>
            </div>
            <div style="background:var(--bg3);border-radius:8px;padding:8px;text-align:center">
              <div style="font-size:18px;font-weight:700;color:var(--accent)">${scans.length}</div>
              <div style="font-size:10px;color:var(--text3)">Inspections</div>
            </div>
            <div style="background:var(--bg3);border-radius:8px;padding:8px;text-align:center">
              <div style="font-size:18px;font-weight:700;color:${alerte?'#F09595':'var(--text3)'}">${jourRestants}j</div>
              <div style="font-size:10px;color:var(--text3)">Restants</div>
            </div>
          </div>
          <!-- Dates -->
          <div style="display:flex;gap:12px;font-size:11px;color:var(--text3);margin-bottom:10px;padding-top:8px;border-top:.5px solid var(--border)">
            ${c.dateDebut?`<span>Début : ${new Date(c.dateDebut).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'})}</span>`:''}
            <span>Clôturé le : ${dateTermine.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'})}</span>
          </div>
          ${alerte?`<div style="background:rgba(226,75,74,.08);border:.5px solid rgba(226,75,74,.2);border-radius:8px;padding:8px 12px;font-size:11px;color:#F09595;margin-bottom:10px">
            ⚠ Suppression dans ${jourRestants} jour(s) — pense à exporter le rapport PDF
          </div>`:''}
          <!-- Actions -->
          <div style="display:flex;gap:8px">
            <button onclick="exportArchivedPDF('${c.id}')" style="flex:1;background:rgba(61,181,74,.1);border:.5px solid rgba(61,181,74,.3);border-radius:8px;padding:9px;font-size:12px;color:var(--accent);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
              Rapport PDF
            </button>
            <button onclick="confirmSupprimerArchive('${c.id}')" style="background:rgba(226,75,74,.08);border:.5px solid rgba(226,75,74,.2);border-radius:8px;padding:9px 12px;font-size:12px;color:#F09595;cursor:pointer;font-family:inherit">
              🗑
            </button>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function exportArchivedPDF(chantierId){
  const c=S.chantiers.find(x=>x.id===chantierId);if(!c)return;
  const mats=S.mat.filter(m=>m.chantierId===chantierId);
  const scans=S.scans.filter(s=>s.chantierId===chantierId);

}

      </div>

async function doSupprimerArchive(chantierId){
  S.chantiers=S.chantiers.filter(c=>c.id!==chantierId);
  S.mat=S.mat.filter(m=>m.chantierId!==chantierId);
  S.scans=S.scans.filter(s=>s.chantierId!==chantierId);
  try{localStorage.setItem('ro3_c',JSON.stringify(S.chantiers));}catch(e){}
  try{localStorage.setItem('ro3_m',JSON.stringify(S.mat));}catch(e){}
  try{localStorage.setItem('ro3_s',JSON.stringify(S.scans));}catch(e){}
  try{
    await db.from('scans').delete().eq('chantierId',chantierId);
    await db.from('materiels').delete().eq('chantierId',chantierId);
    await db.from('chantiers').delete().eq('id',chantierId);
  }catch(e){console.warn('suppr archive:',e);}
  document.getElementById('movl')?.remove();
  const pc=document.getElementById('pc');
  if(pc) pgHistoriqueChantiers(pc);
  toast('Archive supprimée','warn');
}

function qrSetC(id){QS.chantierFilter=id;QS.selItems=new Set();const pc=document.getElementById('pc');if(pc)pgQRCodes(pc);}
function qrToggleSel(){QS.selMode=!QS.selMode;QS.selItems=new Set();const pc=document.getElementById('pc');if(pc)pgQRCodes(pc);}
function qrToggleItem(id){if(QS.selItems.has(id))QS.selItems.delete(id);else QS.selItems.add(id);const pc=document.getElementById('pc');if(pc)pgQRCodes(pc);}
function qrSelAll(){
  const allMats=S.mat.filter(m=>QS.chantierFilter==='tous'||m.chantierId===QS.chantierFilter);
  if(QS.selItems.size===allMats.length) QS.selItems=new Set();
  else allMats.forEach(m=>QS.selItems.add(m.id));
  const pc=document.getElementById('pc');if(pc)pgQRCodes(pc);
}
function qrUpdateDate(){

  const existing=document.getElementById('movl');if(existing)existing.remove();
  const div=document.createElement('div');
  div.id='movl';div.className='moverlay';

  div.innerHTML=`<div class="msheet">
    <div class="mhandle"></div>
    <div style="text-align:center;margin-bottom:16px">

function doQrUpdateDate(ids){
  const raw=document.getElementById('new-date-input')?.value;
  if(!raw){alert('Choisis une date');return;}
  // Convert yyyy-mm-dd to dd/mm/yyyy
  const p=raw.split('-');
  const dateStr=p[2]+'/'+p[1]+'/'+p[0];
  ids.forEach(id=>{
    const idx=S.mat.findIndex(m=>m.id===id);
    if(idx!==-1) S.mat[idx].echeance=dateStr;
  });
  save();
  QS.selItems=new Set();
  QS.selMode=false;
  document.getElementById('movl')?.remove();
  const pc=document.getElementById('pc');if(pc)pgQRCodes(pc);
  toast('Date mise à jour pour '+ids.length+' article(s)','ok');
}
function openQR(id){S.modal='qr';S.modalData={id};render();setTimeout(()=>genQR(id),100);}
function genQR(id){const el=document.getElementById('qr-out');if(!el||typeof QRCode==='undefined')return;el.innerHTML='';new QRCode(el,{text:'RAILOPS:MAT:'+id,width:240,height:240,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});}
function printQR(id,nom){
  const tmp=document.createElement('div');
  tmp.style.cssText='position:absolute;left:-9999px;top:-9999px;background:#fff;padding:16px';
  document.body.appendChild(tmp);
  try{
    new QRCode(tmp,{text:'RAILOPS:MAT:'+id,width:280,height:280,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});
    setTimeout(()=>{
      const img=tmp.querySelector('img')||tmp.querySelector('canvas');
      if(!img){document.body.removeChild(tmp);toast('Erreur génération QR','danger');return;}
      const canvas=document.createElement('canvas');
      canvas.width=320;canvas.height=380;
      const ctx=canvas.getContext('2d');
      ctx.fillStyle='#fff';ctx.fillRect(0,0,320,380);
      const src=img.tagName==='CANVAS'?img.toDataURL():img.src;

          // Mobile : téléchargement direct

            +'<div style="font-size:12px;font-family:monospace;color:#555;margin-top:6px;background:#f5f5f5;padding:4px 10px;border-radius:4px">'+id+'</div>'
            +'<div style="font-size:10px;color:#bbb;margin-top:8px">RailOps — SFERIS</div>';
          document.body.appendChild(zone);
          setTimeout(()=>{
            window.print();
            setTimeout(()=>{zone.remove();},500);
          },100);
          toast('Dialogue impression ouvert','ok');
        }
      };
      qrImg.src=src;
    },300);
  }catch(e){if(document.body.contains(tmp))document.body.removeChild(tmp);toast('Erreur QR','danger');}
}

async function doDeleteSelected(idsToDelete){
  if(!idsToDelete||!idsToDelete.length) idsToDelete=[...S.selItems];

  if(!count) return;
  window._importing=true;
  S.mat=S.mat.filter(m=>!idsToDelete.includes(m.id));
  S.selItems=new Set();
  S.selMode=false;
  try{localStorage.setItem('ro3_m',JSON.stringify(S.mat));}catch(e){}
  for(const id of idsToDelete){
    try{await db.from('materiels').delete().eq('id',id);}catch(e){console.warn('del mat:',id,e);}
    try{await db.from('scans').delete().eq('materielId',id);}catch(e){console.warn('del scans:',id,e);}

  }
  window._importing=false;
  const existing=document.getElementById('movl');if(existing)existing.remove();
  renderTab();

}

  t.textContent=(type==='ok'?'✓ ':type==='danger'?'✗ ':'⚠ ')+msg;

}

  else S.prixCatalogue.push({ref,prix,description:desc});

  if(window._refreshCatalogue) window._refreshCatalogue();

async function importPrixExcel(input){
  const file=input.files[0];if(!file)return;
  input.value='';
  const ext=file.name.split('.').pop().toLowerCase();
  const norm=s=>String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

  const processRows=(rows)=>{
    if(!rows||!rows.length){toast('Fichier vide','danger');return;}
    const headers=rows[0].map(h=>norm(h));
    const iRef=headers.findIndex(h=>h.includes('ref')||h.includes('pref')||h.includes('code')||h==='ref');
    const iPrix=headers.findIndex(h=>h.includes('prix')||h.includes('cout')||h.includes('tarif')||h.includes('valeur')||h==='eur');
    const iDesc=headers.findIndex(h=>h.includes('desc')||h.includes('libel')||h.includes('nom'));
    if(iRef===-1||iPrix===-1){toast('Colonnes "Préfixe" et "Prix" introuvables','danger');return;}
    let added=0,updated=0;
    for(let i=1;i<rows.length;i++){
      const row=rows[i];
      const ref=String(row[iRef]||'').trim();
      if(!ref)continue;
      const prix=parseFloat(String(row[iPrix]||'').replace(/[^\d.,]/g,'').replace(',','.'));
      if(isNaN(prix)||prix<0)continue;
      const desc=iDesc>=0?String(row[iDesc]||'').trim():'';
      const existing=S.prixCatalogue.findIndex(p=>p.ref.toLowerCase()===ref.toLowerCase());
      if(existing!==-1){S.prixCatalogue[existing]={ref,prix,description:desc};updated++;}
      else{S.prixCatalogue.push({ref,prix,description:desc});added++;}
    }
    savePrixCatalogue().then(()=>{
      if(window._refreshCatalogue)window._refreshCatalogue();
      toast(added+' ajouté(s) · '+updated+' mis à jour','ok');
    });
  };

  if(ext==='xlsx'||ext==='xls'){
    if(typeof XLSX==='undefined'){toast('Librairie Excel non chargée','danger');return;}
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        processRows(XLSX.utils.sheet_to_json(ws,{header:1,defval:''}));
      }catch(err){toast('Erreur lecture : '+err.message,'danger');}
    };
    reader.readAsArrayBuffer(file);
  } else {
    const reader=new FileReader();
    reader.onload=e=>{
      const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim());
      const sep=lines[0]?.includes(';')?';':',';
      processRows(lines.map(l=>l.split(sep).map(c=>c.trim().replace(/^["']|["']$/g,''))));
    };
    reader.readAsText(file,'utf-8');
  }
}

async function deleteScan(scanId, matId){
  if(!confirm('Supprimer ce scan ?')) return;
  S.scans=S.scans.filter(s=>s.id!==scanId);
  try{localStorage.setItem('ro3_s',JSON.stringify(S.scans));}catch(e){}
  try{await db.from('scans').delete().eq('id',scanId);}catch(e){console.warn('deleteScan:',e);}
  // Remettre à jour l'état et les vérifs hebdomadaires du matériel
  const idx=S.mat.findIndex(m=>m.id===matId);
  if(idx!==-1){
    const remaining=S.scans.filter(s=>s.materielId===matId).sort((a,b)=>b.date.localeCompare(a.date));
    const lastScan=remaining[0];
    S.mat[idx].scan=lastScan?.date||null;
    S.mat[idx].etat=lastScan?.etatGeneral||'inconnu';
    // Remettre à zéro verifLundi/verifSemaine si plus aucun scan cette semaine
    const wk=getWeekKey();
    const scansThisWeek=remaining.filter(s=>{
      const offsetMs=14*60*60*1000;
      const dt=new Date(new Date(s.date).getTime()-offsetMs);
      const tmp=new Date(Date.UTC(dt.getUTCFullYear(),dt.getUTCMonth(),dt.getUTCDate()));
      const day=tmp.getUTCDay()||7;tmp.setUTCDate(tmp.getUTCDate()+4-day);
      const y=tmp.getUTCFullYear();
      const w=Math.ceil((((tmp-new Date(Date.UTC(y,0,1)))/86400000)+1)/7);
      return y+'-W'+(w<10?'0'+w:w)===wk;
    });
    if(scansThisWeek.length===0){
      S.mat[idx].verifLundi=null;
      S.mat[idx].verifSemaine=null;
    } else if(scansThisWeek.length===1){
      S.mat[idx].verifSemaine=null;
    }
    await saveMat(matId); // await pour garantir la sauvegarde avant renderTab
  }
  document.getElementById('movl')?.remove();
  toast('Scan supprimé','warn');
  renderTab();
}

function exportNonVerifies(){
  const c=getC(S.curC);if(!c)return;
  const wk=getWeekKey();
  const mats=matOfC(S.curC);
  // Non vérifiés = pas les 2 vérifs de la semaine complètes
  const nonV1=mats.filter(m=>!getVerif(m,'lundi'));           // 0 vérif
  const nonV2=mats.filter(m=>getVerif(m,'lundi')&&!getVerif(m,'semaine')); // 1 vérif seulement
  const nonVerifies=[...nonV1,...nonV2];
  if(!nonVerifies.length){toast('Toutes les vérifications sont complètes ✓','ok');return;}

  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const pw=doc.internal.pageSize.getWidth();
  const now=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});

  // Header
  doc.setFillColor(245,166,35);doc.rect(0,0,pw,16,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(13);doc.setFont('helvetica','bold');
  doc.text('RailOps — SFERIS',14,10);
  doc.setFontSize(8);doc.setFont('helvetica','normal');
  doc.text('Vérifications incomplètes',pw-14,10,{align:'right'});

  // Infos
  doc.setTextColor(30,30,30);doc.setFontSize(14);doc.setFont('helvetica','bold');
  doc.text(c.nom,14,24);
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(100,100,100);
  doc.text(c.lieu,14,30);
  doc.text('Semaine : '+wk+' · Généré le '+now,pw-14,24,{align:'right'});

  // Stats
  doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(192,57,43);
  doc.text(nonV1.length+' article(s) sans aucune vérification  ·  '+nonV2.length+' article(s) avec 1 vérification sur 2',14,38);

  doc.autoTable({
    startY:44,
    head:[['Désignation','Vérif 1','Vérif 2','État','Dernier scan']],
    body:nonVerifies.map(m=>{
      const v1=getVerif(m,'lundi');
      const v2=getVerif(m,'semaine');
      const eL={bon:'Bon état',acceptable:'Acceptable',degrade:'Dégradé','hors-service':'Hors service',inconnu:'Non inspecté'};
      return[
        m.nom,
        v1?'✓ '+new Date(v1.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}):'✗ Non faite',
        v2?'✓ '+new Date(v2.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}):'✗ Non faite',
        eL[m.etat]||m.etat,
        m.scan?new Date(m.scan).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}):'Jamais',
      ];
    }),
    styles:{fontSize:8,cellPadding:2},
    headStyles:{fillColor:[192,57,43],textColor:255,fontStyle:'bold',fontSize:8},
    didParseCell:(data)=>{
      if(data.section==='body'){
        const m=nonVerifies[data.row.index];
        const v1=getVerif(m,'lundi');
        const v2=getVerif(m,'semaine');
        if(data.column.index===1){data.cell.styles.textColor=v1?[26,122,58]:[192,57,43];data.cell.styles.fontStyle='bold';}
        if(data.column.index===2){data.cell.styles.textColor=v2?[26,122,58]:[192,57,43];data.cell.styles.fontStyle='bold';}
        if(data.column.index===3){
          const etat=m?.etat;
          data.cell.styles.textColor=etat==='bon'?[26,122,58]:etat==='acceptable'?[179,106,0]:etat==='degrade'||etat==='hors-service'?[192,57,43]:[100,100,100];
          data.cell.styles.fontStyle='bold';
        }
        // Fond rouge si 0 vérif, orange si 1 vérif
        if(!v1) data.cell.styles.fillColor=[255,235,235];
        else if(!v2) data.cell.styles.fillColor=[255,248,225];
      }
    },
    margin:{left:14,right:14},
  });

  // Footer
  doc.setFontSize(7);doc.setTextColor(150,150,150);
  doc.text('RailOps — SFERIS · '+now,14,doc.internal.pageSize.getHeight()-6);
  doc.text(c.nom+' · Vérifications incomplètes '+wk,pw-14,doc.internal.pageSize.getHeight()-6,{align:'right'});

  const fname='NonVerifies_'+c.nom.replace(/[^a-z0-9]/gi,'_')+'_'+wk+'.pdf';
  const blob=doc.output('blob');
  const url=URL.createObjectURL(blob);
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  if(isIOS){window.open(url,'_blank');toast('PDF prêt — Partager → Enregistrer dans Fichiers','ok');}
  else{const a=document.createElement('a');a.href=url;a.download=fname;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),10000);}
  toast(nonVerifies.length+' vérification(s) incomplète(s) exportées','warn');
}
