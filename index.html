<head>

<title>RailOps — SFERIS</title>
<meta name="theme-color" content="#f5a623">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RailOps">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
:root{
  --bg:#0f1117;--bg2:#1a1d26;--bg3:#232635;--bg4:#2c2f40;
  --accent:#3db54a;--text:#f0f0f0;--text2:#9096a8;--text3:#5c6170;
  --danger:#e24b4a;--success:#1D9E75;--info:#378ADD;
  --border:rgba(255,255,255,0.08);--r:12px;
}
.theme-light{
  --bg:#f4f5f7;--bg2:#ffffff;--bg3:#eaecf0;--bg4:#d8dce6;
  --accent:#2a9e38;--text:#1a1d26;--text2:#5c6170;--text3:#9096a8;
  --danger:#e24b4a;--success:#1D9E75;--info:#378ADD;
  --border:rgba(0,0,0,0.1);
  background:#f4f5f7;
}
.theme-sferis{
  --bg:#f2f3f5;--bg2:#ffffff;--bg3:#e8e9ec;--bg4:#dddfe4;
  --accent:#F47920;--text:#2c2c2c;--text2:#6D6E71;--text3:#9a9b9e;
  --danger:#e24b4a;--success:#1D9E75;--info:#378ADD;
  --border:rgba(0,0,0,0.09);
  background:#f2f3f5;
}
html,body{height:100%;width:100%;background:#000;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin:0;padding:0;}
#app{position:fixed;inset:0;width:100%;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;margin:0;padding:0;padding-left:env(safe-area-inset-left,0px);padding-right:env(safe-area-inset-right,0px);padding-top:env(safe-area-inset-top,0px)}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:20px}
.screen::-webkit-scrollbar{display:none}
*::-webkit-scrollbar{display:none}
.sb{padding:10px 20px 4px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:var(--bg)}
.sb .t{font-size:13px;font-weight:500;color:var(--text)}
.sb .r{font-size:11px;color:var(--text2)}
.topbar{padding:12px 16px 10px;background:var(--bg);border-bottom:.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:10px}
.tbk{background:none;border:none;color:var(--text2);cursor:pointer;padding:2px;display:flex;flex-shrink:0}
.tbi{flex:1;min-width:0}
.tbt{font-size:19px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbs{font-size:12px;color:var(--text2);margin-top:2px}
.bnav{position:relative;width:100%;background:var(--bg2);border-top:.5px solid var(--border);display:flex;padding:8px 0 env(safe-area-inset-bottom,12px);z-index:100;flex-shrink:0}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;background:none;border:none}
.ni svg{width:20px;height:20px;stroke:var(--text3);fill:none;stroke-width:1.8}
.ni.active svg{stroke:var(--accent)}
.nl{font-size:10px;color:var(--text3)}
.ni.active .nl{color:var(--accent)}
.card{background:var(--bg2);border-radius:var(--r);padding:14px;border:.5px solid var(--border)}
.badge{font-size:10px;font-weight:500;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.b-ok{background:rgba(29,158,117,.2);color:#5DCAA5}
.b-warn{background:rgba(61,181,74,.2);color:#3db54a}
.b-danger{background:rgba(226,75,74,.2);color:#F09595}
.b-info{background:rgba(55,138,221,.18);color:#85B7EB}
.b-gray{background:rgba(255,255,255,.08);color:var(--text2)}
.b-purple{background:rgba(127,119,221,.2);color:#AFA9EC}
.fl{font-size:12px;color:var(--text2);margin-bottom:7px;display:block;margin-top:14px}
.fi{width:100%;background:var(--bg3);border:.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--text);outline:none;font-family:inherit;transition:border-color .15s}
.fi:focus{border-color:var(--accent)}
textarea.fi{resize:none;line-height:1.5}
select.fi{cursor:pointer}
.ro{background:var(--bg3);border:.5px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;text-align:center;font-size:13px;transition:all .15s;color:var(--text2)}
.ro.sel-ok{border-color:var(--success);background:rgba(29,158,117,.1);color:#5DCAA5;font-weight:500}
.ro.sel-warn{border-color:var(--accent);background:rgba(61,181,74,.08);color:var(--accent);font-weight:500}
.ro.sel-danger{border-color:var(--danger);background:rgba(226,75,74,.1);color:#F09595;font-weight:500}
.tgl-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border-radius:10px;padding:12px 14px;border:.5px solid var(--border)}
.tgl{width:44px;height:24px;border-radius:12px;background:var(--bg4);position:relative;cursor:pointer;transition:background .2s;border:.5px solid var(--border);flex-shrink:0}
.tgl.on{background:var(--accent);border-color:var(--accent)}
.tgl-th{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:2px;left:3px;transition:left .2s}
.tgl.on .tgl-th{left:21px}
.btn{padding:12px 20px;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:opacity .15s;width:100%;text-align:center}
.btn:active{opacity:.8}
.btn-accent{background:var(--accent);color:#1a0a00}
.btn-outline{background:transparent;color:var(--text);border:.5px solid var(--border)}
.btn-ghost{background:var(--bg3);color:var(--text2);border:.5px solid var(--border)}
.btn-danger{background:rgba(226,75,74,.12);color:#F09595;border:.5px solid rgba(226,75,74,.25)}
.sec{font-size:11px;font-weight:500;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;padding:14px 16px 8px}
.li{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:.5px solid var(--border)}
.li:last-child{border-bottom:none}
.ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ib{flex:1;min-width:0}
.it{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.is{font-size:11px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.alert-box{margin:10px 16px 0;padding:10px 14px;border-radius:var(--r);display:flex;align-items:center;gap:10px}
.a-danger{background:rgba(226,75,74,.1);border:.5px solid rgba(226,75,74,.3)}
.a-warn{background:rgba(61,181,74,.1);border:.5px solid rgba(61,181,74,.3)}
.a-ok{background:rgba(29,158,117,.1);border:.5px solid rgba(29,158,117,.3)}
.at{font-size:12px}
.a-danger .at{color:#F09595}
.a-warn .at{color:var(--accent)}
.a-ok .at{color:#5DCAA5}
.chips{display:flex;gap:8px;padding:10px 16px 0;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.chip{background:var(--bg3);color:var(--text2);font-size:11px;padding:5px 12px;border-radius:20px;white-space:nowrap;cursor:pointer;border:.5px solid var(--border);flex-shrink:0}
.chip.on{background:var(--accent);color:#1a0a00;border-color:var(--accent);font-weight:500}
.moverlay{position:absolute;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;flex-direction:column;justify-content:flex-end}
.msheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:16px 16px 32px;max-height:92vh;overflow-y:auto}
.mhandle{width:38px;height:4px;background:var(--bg3);border-radius:2px;margin:0 auto 16px}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#1a0a00;flex-shrink:0}
.pbar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:8px}
.pbf{height:100%;border-radius:2px}
.fab{position:absolute;bottom:76px;right:18px;width:46px;height:46px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:11}
.fab svg{width:20px;height:20px;stroke:#1a0a00;fill:none;stroke-width:2.5}
/* TABS */
.tabs{display:flex;padding:0 16px;gap:4px;margin-top:12px;flex-shrink:0}
.tab{flex:1;padding:9px 6px;text-align:center;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;border-radius:10px;background:var(--bg3);border:.5px solid var(--border);transition:all .15s}
.tab.on{background:var(--accent);color:#1a0a00;border-color:var(--accent)}
/* PRÉSENCE STATUS */
.ps-ok{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:rgba(29,158,117,.15);flex-shrink:0}
.ps-warn{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:rgba(61,181,74,.15);flex-shrink:0}
.ps-absent{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:rgba(226,75,74,.15);flex-shrink:0;animation:pulse-red 2s ease-in-out infinite}
@keyframes pulse-red{0%,100%{background:rgba(226,75,74,.15)}50%{background:rgba(226,75,74,.3)}}
/* REGISTRE ITEM */
.reg-item{background:var(--bg2);border-radius:var(--r);padding:12px 14px;border:.5px solid var(--border);margin-bottom:8px;transition:border-color .15s}
.reg-item.absent{border-color:rgba(226,75,74,.5);background:rgba(226,75,74,.05)}
.reg-item.non-confirme{border-color:rgba(61,181,74,.3)}
.reg-item.present{border-color:rgba(29,158,117,.25)}
.reg-top{display:flex;align-items:center;gap:10px}
.reg-body{margin-top:10px;padding-top:10px;border-top:.5px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
/* SCANNER */
.cam-wrap{position:relative;background:#000;min-height:250px;flex-shrink:0}
#cam-video{width:100%;display:block;object-fit:cover;max-height:290px}
.scan-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;pointer-events:none}
.scan-frame{width:190px;height:190px;position:relative}
.scan-frame::before,.scan-frame::after{content:'';position:absolute;width:34px;height:34px;border-color:var(--accent);border-style:solid}
.scan-frame::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.scan-frame::after{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.sftr{position:absolute;top:0;right:0;width:34px;height:34px;border-color:var(--accent);border-style:solid;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.sfbl{position:absolute;bottom:0;left:0;width:34px;height:34px;border-color:var(--accent);border-style:solid;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.scan-beam{position:absolute;left:8px;right:8px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:beam 2.2s ease-in-out infinite}
@keyframes beam{0%,100%{top:10%;opacity:0}10%{opacity:1}90%{opacity:1}50%{top:88%}}
.scan-hint{background:rgba(0,0,0,.65);border-radius:20px;padding:7px 14px;font-size:12px;color:rgba(255,255,255,.8)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px 0}
.stat-card{background:var(--bg2);border-radius:var(--r);padding:12px 14px;border:.5px solid var(--border)}
.sv{font-size:26px;font-weight:500;color:var(--text)}
.sl{font-size:11px;color:var(--text2);margin-top:2px}
.rg2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
/* CHANTIER CARD */
.cc{background:var(--bg2);border-radius:var(--r);padding:14px 16px;border:.5px solid var(--border);cursor:pointer;margin-bottom:10px}
.cc:active{border-color:var(--accent)}
@keyframes pulse-sync{0%,100%{opacity:1}50%{opacity:.3}}
@media print{
  body > *:not(#print-zone){display:none!important}
  #print-zone{display:flex!important;position:fixed;inset:0;background:#fff;align-items:center;justify-content:center;z-index:9999}
}
</style>
