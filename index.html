async function lancerImportMulti(mode='ajouter'){
  const sheetsData=window._multiImportSheets;
  if(!sheetsData){alert('Pas de données en mémoire');return;}

  const configs={};
  sheetsData.forEach(s=>{
    const sel=document.getElementById('cfg-'+s.sn);
    configs[s.sn]=sel?sel.value:'creer';
  });
  const parentSel=document.getElementById('cfg-parent')?.value||'';
  const newParentNom=document.getElementById('new-parent-nom')?.value.trim()||'';
  document.getElementById('movl')?.remove();

  // Créer le chantier parent si besoin
  let parent_id=null;
  if(parentSel==='creer_parent'&&newParentNom){
    parent_id=newId('CH');
    const p={id:parent_id,nom:newParentNom,lieu:newParentNom,chef:S.agent,chefs:[S.agent],statut:'actif',desc:'',dateDebut:'',dateFin:'',agents:[],tournees:[],parent_id:null};
    S.chantiers.push(p);
    try{localStorage.setItem('ro3_c',JSON.stringify(S.chantiers));}catch(e){}
    await db.from('chantiers').upsert([{id:p.id,nom:p.nom,lieu:p.lieu,chef:p.chef,chefs:p.chefs,statut:p.statut,desc:p.desc,dateDebut:p.dateDebut,dateFin:p.dateFin,agents:p.agents,tournees:[],parent_id:null}],{onConflict:'id'}).then(()=>{},()=>{});
    toast('Parent "'+newParentNom+'" créé ✓','ok');
  } else if(parentSel&&parentSel!=='creer_parent'){
    parent_id=parentSel;
  }

  let totalAdded=0, totalChantiers=0;
  window._importing=true;
  window._lastImport=Date.now();

  try{

  // 1. Créer tous les chantiers d'abord
  const chantierMap={};
  for(const s of sheetsData){
    const val=configs[s.sn]||'creer';
    if(val==='ignorer') continue;
    if(val.startsWith('exist_')){
      chantierMap[s.sn]=val.replace('exist_','');
    } else {
      // Mode remplacer : jamais de création — ignorer les onglets sans chantier cible
      if(mode==='remplacer') continue;
      const chantierId=newId('CH');
      const c={id:chantierId,nom:s.sn,lieu:s.sn,chef:S.agent,chefs:[S.agent],statut:'actif',desc:'',dateDebut:'',dateFin:'',agents:[],tournees:[],parent_id:parent_id||null};
      S.chantiers.push(c);
      chantierMap[s.sn]=chantierId;
      totalChantiers++;
    }
  }
  try{localStorage.setItem('ro3_c',JSON.stringify(S.chantiers));}catch(e){}

  // Upsert UNIQUEMENT les nouveaux chantiers créés (jamais les exist_ existants)
  const newChantiersToInsert=[];
  sheetsData.forEach(s=>{
    const val=configs[s.sn]||'creer';
    if(val==='ignorer'||val.startsWith('exist_')) return; // skip existants et ignorés
    const id=chantierMap[s.sn];
    if(!id) return;
    const c=S.chantiers.find(x=>x.id===id);
    if(!c) return;
    newChantiersToInsert.push({id:c.id,nom:c.nom,lieu:c.lieu,chef:c.chef,chefs:c.chefs,statut:c.statut,desc:c.desc,dateDebut:c.dateDebut,dateFin:c.dateFin,agents:c.agents,tournees:[],parent_id:c.parent_id||null});
  });
  if(newChantiersToInsert.length){
    console.log('[Import] Insert nouveaux chantiers →', newChantiersToInsert.map(c=>c.id+'/'+c.nom));
    const {error}=await db.from('chantiers').upsert(newChantiersToInsert,{onConflict:'id'});
    if(error){
      toast('Err création chantiers : '+error.message,'danger');
      console.error('[Import] ERREUR insert chantiers:', error);
    } else {
      console.log('[Import] Nouveaux chantiers insérés ✓');
    }
  }

  // 2. Vider S.mat des anciens articles pour ces chantiers (import propre)
  const targetIds=new Set(Object.values(chantierMap));
  S.mat=S.mat.filter(m=>!targetIds.has(m.chantierId));

  // Mode "remplacer" : supprimer aussi les anciens articles en Supabase
  if(mode==='remplacer'){
    for(const chantierId of targetIds){
      await db.from('materiels').delete().eq('chantierId',chantierId).catch(e=>console.warn('delete mat remplacer:',e));
      console.log('[Remplacer] Articles supprimés pour',chantierId);
    }
  }

  // 3. Upsert des articles onglet par onglet — chunks de 100 + vérification .select()
  const CHUNK_SIZE=100;
  for(const s of sheetsData){
    const chantierId=chantierMap[s.sn];
    if(!chantierId) continue;

    const articles=parseOnglet(s,chantierId);
    console.log('[Import]',s.sn,'→ chantierId:',chantierId,'articles trouvés:',articles.length);
    if(!articles.length) continue;

    // Bloquer les transferts inter-chantiers — tagger autreChantier si conflit
    articles.forEach(m=>{
      const existing=S.mat.find(x=>x.id===m.id);
      if(existing && existing.chantierId!==m.chantierId){
        // Doublon inter-chantier → stocker comme ref externe, badge persistant
        saveMultiChantier(m.id,[existing.chantierId, m.chantierId]);
        existing.autreChantier=m.chantierId;
        try{
          const extMap=JSON.parse(localStorage.getItem('ro3_ext')||'{}');
          extMap[m.chantierId]=extMap[m.chantierId]||[];
          if(!extMap[m.chantierId].includes(m.id)) extMap[m.chantierId].push(m.id);
          localStorage.setItem('ro3_ext',JSON.stringify(extMap));
        }catch(e){}
        console.warn('[Import] Ref externe:',m.id,'→',m.chantierId,'(propriétaire:',existing.chantierId,')');
      } else {
        if(existing) S.mat=S.mat.filter(x=>x.id!==m.id); // même chantier → remplace
        S.mat.push(m);
      }
    });
    const payload=articles.map(m=>{const {prix:_,autreChantier:__,...mDB}=m;return mDB;});

    let sheetAdded=0;
    let sheetError=null;
    for(let i=0;i<payload.length;i+=CHUNK_SIZE){
      const chunk=payload.slice(i,i+CHUNK_SIZE);
      try{
        const {error}=await db.from('materiels').upsert(chunk,{onConflict:'id'});
        if(error){
          sheetError=error;
          console.error('Upsert chunk error',s.sn,'offset',i,error);
        } else {
          sheetAdded+=chunk.length;
        }
      }catch(e){
        sheetError=e;
        console.error('Upsert chunk throw',s.sn,'offset',i,e);
      }
    }

    if(sheetError){
      toast('ERREUR '+s.sn+' : '+sheetError.message,'danger');
    } else {
      totalAdded+=sheetAdded;
      toast(s.sn+' : '+sheetAdded+' articles ✓','ok');
    }
  }

  }finally{
    window._importing=false;
    window._lastImport=Date.now(); // prolonge la fenêtre anti-écrasement silentSync
    try{localStorage.setItem('ro3_m',JSON.stringify(S.mat));}catch(e){}
    render();
    toast(totalChantiers+' chantier(s) créé(s) · '+totalAdded+' article(s) importé(s)','ok');
  }
}

function parseOnglet(sheetData, chantierId){
  const rows=sheetData.rows;
  const headerIdx=sheetData.headerIdx;
  if(headerIdx<0) return [];

  const headers=rows[headerIdx].map(h=>String(h||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''));
  const iRef=headers.findIndex(h=>h.startsWith('ref'));
  const iNom=headers.findIndex(h=>h.includes('design')||h.includes('libel')||h.includes('nom'));
  const iCat=headers.findIndex(h=>h.includes('cat')||h.includes('type'));
  const iDate=headers.findIndex(h=>h.includes('valid')||h.includes('date')||h.includes('echeance'));
  const iId=iRef>=0?iRef:0;
  const iName=iNom>=0?iNom:(iRef>=0?iRef:1);

  const articles=[];
  for(let i=headerIdx+1;i<rows.length;i++){
    const row=rows[i];
    const ref=String(row[iId]||'').trim();
    if(!ref||/^[📍📦↩]/.test(ref)) continue;
    // Même sanitisation que processRows + suppression caractères non-ASCII
    const id=ref.replace(/\s/g,'').replace(/[^a-zA-Z0-9\-_./]/g,'-').replace(/-{2,}/g,'-').replace(/^-|-$/g,'');
    if(!id) continue;
    const nom=String(row[iName]||ref).trim().replace(/[^\x20-\x7E\u00C0-\u017E]/g,'?');
    let cat='Outillage';
    if(iCat>=0&&row[iCat]) cat=String(row[iCat]).trim();
    let echeance='';
    if(iDate>=0&&row[iDate]){
      const raw=row[iDate];
      if(typeof raw==='number'&&raw>1000){
        const d=new Date(new Date(1899,11,30).getTime()+raw*86400000);
        echeance=d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
      } else echeance=String(raw).trim();
    }
    // Payload minimal identique à processRows — pas de champs null inconnus
    articles.push({
      id, nom, cat, chantierId,
      etat:'inconnu', scan:null, presence:'non-confirme', echeance:echeance||''
    });
  }
  return articles;
}

async function importerOnglet(sheetData, chantierId){
  const rows=sheetData.rows;
  const headerIdx=sheetData.headerIdx;
  if(headerIdx<0) return 0;

  const headers=rows[headerIdx].map(h=>String(h||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''));
  const iRef=headers.findIndex(h=>h.startsWith('ref'));
  const iNom=headers.findIndex(h=>h.includes('design')||h.includes('libel')||h.includes('nom'));
  const iCat=headers.findIndex(h=>h.includes('cat')||h.includes('type'));
  const iDate=headers.findIndex(h=>h.includes('valid')||h.includes('date')||h.includes('echeance'));

  const iId=iRef>=0?iRef:0;
  const iName=iNom>=0?iNom:(iRef>=0?iRef:1);

  const batch=[];
  for(let i=headerIdx+1;i<rows.length;i++){
    const row=rows[i];
    const ref=String(row[iId]||'').trim();
    if(!ref||/^[📍📦↩]/.test(ref)) continue;

    const id=ref.replace(/\s/g,'').replace(/[*\\#?&'"]/g,'-');
    const nom=String(row[iName]||ref).trim();
    let cat='Outillage';
    if(iCat>=0&&row[iCat]) cat=String(row[iCat]).trim();

    let echeance='';
    if(iDate>=0&&row[iDate]){
      const raw=row[iDate];
      if(typeof raw==='number'&&raw>1000){
        const d=new Date(new Date(1899,11,30).getTime()+raw*86400000);
        echeance=d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
      } else echeance=String(raw).trim();
    }

    if(S.mat.find(m=>m.id===id&&m.chantierId===chantierId)) continue;

    const mat={id,nom,cat,chantierId,etat:'inconnu',scan:null,presence:'non-confirme',echeance:echeance||'',prix:null,verifLundi:null,verifSemaine:null,controle2m:null};
    S.mat.push(mat);
    batch.push(mat);
  }

  if(!batch.length) return 0;

  // Batch upsert par tranches de 50 avec pause entre chunks
  const CHUNK=50;
  let totalSaved=0;
  for(let i=0;i<batch.length;i+=CHUNK){
    const chunk=batch.slice(i,i+CHUNK).map(m=>{
      const {prix:_,autreChantier:__,...mDB}=m;
      return mDB;
    });
    try{
      const {error}=await db.from('materiels').upsert(chunk,{onConflict:'id'});
      if(error){ toast('Erreur batch '+(i/CHUNK+1)+': '+error.message,'danger');console.error(error); }
      else{ totalSaved+=chunk.length; }
    }catch(e){console.error('Batch exception:',e);}
    // Petite pause pour éviter le rate limiting
    if(i+CHUNK<batch.length) await new Promise(r=>setTimeout(r,300));
  }
  return totalSaved;
}

async function deleteChantier(cid){
  document.getElementById('movl')?.remove();
  const c=S.chantiers.find(x=>x.id===cid);if(!c)return;
  const toDelete=[cid,...S.chantiers.filter(x=>x.parent_id===cid).map(x=>x.id)];

  for(const id of toDelete){
    // Supprimer les articles en Supabase
    const matIds=S.mat.filter(m=>m.chantierId===id).map(m=>m.id);
    if(matIds.length){
      await db.from('materiels').delete().in('id',matIds);
      S.mat=S.mat.filter(m=>m.chantierId!==id);
    }
    // Supprimer le chantier en Supabase
    const {error}=await db.from('chantiers').delete().eq('id',id);
    if(error){toast('Erreur suppression : '+error.message,'danger');return;}
    S.chantiers=S.chantiers.filter(x=>x.id!==id);
  }

  try{localStorage.setItem('ro3_c',JSON.stringify(S.chantiers));}catch(e){}
  try{localStorage.setItem('ro3_m',JSON.stringify(S.mat));}catch(e){}
  if(S.curC&&toDelete.includes(S.curC)){S.curC=null;S.page='chantiers';}
  render();
  toast('Chantier supprimé ✓','ok');
}

function tabControle(el){
  const c=getC(S.curC);
  const mats=matOfC(S.curC);
  const now=new Date();
  const deuxMoisMs=60*24*60*60*1000;
  const isReadOnly=S.role==='chef_chantier';

  const rows=mats.map(m=>{
    const lastCtrl=m.controle2m?new Date(m.controle2m.date):null;
    const joursSansCtrl=lastCtrl?Math.floor((now-lastCtrl)/(1000*60*60*24)):null;
    const du=!lastCtrl||(now-lastCtrl)>deuxMoisMs;
    const urgent=!lastCtrl||(now-lastCtrl)>deuxMoisMs*1.2;
    return{m,lastCtrl,joursSansCtrl,du,urgent};
  }).sort((a,b)=>{
    // Récemment contrôlé → en haut
    if(!a.lastCtrl && !b.lastCtrl) return 0;
    if(!a.lastCtrl) return 1;
    if(!b.lastCtrl) return -1;
    return b.lastCtrl - a.lastCtrl;
  });

  const enRetard=rows.filter(r=>r.urgent).length;
  const aDue=rows.filter(r=>r.du&&!r.urgent).length;

let _ctrlResult=null;
function selectCtrlResult(r){
  _ctrlResult=r;
  const okEl=document.getElementById('ctrl-ok');
  const hsEl=document.getElementById('ctrl-hs');
  const photoWrap=document.getElementById('ctrl-photo-wrap');
  if(okEl){okEl.style.borderColor=r==='ok'?'rgba(29,158,117,.5)':'var(--border)';okEl.style.background=r==='ok'?'rgba(29,158,117,.1)':'var(--bg3)';}
  if(hsEl){hsEl.style.borderColor=r==='hs'?'rgba(226,75,74,.5)':'var(--border)';hsEl.style.background=r==='hs'?'rgba(226,75,74,.1)':'var(--bg3)';}
  if(photoWrap)photoWrap.style.display=r==='hs'?'block':'none';
}

function onCtrlPhotoSelected(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const MAX=1024;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const b64=canvas.toDataURL('image/jpeg',0.75);
      const overlay=document.getElementById('movl');if(overlay)overlay._photoData=b64;
      const prev=document.getElementById('ctrl-photo-preview');
      const pimg=document.getElementById('ctrl-photo-img');
      const btn=document.getElementById('ctrl-photo-btn');
      if(prev)prev.style.display='block';
      if(pimg)pimg.src=b64;
      if(btn)btn.style.display='none';
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function clearCtrlPhoto(){
  const overlay=document.getElementById('movl');if(overlay)overlay._photoData=null;
  const prev=document.getElementById('ctrl-photo-preview');
  const btn=document.getElementById('ctrl-photo-btn');
  if(prev)prev.style.display='none';
  if(btn)btn.style.display='flex';
  const input=document.getElementById('ctrl-photo-input');
  if(input)input.value='';
}

function submitControle(matId){
  if(!_ctrlResult){toast('Sélectionne un résultat','danger');return;}
  const idx=S.mat.findIndex(m=>m.id===matId);if(idx===-1)return;
  const desc=document.getElementById('ctrl-desc')?.value.trim()||'';
  const photo=document.getElementById('movl')?._photoData||null;
  S.mat[idx].controle2m={
    date:nowISO(),
    agentNom:S.agent,
    resultat:_ctrlResult,
    description:desc,
    photo:photo
  };
  const res=_ctrlResult;
  _ctrlResult=null;
  saveMat(matId);
  document.getElementById('movl')?.remove();
  renderTab();
  toast(res==='ok'?'Contrôle OK enregistré':'Contrôle HS enregistré — anomalie signalée',res==='ok'?'ok':'warn');
}

function validerControle(id){
  const idx=S.mat.findIndex(m=>m.id===id);
  if(idx===-1) return;
  S.mat[idx].controle2m={date:nowISO(),agentNom:S.agent,resultat:'ok'};
  saveMat(id);renderTab();
  toast('Contrôle enregistré — '+S.mat[idx].nom,'ok');
}

function addVisitePhoto(){
  window._tourneeEnCours=true;
  const input=document.createElement('input');
  input.type='file';input.accept='image/*';input.capture='environment';
  input.style.cssText='position:fixed;top:-100px;left:-100px;opacity:0;';
  document.body.appendChild(input);
  input.onchange=function(){
    const file=input.files[0];
    document.body.removeChild(input);
    if(!file){window._tourneeEnCours=false;return;}
    const reader=new FileReader();
    reader.onload=function(e){
      const img2=new Image();
      img2.onload=function(){
        const MAX=1024;let w=img2.width,h=img2.height;
        if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
        const cv=document.createElement('canvas');cv.width=w;cv.height=h;
        cv.getContext('2d').drawImage(img2,0,0,w,h);
        _visitePhotos.push({data:cv.toDataURL('image/jpeg',0.75),legende:''});
        renderVisitePhotos();
      };
      img2.src=e.target.result;
    };
    reader.readAsDataURL(file);

  setTimeout(()=>{window._tourneeEnCours=false;},30000);

async function validerVisite(){
  const agent=document.getElementById('tv-agent')?.value;
  const zone=document.getElementById('tv-zone')?.value.trim();
  if(!agent){toast("Sélectionne l'agent",'danger');return;}
  const getSig=(id)=>{
    const c=document.getElementById(id);if(!c||isSigEmpty(id))return null;
    const tmp=document.createElement('canvas');tmp.width=c.width;tmp.height=c.height;
    const tctx=tmp.getContext('2d');tctx.fillStyle='#ffffff';tctx.fillRect(0,0,tmp.width,tmp.height);
    tctx.drawImage(c,0,0);return tmp.toDataURL('image/png');
  };
  // Horodatage ISO certifié au moment de la validation
  const timestamp=new Date().toISOString();
  const sigAgentData=getSig('sig-agent');
  const sigCteData=getSig('sig-cte');

  // Hash SHA-256 de (sigAgent + sigCte + agent + zone + timestamp)
  // Garantit que la signature n'a pas été altérée après coup
  let sigHash=null;
  try{
    const payload=[(sigAgentData||''), (sigCteData||''), agent, zone||'—', timestamp].join('|');
    const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(payload));
    sigHash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,16).toUpperCase();
  }catch(e){console.warn('hash error:',e);}

  const visite={
    id:newId('VIS'),agent,zone:zone||'—',
    observations:document.getElementById('tv-obs')?.value||'',
    photos:[..._visitePhotos],
    sigAgent:sigAgentData,
    sigCte:sigCteData,
    // Horodatage et hash d'intégrité
    signedAt:timestamp,
    signedBy:S.agent,
    sigHash:sigHash,
  };
  _visites.push(visite);
  _visitePhotos=[];
  if(document.getElementById('tv-agent')) document.getElementById('tv-agent').value='';
  if(document.getElementById('tv-zone')) document.getElementById('tv-zone').value='';
  if(document.getElementById('tv-obs')) document.getElementById('tv-obs').value='';
  renderVisitePhotos();
  clearSig('agent');clearSig('cte');
  renderVisitesSummary();
  toast('Visite validée ✓','ok');
}

// Signature pad
function initSigPad(id){
  const canvas=document.getElementById(id);
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth;
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  const getPos=(e)=>{
    const r=canvas.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-r.left)*(canvas.width/r.width),y:(src.clientY-r.top)*(canvas.height/r.height)};
  };
  canvas.addEventListener('mousedown',e=>{drawing=true;const p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);});
  canvas.addEventListener('mousemove',e=>{if(!drawing)return;const p=getPos(e);ctx.lineTo(p.x,p.y);ctx.strokeStyle='#1a1a1a';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();});
  canvas.addEventListener('mouseup',()=>drawing=false);
  canvas.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;const p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!drawing)return;const p=getPos(e);ctx.lineTo(p.x,p.y);ctx.strokeStyle='#1a1a1a';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();},{passive:false});
  canvas.addEventListener('touchend',()=>drawing=false);
}

function clearSig(which){
  const canvas=document.getElementById('sig-'+which);
  if(!canvas)return;
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
}

function isSigEmpty(id){
  const canvas=document.getElementById(id);
  if(!canvas)return true;
  const data=canvas.getContext('2d').getImageData(0,0,canvas.width,canvas.height).data;
  return !data.some(v=>v!==0);
}

  if(!_tourneeType){toast('Sélectionne le type de tournée','danger');return;}

  if(_visites.length===0){toast('Ajoute au moins une visite','danger');return;}
  const tournee={
    id:newId('TRN'),chantierId,weekKey:getWeekKey(getJR(chantierId)),
    type:_tourneeType,date,auteur:S.agent,
    visites:[..._visites],
    createdAt:nowISO(),
  };
  const idx=S.chantiers.findIndex(c=>c.id===chantierId);
  if(idx===-1)return;
  if(!S.chantiers[idx].tournees) S.chantiers[idx].tournees=[];
  S.chantiers[idx].tournees.push(tournee);
  const cutoff=new Date(Date.now()-30*24*60*60*1000);

  _visitePhotos=[];_tourneeType=null;_visites=[];
  window._tourneeEnCours=false;
  saveChantier(chantierId);
  renderTab();
  toast('Tournée enregistrée — '+tournee.visites.length+' visite(s) ✓','ok');
}

  const items=results.querySelectorAll('.agent-result-item');
  let visible=0;
  items.forEach(el=>{
    const match=el.textContent.toLowerCase().includes(q);
    el.style.display=match?'flex':'none';
    if(match) visible++;
  });
  results.style.display=(q&&visible>0)?'block':'none';
}

function addAgentDirectToC(cid,agentNom){
  const idx=S.chantiers.findIndex(c=>c.id===cid);
  if(idx===-1) return;
  if(!S.chantiers[idx].agents) S.chantiers[idx].agents=[];
  if(S.chantiers[idx].agents.includes(agentNom)){toast('Déjà assigné','warn');return;}
  S.chantiers[idx].agents.push(agentNom);
  saveChantier(cid);renderTab();
  toast(agentNom+' assigné au chantier','ok');
}

function addAgentToC(cid){
  const sel=document.getElementById('add-agent-sel');
  if(!sel||!sel.value){toast('Sélectionne un agent','warn');return;}
  const idx=S.chantiers.findIndex(c=>c.id===cid);
  if(idx===-1) return;
  if(!S.chantiers[idx].agents) S.chantiers[idx].agents=[];
  if(S.chantiers[idx].agents.includes(sel.value)){toast('Déjà assigné','warn');return;}
  S.chantiers[idx].agents.push(sel.value);
  saveChantier(cid);renderTab();
  toast(sel.value+' assigné au chantier','ok');
}

function removeAgentFromC(cid,agentNom){
  const idx=S.chantiers.findIndex(c=>c.id===cid);
  if(idx===-1) return;
  S.chantiers[idx].agents=(S.chantiers[idx].agents||[]).filter(a=>a!==agentNom);
  saveChantier(cid);renderTab();
  toast(agentNom+' retiré du chantier','warn');
}

async function doTerminer(){
  const chantierId=S.curC;
  const pdfC=S.chantiers.find(x=>x.id===chantierId);
  const pdfMats=S.mat.filter(m=>m.chantierId===chantierId);
  const pdfScans=S.scans.filter(s=>s.chantierId===chantierId);

  // Supprimer de la mémoire
  S.chantiers=S.chantiers.filter(c=>c.id!==chantierId);
  S.mat=S.mat.filter(m=>m.chantierId!==chantierId);
  S.scans=S.scans.filter(s=>s.chantierId!==chantierId);
  try{localStorage.setItem('ro3_c',JSON.stringify(S.chantiers));}catch(e){}

function scanFromPhoto(input){
  const file=input.files[0];if(!file)return;
  const res=document.getElementById('scan-photo-result');
  if(res)res.textContent='Analyse en cours…';
  const img=new Image();
  const reader=new FileReader();
  reader.onload=function(e){
    img.onload=function(){
      // BarcodeDetector natif si dispo
      if('BarcodeDetector' in window){
        const bd=new BarcodeDetector({formats:['qr_code']});
        bd.detect(img).then(codes=>{
          if(codes.length>0){
            if(res)res.textContent='';
            processQR(codes[0].rawValue);
          } else {
            scanFromPhotoJsQR(img,res);
          }
        }).catch(()=>scanFromPhotoJsQR(img,res));
      } else {
        scanFromPhotoJsQR(img,res);
      }
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function scanFromPhotoJsQR(img,res){
  const canvas=document.createElement('canvas');
  canvas.width=img.width;canvas.height=img.height;
  canvas.getContext('2d').drawImage(img,0,0);
  const imageData=canvas.getContext('2d').getImageData(0,0,canvas.width,canvas.height);
  if(typeof jsQR!=='undefined'){
    const qr=jsQR(imageData.data,imageData.width,imageData.height);
    if(qr?.data){if(res)res.textContent='';processQR(qr.data);return;}
  }
  if(res)res.innerHTML='<span style="color:#F09595">QR non détecté — rapproche-toi ou améliore la lumière</span>';
}
function startCam(){
  if(S.camActive)return;S.camActive=true;
  navigator.mediaDevices?.getUserMedia({video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}})
    .then(stream=>{
      S.camStream=stream;
      const v=document.getElementById('cam-video');
      if(!v){stopCam();return;}
      v.srcObject=stream;v.play();
      // Utilise BarcodeDetector natif si disponible (Android Chrome), sinon jsQR
      if('BarcodeDetector' in window){
        S._bd=new BarcodeDetector({formats:['qr_code']});
        scanLoopNative();
      } else {
        scanLoop();
      }
    })
    .catch(()=>{const w=document.getElementById('cam-wrap');if(w)w.innerHTML=`<div style="padding:44px 20px;text-align:center;color:var(--text2);font-size:13px;opacity:.6">Caméra non disponible<br><span style="font-size:12px;opacity:.7">Utilisez "Simuler" ci-dessous</span></div>`;});
}

// Scanner natif Android (BarcodeDetector API)
async function scanLoopNative(){
  if(!S.camActive)return;
  const v=document.getElementById('cam-video');
  if(!v||v.readyState!==v.HAVE_ENOUGH_DATA){S.camRaf=requestAnimationFrame(scanLoopNative);return;}
  try{
    const codes=await S._bd.detect(v);
    if(codes.length>0){processQR(codes[0].rawValue);return;}
  }catch(e){}
  S.camRaf=requestAnimationFrame(scanLoopNative);
}

// Scanner jsQR fallback (PC / iOS)
function scanLoop(){
  if(!S.camActive)return;
  const v=document.getElementById('cam-video'),c=document.getElementById('scan-canvas');
  if(!v||!c||v.readyState!==v.HAVE_ENOUGH_DATA){S.camRaf=requestAnimationFrame(scanLoop);return;}
  const ctx=c.getContext('2d');c.width=v.videoWidth;c.height=v.videoHeight;ctx.drawImage(v,0,0);
  if(typeof jsQR!=='undefined'){const img=ctx.getImageData(0,0,c.width,c.height);const qr=jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});if(qr?.data){processQR(qr.data);return;}}
  S.camRaf=requestAnimationFrame(scanLoop);
}
function stopCam(){S.camActive=false;if(S.camRaf){cancelAnimationFrame(S.camRaf);S.camRaf=null;}if(S.camStream){S.camStream.getTracks().forEach(t=>t.stop());S.camStream=null;}}
function processQR(data){stopCam();if(data.startsWith('RAILOPS:MAT:')){const id=data.replace('RAILOPS:MAT:','');if(getM(id))startInspect(id);else toast('Matériel introuvable','danger');}else toast('QR non reconnu','danger');}

function startInspect(id){
  stopCam();S.curM=id;
  S.fd={etatGeneral:'',proprete:'',fonctionnement:true,dommages:false,dommagesDesc:'',observations:'',actions:'',photo:null};
  S._inspectBloque=false;
  // Pré-charger GPS dès l'ouverture (l'agent a le temps de remplir le formulaire)
  localStorage.removeItem('_pendingGPS');
  if(navigator.geolocation){
    // Sur iOS, vérifier la permission avant de demander
    if(navigator.permissions){
      navigator.permissions.query({name:'geolocation'}).then(result=>{
        if(result.state==='denied') return; // Refusé définitivement, on abandonne silencieusement
        navigator.geolocation.getCurrentPosition(
          pos=>{localStorage.setItem('_pendingGPS',JSON.stringify({lat:pos.coords.latitude,lng:pos.coords.longitude}));},
          ()=>{},
          {enableHighAccuracy:true,timeout:15000,maximumAge:0}
        );
      }).catch(()=>{
        // navigator.permissions non supporté (iOS < 16), on tente directement
        navigator.geolocation.getCurrentPosition(
          pos=>{localStorage.setItem('_pendingGPS',JSON.stringify({lat:pos.coords.latitude,lng:pos.coords.longitude}));},
          ()=>{},
          {enableHighAccuracy:true,timeout:15000,maximumAge:0}
        );
      });
    } else {
      navigator.geolocation.getCurrentPosition(
        pos=>{localStorage.setItem('_pendingGPS',JSON.stringify({lat:pos.coords.latitude,lng:pos.coords.longitude}));},
        ()=>{},
        {enableHighAccuracy:true,timeout:15000,maximumAge:0}
      );
    }
  }
  S.page='form';render();
}

function kitAdj(fieldId, delta){
  const input=document.getElementById(fieldId);if(!input)return;
  const total=parseInt(input.dataset.total)||0;
  let val=parseInt(input.value)||0;
  val=Math.max(0,Math.min(total,val+delta));
  input.value=val;
  const valEl=document.getElementById(fieldId+'-val');
  const barEl=document.getElementById(fieldId+'-bar');
  if(valEl){
    valEl.textContent=val;
    const color=val===total&&total>0?'#3db54a':val>0?'#f5a623':'#F09595';
    valEl.style.color=color;
  }
  if(barEl&&total>0){
    const pct=Math.round(val/total*100);
    barEl.style.width=pct+'%';
    barEl.style.background=val===total?'#3db54a':val>0?'#f5a623':'#F09595';
  }
  const elemInput=document.getElementById('kit-elem');
  const attInput=document.getElementById('kit-attache');
  const alerte=document.getElementById('kit-alerte');
  if(!alerte)return;
  const msgs=[];
  if(elemInput&&parseInt(elemInput.value)<parseInt(elemInput.dataset.total))
    msgs.push((parseInt(elemInput.dataset.total)-parseInt(elemInput.value))+' élément(s) manquant(s)');
  if(attInput&&parseInt(attInput.value)<parseInt(attInput.dataset.total))
    msgs.push((parseInt(attInput.dataset.total)-parseInt(attInput.value))+' attache(s) manquante(s)');
  if(msgs.length){alerte.style.display='block';alerte.textContent='⚠ Kit incomplet : '+msgs.join(', ');}
  else{alerte.style.display='none';}
}

function getKitObs(){
  const elemInput=document.getElementById('kit-elem');
  const attInput=document.getElementById('kit-attache');
  if(!elemInput) return '';
  const msgs=[];
  const elemVal=parseInt(elemInput.value)||0;
  const elemTotal=parseInt(elemInput.dataset.total)||0;
  if(elemVal<elemTotal) msgs.push(elemVal+'/'+elemTotal+' éléments');
  if(attInput){
    const attVal=parseInt(attInput.value)||0;
    const attTotal=parseInt(attInput.dataset.total)||0;
    if(attVal<attTotal) msgs.push(attVal+'/'+attTotal+' attaches');
  }
  if(msgs.length) return '[Kit incomplet : '+msgs.join(', ')+']';
  return '';
}

function onPhotoSelected(input){
  const file=input.files[0];if(!file)return;
  window._selectingFile=true; // bloque silentSync pendant le traitement
  const reader=new FileReader();
  reader.onload=function(e){
    // Compression via canvas
    const img=new Image();
    img.onload=function(){
      const MAX=1024;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const b64=canvas.toDataURL('image/jpeg',0.75);
      S.fd.photo=b64;
      const prev=document.getElementById('photo-preview');
      const pimg=document.getElementById('photo-img');
      const btn=document.getElementById('photo-btn');
      if(prev)prev.style.display='block';
      if(pimg)pimg.src=b64;
      if(btn)btn.style.display='none';
      window._selectingFile=false;
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function clearPhoto(){

function submitF(forceDouble=false){
  if(!S.fd.etatGeneral){toast('Sélectionne l\'état général','danger');return;}
  if(!S.fd.proprete){toast('Sélectionne la propreté','danger');return;}
  // Récupérer GPS depuis localStorage (déclenché dans startInspect)
  const gpsRaw=localStorage.getItem('_pendingGPS');
  const gps=gpsRaw?JSON.parse(gpsRaw):null;
  localStorage.removeItem('_pendingGPS');
  // Si pas encore de GPS, demander maintenant et soumettre quand disponible (max 5s)
  if(!gps&&navigator.geolocation){
    toast('Localisation en cours…','info');
    const timeout=setTimeout(()=>_doSubmit(null,forceDouble),5000);
    navigator.geolocation.getCurrentPosition(
      pos=>{clearTimeout(timeout);_doSubmit({lat:pos.coords.latitude,lng:pos.coords.longitude},forceDouble);},
      ()=>{clearTimeout(timeout);_doSubmit(null,forceDouble);},
      {enableHighAccuracy:true,timeout:5000,maximumAge:0}
    );
    return;
  }
  _doSubmit(gps,forceDouble);
}

function _doSubmit(gps,forceDouble=false){
  // Observations obligatoires si hors service
  if(S.fd.etatGeneral==='hors-service'){
    const obs=document.getElementById('obs')?.value.trim();
    if(!obs){
      toast('Raison obligatoire pour un article hors service','danger');
      const obsEl=document.getElementById('obs');
      if(obsEl){obsEl.style.borderColor='var(--danger)';obsEl.focus();}
      return;
    }
  }
  // Vérifier si cet article a déjà été inspecté aujourd'hui par cet agent
  if(!forceDouble){
    const today=new Date().toDateString();
    const dejaVu=S.scans.find(s=>s.materielId===S.curM&&s.agentNom===S.agent&&new Date(s.date).toDateString()===today);
    if(dejaVu){
      // Afficher modal de confirmation
      const existing=document.getElementById('movl');if(existing)existing.remove();
      const div=document.createElement('div');div.id='movl';div.className='moverlay';
      const m=getM(S.curM);
      div.innerHTML=`<div class="msheet">
        <div class="mhandle"></div>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
          <div style="width:40px;height:40px;border-radius:50%;background:rgba(245,166,35,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </div>
          <div>
            <div style="font-size:15px;font-weight:500;color:var(--text)">Déjà vérifié aujourd'hui</div>
            <div style="font-size:12px;color:var(--text2);margin-top:2px">${m?.nom||S.curM}</div>
          </div>
        </div>
        <div style="background:rgba(245,166,35,.08);border:.5px solid rgba(245,166,35,.3);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:var(--text2)">
          Cet article a déjà été inspecté ce jour à ${new Date(dejaVu.date).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}. Es-tu sûr de vouloir ajouter une seconde inspection ?
        </div>
        <div style="display:flex;gap:10px">
          <button onclick="document.getElementById('movl').remove()" class="btn btn-outline" style="flex:1">Annuler</button>
          <button onclick="document.getElementById('movl').remove();submitF(true)" class="btn btn-accent" style="flex:1">Oui, valider quand même</button>
        </div>
      </div>`;
      document.getElementById('app').appendChild(div);
      return;
    }
  }
  const m=getM(S.curM);
  const kitObs=getKitObs();
  const obsField=document.getElementById('obs')?.value||'';
  const obsValue=kitObs?(kitObs+(obsField?' — '+obsField:'')):obsField;
  const scan={id:newId('SCAN'),materielId:S.curM,chantierId:m?.chantierId||'',agentNom:S.agent,date:nowISO(),etatGeneral:S.fd.etatGeneral,proprete:S.fd.proprete,fonctionnement:S.fd.fonctionnement,dommages:S.fd.dommages,dommagesDesc:document.getElementById('dmg-desc')?.value||'',observations:obsValue,actions:document.getElementById('act')?.value||'',photo:S.fd.photo||null,lat:gps?.lat||null,lng:gps?.lng||null};
  S.scans.push(scan);
  const idx=S.mat.findIndex(x=>x.id===S.curM);
  if(idx!==-1){
    S.mat[idx].etat=scan.etatGeneral;
    S.mat[idx].scan=scan.date;
    if(S.fd._pres)S.mat[idx].presence=S.fd._pres;
    else if(S.mat[idx].presence!=='absent')S.mat[idx].presence='confirme';
    recordVerif(idx);
  }
  // Sauvegarder le scan en localStorage immédiatement (avec photo)
  try{localStorage.setItem('ro3_s',JSON.stringify(S.scans));}catch(e){}
  // Sauvegarder en Supabase
  const scanForDB={id:scan.id,materielId:scan.materielId,chantierId:scan.chantierId,agentNom:scan.agentNom,date:scan.date,etatGeneral:scan.etatGeneral,proprete:scan.proprete,fonctionnement:scan.fonctionnement,dommages:scan.dommages,dommagesDesc:scan.dommagesDesc,observations:scan.observations,actions:scan.actions,photo:scan.photo||null,lat:scan.lat||null,lng:scan.lng||null};
  db.from('scans').upsert([scanForDB],{onConflict:'id'}).then(()=>{
    try{localStorage.setItem('ro3_s',JSON.stringify(S.scans));}catch(e){}
  },e=>console.warn('scan save error:',e));
  if(idx!==-1) saveMat(S.curM);
  // Si hors ligne → mettre en file d'attente
  if(!navigator.onLine){
    addToOfflineQueue('scan', {...scan});

  const slot=getTodaySlot();
  if(m?.chantierId){S.curC=m.chantierId;S.page='chantier_detail';S.tab='registre';}else S.page='dashboard';
  render();
  // Forcer le re-render de l'avancement après le scan
  setTimeout(()=>{
    if(S.tab==='registre'){
      const el=document.getElementById('tab-content');
      if(el) tabRegistre(el);

  },100);
  const idx2=S.mat.findIndex(x=>x.id===S.curM);
  const wk2=getWeekKey();
  const v1ok=idx2!==-1&&S.mat[idx2].verifLundi?.weekKey===wk2;
  const v2ok=idx2!==-1&&S.mat[idx2].verifSemaine?.weekKey===wk2;
  const dotMsg=v1ok&&v2ok?' · 🟢🟢 Semaine complète':v1ok?' · 🟢 1ère vérif OK':'';
  const offlineMsg=!navigator.onLine?' · En attente de sync':''; setTimeout(()=>toast('Inspection enregistrée'+dotMsg+offlineMsg,!navigator.onLine?'warn':'ok'),80);
}

  // ── Chantiers qui se terminent dans les 7 jours ─────────────────
  const today=new Date(); today.setHours(0,0,0,0);
  const in7=new Date(today); in7.setDate(in7.getDate()+7);
  const alertes=S.chantiers.filter(c=>{
    if(c.statut==='termine'||!c.dateFin) return false;
    const fin=new Date(c.dateFin);
    return fin>=today&&fin<=in7;
  }).sort((a,b)=>new Date(a.dateFin)-new Date(b.dateFin));

  // ── Chantiers terminés ──────────────────────────────────────────
  const termines=S.chantiers.filter(c=>c.statut==='termine')
    .sort((a,b)=>new Date(b.dateFin||b.dateDebut||0)-new Date(a.dateFin||a.dateDebut||0));

  // ── Inspections ─────────────────────────────────────────────────
  const scans=(S.role==='agent')?[...S.scans].filter(s=>s.agentNom===S.agent).reverse():[...S.scans].reverse();

  const alerteBanner=alertes.length?`
    <div style="margin:0 16px 12px;background:rgba(245,166,35,.1);border:.5px solid rgba(245,166,35,.4);border-radius:12px;padding:12px 14px">
      <div style="font-size:12px;font-weight:600;color:#f5a623;margin-bottom:8px">⚠ ${alertes.length} chantier(s) se terminent dans 7 jours</div>
      ${alertes.map(c=>{
        const fin=new Date(c.dateFin);
        const diff=Math.ceil((fin-today)/86400000);
        return`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:.5px solid rgba(245,166,35,.2)">
          <div style="font-size:12px;color:var(--text);font-weight:500">${c.nom}</div>
          <span style="font-size:11px;font-weight:600;color:${diff<=2?'#F09595':'#f5a623'};background:${diff<=2?'rgba(226,75,74,.12)':'rgba(245,166,35,.12)'};border-radius:6px;padding:2px 8px">${diff===0?'Aujourd\'hui':diff===1?'Demain':'J-'+diff}</span>
        </div>`;
      }).join('')}
    </div>`:

  el.innerHTML=`
    <div class="topbar">
      <div class="tbi">
        <div class="tbt">Historique</div>
        <div class="tbs">${subTab==='inspections'?scans.length+' inspection(s)':termines.length+' chantier(s) terminé(s)'}</div>
      </div>
    </div>

    <!-- Sous-onglets -->
    <div class="tabs" style="flex-shrink:0">
      <div class="tab${subTab==='inspections'?' on':''}" onclick="S.histoTab='inspections';pgHistorique(document.getElementById('pc'))">Inspections</div>
      <div class="tab${subTab==='termines'?' on':''}" onclick="S.histoTab='termines';pgHistorique(document.getElementById('pc'))" style="position:relative">
        Chantiers terminés
        ${termines.length?`<span style="margin-left:4px;font-size:10px;opacity:.8">${termines.length}</span>`:''}
      </div>
    </div>

    ${alerteBanner}

    <div style="padding:10px 16px 20px;display:flex;flex-direction:column;gap:8px">

    ${subTab==='inspections'?`
      ${scans.length===0?`<div style="padding:60px 0;text-align:center;color:var(--text3);font-size:13px">Aucune inspection</div>`:
        scans.map(s=>{const m=getM(s.materielId);const c=getC(s.chantierId);return`
        <div class="card">
          <div style="display:flex;justify-content:space-between;gap:8px">
            <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m?.nom||s.materielId}</div><div style="font-size:11px;color:var(--accent);margin-top:1px">${c?.nom||''}</div><div style="font-size:11px;color:var(--text3);margin-top:1px">${s.agentNom} · ${fmt(s.date)}</div></div>
            <span class="badge ${eB(s.etatGeneral)}">${eL(s.etatGeneral)}</span>
          </div>
          ${s.observations?`<div style="margin-top:8px;font-size:12px;color:var(--text2)">${s.observations}</div>`:''}
          ${s.actions?`<div style="margin-top:6px;padding:6px 10px;background:rgba(61,181,74,.08);border-radius:8px;font-size:12px;color:var(--accent)">Action : ${s.actions}</div>`:''}
          ${s.photo?`<div style="margin-top:8px;position:relative">
            <img src="${s.photo}" onclick="openPhotoFull('${s.id}')" style="width:100%;max-height:120px;object-fit:cover;border-radius:8px;border:.5px solid var(--border);cursor:pointer">
            <div style="position:absolute;top:4px;right:4px;display:flex;gap:3px">
              <button onclick="openPhotoFull('${s.id}')" style="background:rgba(0,0,0,.6);border:none;border-radius:5px;padding:3px 7px;color:#fff;cursor:pointer;font-size:10px;font-family:inherit">⛶</button>
              <a href="${s.photo}" download="inspection-${s.id}.jpg" style="background:rgba(0,0,0,.6);border-radius:5px;padding:3px 7px;color:#fff;font-size:10px;text-decoration:none;display:flex;align-items:center">⬇</a>
            </div>
          </div>`:''}
        </div>`}).join('')}
    `:`
      ${termines.length===0?`<div style="padding:60px 0;text-align:center;color:var(--text3);font-size:13px">Aucun chantier terminé</div>`:''}
      ${termines.map(c=>{
        const mats=matOfC(c.id);
        const nbPresent=mats.filter(m=>m.presence==='confirme').length;
        const nbAbsent=mats.filter(m=>m.presence==='absent').length;
        const nbTotal=mats.length;
        const dateDebut=c.dateDebut?new Date(c.dateDebut).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}):'—';
        const dateFin=c.dateFin?new Date(c.dateFin).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}):'—';
        return`<div class="card" onclick="openC('${c.id}')" style="cursor:pointer">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
            <div style="flex:1">
              <div style="font-size:14px;font-weight:600;color:var(--text)">${c.nom}</div>
              <div style="font-size:11px;color:var(--text3);margin-top:2px">${c.lieu||''}${c.chef?' · '+c.chef:''}</div>
              <div style="font-size:11px;color:var(--text3);margin-top:2px">${dateDebut} → ${dateFin}</div>
            </div>
            <span style="font-size:10px;font-weight:600;color:#888;background:var(--bg3);border-radius:6px;padding:2px 8px;flex-shrink:0">Terminé</span>
          </div>
          ${nbTotal>0?`<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
            <span style="font-size:11px;background:var(--bg3);border-radius:6px;padding:2px 8px;color:var(--text2)">${nbTotal} articles</span>
            ${nbPresent>0?`<span style="font-size:11px;background:rgba(61,181,74,.1);border-radius:6px;padding:2px 8px;color:#3db54a">✓ ${nbPresent} présents</span>`:''}
            ${nbAbsent>0?`<span style="font-size:11px;background:rgba(226,75,74,.1);border-radius:6px;padding:2px 8px;color:#F09595">✗ ${nbAbsent} absents</span>`:''}
          </div>`:''}
        </div>`;
      }).join('')}
    `}

    </div>`;
}

// ── QR state ──
const QS={selMode:false,selItems:new Set(),chantierFilter:'tous'};

function pgQRCodes(el){

        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>

    </div>

    <!-- Barre d'action sélection multiple -->
    ${QS.selMode?`<div style="margin:8px 16px 0;background:var(--bg3);border-radius:10px;padding:10px 12px;border:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px">

        <span style="font-size:12px;color:${selCount>0?'var(--accent)':'var(--text3)'}">${selCount} sélectionné(s)</span>
      </div>
      ${selCount>0?`<button onclick="qrUpdateDate()" style="background:rgba(61,181,74,.15);border:.5px solid rgba(61,181,74,.3);border-radius:8px;padding:6px 14px;font-size:12px;color:var(--accent);cursor:pointer;font-family:inherit;font-weight:500">Mettre à jour date (${selCount})</button>`:''}
    </div>`:''}

    <!-- Liste articles -->
    <div style="padding:10px 16px 20px">
      ${S.chantiers.filter(c=>QS.chantierFilter==='tous'||c.id===QS.chantierFilter).map(c=>{
        const mats=matOfC(c.id);
        if(!mats.length)return '';
        return `<div style="margin-bottom:16px">
          <div style="font-size:12px;font-weight:500;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:.07em;display:flex;justify-content:space-between;align-items:center">
            <span>${c.nom}</span><span class="badge ${sBadge(c.statut)}">${sLabel(c.statut)}</span>
          </div>
          ${mats.map(m=>{
            const isSel=QS.selItems.has(m.id);
            const expired=m.echeance&&isDateWarning(m.echeance);
            const soon=m.echeance&&isDateSoon(m.echeance);
            return `<div class="li" onclick="${QS.selMode?`qrToggleItem('${m.id}')`:''}" style="cursor:${QS.selMode?'pointer':'default'};${isSel?'background:rgba(61,181,74,.05);border-radius:8px;margin:0 -6px;padding:11px 6px;':''}">

                <div class="it">${m.nom}</div>
                <div style="font-size:10px;color:var(--text3);font-family:monospace;margin-top:1px">${m.id}</div>
                <div style="font-size:11px;margin-top:3px;color:${expired?'#F09595':soon?'#f5a623':'var(--text3)'}">
                  ${m.echeance?(expired?'⚠ ':soon?'⏰ ':'')+'Échéance : '+m.echeance+(soon?' — Bientôt':''):'Pas de date limite'}
                </div>
              </div>
              ${!QS.selMode?`<button onclick="openQR('${m.id}')" style="background:none;border:.5px solid var(--border);border-radius:8px;padding:5px 8px;font-size:11px;color:var(--text2);cursor:pointer;font-family:inherit;flex-shrink:0">QR</button>`:''}
            </div>`;
          }).join('')}
        </div>`;
      }).join('')}
    </div>`;
}

function qrSetC(id){QS.chantierFilter=id;QS.selItems=new Set();const pc=document.getElementById('pc');if(pc)pgQRCodes(pc);}
function qrToggleSel(){QS.selMode=!QS.selMode;QS.selItems=new Set();const pc=document.getElementById('pc');if(pc)pgQRCodes(pc);}
function qrToggleItem(id){if(QS.selItems.has(id))QS.selItems.delete(id);else QS.selItems.add(id);const pc=document.getElementById('pc');if(pc)pgQRCodes(pc);}
function qrSelAll(){
  const allMats=S.mat.filter(m=>QS.chantierFilter==='tous'||m.chantierId===QS.chantierFilter);
  if(QS.selItems.size===allMats.length) QS.selItems=new Set();
  else allMats.forEach(m=>QS.selItems.add(m.id));
  const pc=document.getElementById('pc');if(pc)pgQRCodes(pc);
}
function qrUpdateDate(){
  if(!QS.selItems.size)return;
  const existing=document.getElementById('movl');if(existing)existing.remove();
  const div=document.createElement('div');
  div.id='movl';div.className='moverlay';
  const ids=[...QS.selItems];
  // Get current echeance from first selected item as default
  const firstMat=getM(ids[0]);
  const currentDate=firstMat?.echeance||'';
  // Convert dd/mm/yyyy to yyyy-mm-dd for the date input
  let inputVal='';
  if(currentDate){
    const p=currentDate.split('/');
    if(p.length===3) inputVal=p[2]+'-'+p[1]+'-'+p[0];
  }
  div.innerHTML=`<div class="msheet">
    <div class="mhandle"></div>
    <div style="text-align:center;margin-bottom:16px">
      <div style="width:52px;height:52px;border-radius:50%;background:rgba(61,181,74,.12);display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <div style="font-size:16px;font-weight:500;color:var(--text)">Mettre à jour la date limite</div>
      <div style="font-size:13px;color:var(--text2);margin-top:6px">${ids.length} article(s) sélectionné(s)</div>
    </div>
    <div style="background:var(--bg3);border-radius:10px;padding:10px 14px;margin-bottom:14px;max-height:120px;overflow-y:auto">
      ${ids.map(id=>{const m=getM(id);return`<div style="font-size:12px;color:var(--text2);padding:3px 0;border-bottom:.5px solid var(--border)">${m?.nom||id} <span style="font-family:monospace;font-size:10px;color:var(--text3)">${m?.id||''}</span></div>`;}).join('')}
    </div>
    <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:7px">Nouvelle date limite *</label>
    <input type="date" id="new-date-input" class="fi" value="${inputVal}" style="margin-bottom:16px">
    <div style="display:flex;gap:10px">
      <button class="btn btn-outline" onclick="document.getElementById('movl').remove()" style="flex:1">Annuler</button>
      <button class="btn btn-accent" onclick="doQrUpdateDate([${ids.map(id=>`'${id}'`).join(',')}])" style="flex:1">Valider</button>
    </div>
  </div>`;
  // fermeture uniquement via bouton Fermer (plus fiable sur mobile)
  document.getElementById('app').appendChild(div);
}
function doQrUpdateDate(ids){
  const raw=document.getElementById('new-date-input')?.value;
  if(!raw){alert('Choisis une date');return;}
  // Convert yyyy-mm-dd to dd/mm/yyyy
  const p=raw.split('-');
  const dateStr=p[2]+'/'+p[1]+'/'+p[0];
  ids.forEach(id=>{
    const idx=S.mat.findIndex(m=>m.id===id);
    if(idx!==-1) S.mat[idx].echeance=dateStr;
  });
  save();
  QS.selItems=new Set();
  QS.selMode=false;
  document.getElementById('movl')?.remove();
  const pc=document.getElementById('pc');if(pc)pgQRCodes(pc);
  toast('Date mise à jour pour '+ids.length+' article(s)','ok');
}
function openQR(id){S.modal='qr';S.modalData={id};render();setTimeout(()=>genQR(id),100);}
function genQR(id){const el=document.getElementById('qr-out');if(!el||typeof QRCode==='undefined')return;el.innerHTML='';new QRCode(el,{text:'RAILOPS:MAT:'+id,width:240,height:240,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});}
function printQR(id,nom){
  const tmp=document.createElement('div');
  tmp.style.cssText='position:absolute;left:-9999px;top:-9999px;background:#fff;padding:16px';
  document.body.appendChild(tmp);
  try{
    new QRCode(tmp,{text:'RAILOPS:MAT:'+id,width:280,height:280,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});
    setTimeout(()=>{
      const img=tmp.querySelector('img')||tmp.querySelector('canvas');
      if(!img){document.body.removeChild(tmp);toast('Erreur génération QR','danger');return;}
      const canvas=document.createElement('canvas');
      canvas.width=320;canvas.height=380;
      const ctx=canvas.getContext('2d');
      ctx.fillStyle='#fff';ctx.fillRect(0,0,320,380);
      const src=img.tagName==='CANVAS'?img.toDataURL():img.src;
      const qrImg=new Image();
      qrImg.onload=function(){
        ctx.drawImage(qrImg,20,20,280,280);
        ctx.fillStyle='#000';ctx.font='bold 14px Arial';ctx.textAlign='center';
        ctx.fillText(nom.length>35?nom.substring(0,35)+'…':nom,160,322);
        ctx.font='12px monospace';ctx.fillStyle='#555';
        ctx.fillText(id,160,342);
        ctx.font='10px Arial';ctx.fillStyle='#aaa';
        ctx.fillText('RailOps — SFERIS',160,362);
        document.body.removeChild(tmp);
        const dataUrl=canvas.toDataURL('image/png');
        const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        if(isMobile){
          // Mobile : téléchargement direct
          const a=document.createElement('a');
          a.href=dataUrl;a.download='QR-'+id+'.png';a.click();
          toast('QR téléchargé — imprime depuis ta galerie','ok');
        } else {
          // PC : inject une zone d'impression dans le body et déclenche window.print()
          const old=document.getElementById('print-zone');if(old)old.remove();
          const zone=document.createElement('div');
          zone.id='print-zone';
          zone.style.cssText='display:none;flex-direction:column;align-items:center;justify-content:center;background:#fff;padding:40px;text-align:center;font-family:Arial,sans-serif';
          zone.innerHTML='<img src="'+dataUrl+'" style="width:260px;height:260px">'
            +'<div style="font-size:15px;font-weight:700;margin-top:14px;color:#111;max-width:280px">'+nom+'</div>'
            +'<div style="font-size:12px;font-family:monospace;color:#555;margin-top:6px;background:#f5f5f5;padding:4px 10px;border-radius:4px">'+id+'</div>'
            +'<div style="font-size:10px;color:#bbb;margin-top:8px">RailOps — SFERIS</div>';
          document.body.appendChild(zone);
          setTimeout(()=>{
            window.print();
            setTimeout(()=>{zone.remove();},500);
          },100);
          toast('Dialogue impression ouvert','ok');
        }
      };
      qrImg.src=src;
    },300);
  }catch(e){if(document.body.contains(tmp))document.body.removeChild(tmp);toast('Erreur QR','danger');}
}

function closeModal(){S.modal=null;S.modalData=null;render();}

function go(p){stopCam();S.modal=null;S.page=p;render();}
function goBack(){

function resetFiltres(){S.filterPres=new Set();S.filterCat=new Set();renderTab();}
function setFP(f){
  if(f==='tous'){S.filterPres=new Set();}
  else{if(S.filterPres.has(f))S.filterPres.delete(f);else S.filterPres.add(f);}
  renderTab();
}

async function doTransfert(){
  const ids=window._transfertIds||[];
  if(!ids.length){toast('Aucun article sélectionné','warn');return;}
  const cible=document.getElementById('transfert-cible')?.value;
  if(!cible){toast('Sélectionne un chantier cible','warn');return;}
  const chantierCible=S.chantiers.find(c=>c.id===cible);
  if(!chantierCible){toast('Chantier introuvable','danger');return;}
  document.getElementById('movl')?.remove();
  window._importing=true;
  try{
    const payload=[];
    ids.forEach(id=>{
      const idx=S.mat.findIndex(m=>m.id===id);
      if(idx===-1) return;
      S.mat[idx].chantierId=cible;
      S.mat[idx].presence='non-confirme';
      S.mat[idx].etat='inconnu';
      S.mat[idx].scan=null;
      S.mat[idx].verifLundi=null;
      S.mat[idx].verifSemaine=null;
      S.mat[idx].controle2m=null;
      S.mat[idx].autreChantier=null;
      const {prix:_,autreChantier:__,...mDB}=S.mat[idx];
      payload.push(mDB);
    });
    try{localStorage.setItem('ro3_m',JSON.stringify(S.mat));}catch(e){}
    const CHUNK=100;
    let ok=true;
    for(let i=0;i<payload.length;i+=CHUNK){
      const {error}=await db.from('materiels').upsert(payload.slice(i,i+CHUNK),{onConflict:'id'});
      if(error){console.error('[Transfert]',error.message);ok=false;}
    }
    S.selItems=new Set();
    S.selMode=false;
    renderTab();
    if(ok) toast(ids.length+' article(s) transféré(s) vers '+chantierCible.nom,'ok');
    else toast('Transfert partiel — vérifier la console','warn');
  }finally{
    window._importing=false;
    window._lastImport=Date.now();
  }
}

        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#F09595" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>

      <button class="btn btn-danger" id="del-confirm" style="flex:1">Supprimer</button>
    </div>`;
  div.appendChild(sheet);
  document.getElementById('app').appendChild(div);
  document.getElementById('del-cancel').addEventListener('click',()=>div.remove());
  document.getElementById('del-confirm').addEventListener('click',()=>{
    const btn=document.getElementById('del-confirm');
    btn.textContent='Suppression...';
    btn.disabled=true;
    div.remove();
    console.log('[deleteSelected] IDs à supprimer:', window._deleteIds);
    doDeleteSelected(window._deleteIds);
  });
}
async function doDeleteSelected(idsToDelete){
  if(!idsToDelete||!idsToDelete.length) idsToDelete=[...S.selItems];
  const count=idsToDelete.length;
  window._importing=true;
  try{
    S.mat=S.mat.filter(m=>!idsToDelete.includes(m.id));
    S.scans=S.scans.filter(s=>!idsToDelete.includes(s.materielId));
    S.selItems=new Set();
    S.selMode=false;
    try{localStorage.setItem('ro3_m',JSON.stringify(S.mat));}catch(e){}
    idsToDelete.forEach(id=>queueDelete(id));
    try{
      const CHUNK=100;
      for(let i=0;i<idsToDelete.length;i+=CHUNK){
        const batch=idsToDelete.slice(i,i+CHUNK);
        const {error}=await db.from('materiels').delete().filter('id','in','('+batch.map(i=>`"${i}"`).join(',')+')');
        if(!error){
          try{await db.from('scans').delete().in('materielId',batch);}catch(e){}
          try{await db.from('deleted_ids').insert(batch.map(id=>({identifiant:id})));}catch(e){console.warn('[deleted_ids batch]',e.message);}
          batch.forEach(id=>dequeueDelete(id));
        } else {
          console.warn('[doDeleteSelected] Erreur batch:',error.message);
        }
      }
    }catch(e){console.warn('[doDeleteSelected] Offline, mis en queue');}
    const existing=document.getElementById('movl');if(existing)existing.remove();
    renderTab();
    toast(count+' article(s) supprimé(s)','warn');
  }finally{
    window._importing=false;
    window._lastImport=Date.now();
  }
}
function toast(msg,type){
  const old=document.getElementById('_t');if(old)old.remove();
  const t=document.createElement('div');t.id='_t';
  const col={ok:'rgba(29,158,117,.5)',danger:'rgba(226,75,74,.5)',warn:'rgba(61,181,74,.5)'};
  t.style.cssText=`position:absolute;bottom:88px;left:50%;transform:translateX(-50%);background:var(--bg2);border:.5px solid ${col[type]||col.ok};border-radius:12px;padding:10px 18px;font-size:13px;color:var(--text);z-index:400;white-space:nowrap;max-width:320px;text-align:center`;
  t.textContent=(type==='ok'?'✓ ':type==='danger'?'✗ ':'⚠ ')+msg;
  app.appendChild(t);setTimeout(()=>t.remove(),3000);
}

async function doAddPrix(){
  const ref=document.getElementById('prix-ref')?.value.trim();
  const val=document.getElementById('prix-val')?.value;
  const desc=document.getElementById('prix-desc')?.value.trim()||'';
  if(!ref){toast('Indique une référence','danger');return;}
  const prix=parseFloat(val);
  if(isNaN(prix)||prix<0){toast('Prix invalide','danger');return;}
  const existing=S.prixCatalogue.findIndex(p=>p.ref.toLowerCase()===ref.toLowerCase());
  if(existing!==-1) S.prixCatalogue[existing]={ref,prix,description:desc};
  else S.prixCatalogue.push({ref,prix,description:desc});
  await savePrixCatalogue();
  if(window._refreshCatalogue) window._refreshCatalogue();
  toast('Référence ajoutée ✓','ok');
}

async function doDeletePrix(ref){
  await deletePrixCatalogue(ref);
  if(window._refreshCatalogue) window._refreshCatalogue();
  toast('Référence supprimée','warn');
}

async function importPrixExcel(input){
  const file=input.files[0];if(!file)return;
  input.value='';
  const ext=file.name.split('.').pop().toLowerCase();
  const norm=s=>String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

  const processRows=(rows)=>{
    if(!rows||!rows.length){toast('Fichier vide','danger');return;}
    const headers=rows[0].map(h=>norm(h));
    const iRef=headers.findIndex(h=>h.includes('ref')||h.includes('pref')||h.includes('code')||h==='ref');
    const iPrix=headers.findIndex(h=>h.includes('prix')||h.includes('cout')||h.includes('tarif')||h.includes('valeur')||h==='eur');
    const iDesc=headers.findIndex(h=>h.includes('desc')||h.includes('libel')||h.includes('nom'));
    if(iRef===-1||iPrix===-1){toast('Colonnes "Préfixe" et "Prix" introuvables','danger');return;}
    let added=0,updated=0;
    for(let i=1;i<rows.length;i++){
      const row=rows[i];
      const ref=String(row[iRef]||'').trim();
      if(!ref)continue;
      const prix=parseFloat(String(row[iPrix]||'').replace(/[^\d.,]/g,'').replace(',','.'));
      if(isNaN(prix)||prix<0)continue;
      const desc=iDesc>=0?String(row[iDesc]||'').trim():'';
      const existing=S.prixCatalogue.findIndex(p=>p.ref.toLowerCase()===ref.toLowerCase());
      if(existing!==-1){S.prixCatalogue[existing]={ref,prix,description:desc};updated++;}
      else{S.prixCatalogue.push({ref,prix,description:desc});added++;}
    }
    savePrixCatalogue().then(()=>{
      if(window._refreshCatalogue)window._refreshCatalogue();
      toast(added+' ajouté(s) · '+updated+' mis à jour','ok');
    });
  };

  if(ext==='xlsx'||ext==='xls'){
    if(typeof XLSX==='undefined'){toast('Librairie Excel non chargée','danger');return;}
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        processRows(XLSX.utils.sheet_to_json(ws,{header:1,defval:''}));
      }catch(err){toast('Erreur lecture : '+err.message,'danger');}
    };
    reader.readAsArrayBuffer(file);
  } else {
    const reader=new FileReader();
    reader.onload=e=>{
      const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim());
      const sep=lines[0]?.includes(';')?';':',';
      processRows(lines.map(l=>l.split(sep).map(c=>c.trim().replace(/^["']|["']$/g,''))));
    };
    reader.readAsText(file,'utf-8');
  }
}

async function deleteScan(scanId, matId){
  if(!confirm('Supprimer ce scan ?')) return;
  S.scans=S.scans.filter(s=>s.id!==scanId);
  try{localStorage.setItem('ro3_s',JSON.stringify(S.scans));}catch(e){}
  try{await db.from('scans').delete().eq('id',scanId);}catch(e){console.warn('deleteScan:',e);}
  // Remettre à jour l'état et les vérifs hebdomadaires du matériel
  const idx=S.mat.findIndex(m=>m.id===matId);
  if(idx!==-1){
    const remaining=S.scans.filter(s=>s.materielId===matId).sort((a,b)=>b.date.localeCompare(a.date));
    const lastScan=remaining[0];
    S.mat[idx].scan=lastScan?.date||null;
    S.mat[idx].etat=lastScan?.etatGeneral||'inconnu';
    // Remettre à zéro verifLundi/verifSemaine si plus aucun scan cette semaine
    const wk=getWeekKey();
    const scansThisWeek=remaining.filter(s=>{
      const offsetMs=14*60*60*1000;
      const dt=new Date(new Date(s.date).getTime()-offsetMs);
      const tmp=new Date(Date.UTC(dt.getUTCFullYear(),dt.getUTCMonth(),dt.getUTCDate()));
      const day=tmp.getUTCDay()||7;tmp.setUTCDate(tmp.getUTCDate()+4-day);
      const y=tmp.getUTCFullYear();
      const w=Math.ceil((((tmp-new Date(Date.UTC(y,0,1)))/86400000)+1)/7);
      return y+'-W'+(w<10?'0'+w:w)===wk;
    });
    if(scansThisWeek.length===0){
      S.mat[idx].verifLundi=null;
      S.mat[idx].verifSemaine=null;
    } else if(scansThisWeek.length===1){
      S.mat[idx].verifSemaine=null;
    }
    await saveMat(matId); // await pour garantir la sauvegarde avant renderTab
  }
  document.getElementById('movl')?.remove();
  toast('Scan supprimé','warn');
  renderTab();
}

function exportNonVerifies(){
  const c=getC(S.curC);if(!c)return;
  const wk=getWeekKey();
  const mats=matOfC(S.curC);
  // Non vérifiés = pas les 2 vérifs de la semaine complètes
  const nonV1=mats.filter(m=>!getVerif(m,'lundi'));           // 0 vérif
  const nonV2=mats.filter(m=>getVerif(m,'lundi')&&!getVerif(m,'semaine')); // 1 vérif seulement
  const nonVerifies=[...nonV1,...nonV2];
  if(!nonVerifies.length){toast('Toutes les vérifications sont complètes ✓','ok');return;}

  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const pw=doc.internal.pageSize.getWidth();
  const now=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});

  // Header
  doc.setFillColor(245,166,35);doc.rect(0,0,pw,16,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(13);doc.setFont('helvetica','bold');
  doc.text('RailOps — SFERIS',14,10);
  doc.setFontSize(8);doc.setFont('helvetica','normal');
  doc.text('Vérifications incomplètes',pw-14,10,{align:'right'});

  // Infos
  doc.setTextColor(30,30,30);doc.setFontSize(14);doc.setFont('helvetica','bold');
  doc.text(c.nom,14,24);
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(100,100,100);
  doc.text(c.lieu,14,30);
  doc.text('Semaine : '+wk+' · Généré le '+now,pw-14,24,{align:'right'});

  // Stats
  doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(192,57,43);
  doc.text(nonV1.length+' article(s) sans aucune vérification  ·  '+nonV2.length+' article(s) avec 1 vérification sur 2',14,38);

  doc.autoTable({
    startY:44,
    head:[['Désignation','Vérif 1','Vérif 2','État','Dernier scan']],
    body:nonVerifies.map(m=>{
      const v1=getVerif(m,'lundi');
      const v2=getVerif(m,'semaine');
      const eL={bon:'Bon état',acceptable:'Acceptable',degrade:'Dégradé','hors-service':'Hors service',inconnu:'Non inspecté'};
      return[
        m.nom,
        v1?'✓ '+new Date(v1.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}):'✗ Non faite',
        v2?'✓ '+new Date(v2.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}):'✗ Non faite',
        eL[m.etat]||m.etat,
        m.scan?new Date(m.scan).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}):'Jamais',
      ];
    }),
    styles:{fontSize:8,cellPadding:2},
    headStyles:{fillColor:[192,57,43],textColor:255,fontStyle:'bold',fontSize:8},
    didParseCell:(data)=>{
      if(data.section==='body'){
        const m=nonVerifies[data.row.index];
        const v1=getVerif(m,'lundi');
        const v2=getVerif(m,'semaine');
        if(data.column.index===1){data.cell.styles.textColor=v1?[26,122,58]:[192,57,43];data.cell.styles.fontStyle='bold';}
        if(data.column.index===2){data.cell.styles.textColor=v2?[26,122,58]:[192,57,43];data.cell.styles.fontStyle='bold';}
        if(data.column.index===3){
          const etat=m?.etat;
          data.cell.styles.textColor=etat==='bon'?[26,122,58]:etat==='acceptable'?[179,106,0]:etat==='degrade'||etat==='hors-service'?[192,57,43]:[100,100,100];
          data.cell.styles.fontStyle='bold';
        }
        // Fond rouge si 0 vérif, orange si 1 vérif
        if(!v1) data.cell.styles.fillColor=[255,235,235];
        else if(!v2) data.cell.styles.fillColor=[255,248,225];
      }
    },
    margin:{left:14,right:14},
  });

  // Footer
  doc.setFontSize(7);doc.setTextColor(150,150,150);
  doc.text('RailOps — SFERIS · '+now,14,doc.internal.pageSize.getHeight()-6);
  doc.text(c.nom+' · Vérifications incomplètes '+wk,pw-14,doc.internal.pageSize.getHeight()-6,{align:'right'});

  const fname='NonVerifies_'+c.nom.replace(/[^a-z0-9]/gi,'_')+'_'+wk+'.pdf';
  const blob=doc.output('blob');
  const url=URL.createObjectURL(blob);
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  if(isIOS){const a=document.createElement('a');a.href=url;a.download=fname;a.target='_blank';document.body.appendChild(a);a.click();document.body.removeChild(a);toast('PDF prêt — si pas téléchargé, appuie sur ↗ Partager','ok');}
  else{const a=document.createElement('a');a.href=url;a.download=fname;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),10000);}
  toast(nonVerifies.length+' vérification(s) incomplète(s) exportées','warn');
}

// ══════════════════════════════════════
// CENTRE DE NOTIFICATIONS
// ══════════════════════════════════════
function buildNotifs(){
  const notifs=[];
  const now=new Date();
  const wk=getWeekKey();
  const deuxMoisMs=60*24*60*60*1000;

  // Filtrer selon le rôle
  const mesCh=
    S.role==='chef_chantier'?S.chantiers:
    S.role==='chef'?S.chantiers.filter(c=>isChefOf(c)):
    S.chantiers.filter(c=>(c.agents||[]).includes(S.agent));
  const mesIds=new Set(mesCh.map(c=>c.id));
  const mesMat=S.mat.filter(m=>mesIds.has(m.chantierId));

  // ── Absences
  mesMat.filter(m=>m.presence==='absent').forEach(m=>{
    const c=getC(m.chantierId);
    notifs.push({type:'danger',icon:'absent',titre:'Article absent',msg:`${m.nom}`,detail:c?.nom||'',id:m.id,cid:m.chantierId});
  });

  // ── Matériel hors service
  mesMat.filter(m=>m.etat==='hors-service').forEach(m=>{
    const c=getC(m.chantierId);
    notifs.push({type:'danger',icon:'hors-service',titre:'Hors service',msg:`${m.nom}`,detail:c?.nom||'',id:m.id,cid:m.chantierId});
  });

  // ── Matériel dégradé
  mesMat.filter(m=>m.etat==='degrade').forEach(m=>{
    const c=getC(m.chantierId);
    notifs.push({type:'warn',icon:'degrade',titre:'État dégradé',msg:`${m.nom}`,detail:c?.nom||'',id:m.id,cid:m.chantierId});
  });

  // ── Échéances expirées
  mesMat.filter(m=>m.echeance&&isDateWarning(m.echeance)).forEach(m=>{
    const c=getC(m.chantierId);
    notifs.push({type:'danger',icon:'echeance',titre:'Échéance expirée',msg:`${m.nom}`,detail:`${m.echeance} · ${c?.nom||''}`,id:m.id,cid:m.chantierId});
  });

  // ── Échéances proches (≤30j)
  mesMat.filter(m=>m.echeance&&isDateSoon(m.echeance)&&!isDateWarning(m.echeance)).forEach(m=>{
    const c=getC(m.chantierId);
    notifs.push({type:'warn',icon:'echeance',titre:'Échéance proche',msg:`${m.nom}`,detail:`${m.echeance} · ${c?.nom||''}`,id:m.id,cid:m.chantierId});
  });

  // ── Contrôles bimestriels en retard
  mesMat.filter(m=>{
    const last=m.controle2m?new Date(m.controle2m.date):null;
    return !last||(now-last)>deuxMoisMs;
  }).forEach(m=>{
    const c=getC(m.chantierId);
    notifs.push({type:'warn',icon:'controle',titre:'Contrôle bimestriel dû',msg:`${m.nom}`,detail:c?.nom||'',id:m.id,cid:m.chantierId});
  });

  // ── Vérifs hebdo manquantes (pastille 1 ou 2 absente cette semaine)
  if(S.role==='chef'||S.role==='chef_chantier'){
    mesMat.filter(m=>!getVerif(m,'lundi')||!getVerif(m,'semaine')).forEach(m=>{
      const c=getC(m.chantierId);
      const v1=getVerif(m,'lundi');
      const missing=!v1?'Aucune vérif cette semaine':'Vérif 2 manquante';
      notifs.push({type:'info',icon:'verif',titre:missing,msg:`${m.nom}`,detail:c?.nom||'',id:m.id,cid:m.chantierId});
    });
  }

  return notifs;
}

function updateNotifBadge(){
  const badge=document.getElementById('notif-badge');
  if(!badge)return;
  const n=buildNotifs().filter(n=>n.type==='danger'||n.type==='warn').length;
  if(n>0){badge.textContent=n>99?'99+':n;badge.style.display='block';}
  else{badge.style.display='none';}
}
